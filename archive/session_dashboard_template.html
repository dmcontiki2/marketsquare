<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrustSquare · Session Dashboard</title>
<style>
  :root {
    --bg: #0b0f1a;
    --surface: #111827;
    --surface2: #1a2232;
    --border: #1e2d40;
    --text: #e2e8f0;
    --muted: #64748b;
    --accent: #3b82f6;
    --green: #10b981;
    --red: #ef4444;
    --amber: #f59e0b;
    --purple: #8b5cf6;
    --r: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; min-height: 100vh; }

  /* ── Header ── */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo { font-size: 16px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .session-badge { background: var(--accent); color: #fff; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; letter-spacing: .5px; }
  .gen-time { font-size: 11px; color: var(--muted); }
  .live-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; display: inline-block; margin-right: 5px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── Layout ── */
  .main { display: grid; grid-template-columns: 280px 1fr; gap: 0; min-height: calc(100vh - 53px); }
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 20px 16px; overflow-y: auto; }
  .content { padding: 20px 24px; overflow-y: auto; }

  /* ── Sidebar ── */
  .sidebar-section { margin-bottom: 24px; }
  .sidebar-label { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; padding-left: 4px; }
  .state-item { display: flex; align-items: flex-start; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12px; color: #94a3b8; line-height: 1.4; }
  .state-item:last-child { border-bottom: none; }
  .state-item strong { color: var(--text); }

  .blocker-item { background: #1c0f0f; border: 1px solid #7f1d1d; border-radius: 7px; padding: 7px 10px; margin-bottom: 6px; font-size: 11px; color: #fca5a5; display: flex; align-items: flex-start; gap: 6px; }
  .blocker-item::before { content: '⚠'; font-size: 12px; flex-shrink: 0; margin-top: 1px; }

  .rule-item { font-size: 11px; color: #94a3b8; padding: 5px 0; border-bottom: 1px solid #1a2232; line-height: 1.5; }
  .rule-item strong { color: #fca5a5; }

  /* ── Direction cards ── */
  .section-title { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
  .directions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; margin-bottom: 28px; }
  .dir-card { background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--r); padding: 16px; cursor: pointer; transition: all 0.15s; position: relative; overflow: hidden; }
  .dir-card:hover { border-color: var(--card-color, var(--accent)); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,.4); }
  .dir-card.selected { border-color: var(--card-color, var(--accent)); background: #111827; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
  .dir-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--card-color, var(--accent)); }
  .dir-project { font-size: 10px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: var(--card-color, var(--accent)); margin-bottom: 5px; }
  .dir-title { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 10px; }
  .dir-items { list-style: none; }
  .dir-items li { font-size: 11px; color: #94a3b8; padding: 3px 0; display: flex; align-items: flex-start; gap: 6px; line-height: 1.4; }
  .dir-items li::before { content: '→'; color: var(--card-color, var(--accent)); flex-shrink: 0; font-size: 10px; margin-top: 2px; }
  .dir-select-hint { font-size: 10px; color: var(--muted); margin-top: 10px; text-align: right; }

  /* ── Prompt panel ── */
  .prompt-panel { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--r); padding: 20px; margin-bottom: 20px; display: none; }
  .prompt-panel.visible { display: block; }
  .prompt-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .prompt-title { font-size: 13px; font-weight: 700; color: #fff; }
  .copy-btn { background: var(--accent); color: #fff; border: none; padding: 8px 18px; border-radius: 7px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .copy-btn:hover { background: #2563eb; }
  .copy-btn.copied { background: var(--green); }
  .mobile-btn { background: #1a2232; color: #a78bfa; border: 1.5px solid #4c1d95; padding: 8px 18px; border-radius: 7px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .mobile-btn:hover { background: #2d1b69; border-color: #8b5cf6; }
  .mobile-btn.copied { background: var(--green); color: #fff; border-color: var(--green); }
  .prompt-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
  .ptab { padding: 5px 14px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; border: 1.5px solid var(--border); color: var(--muted); background: transparent; transition: all 0.15s; }
  .ptab.active { border-color: var(--accent); color: #fff; background: #1a2232; }
  .ptab.mobile.active { border-color: #8b5cf6; color: #a78bfa; }
  .prompt-text { background: #0a0f1a; border: 1px solid var(--border); border-radius: 7px; padding: 14px; font-family: 'Courier New', monospace; font-size: 12px; color: #93c5fd; line-height: 1.6; white-space: pre-wrap; word-break: break-word; max-height: 260px; overflow-y: auto; }

  /* ── Status panels ── */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .status-panel { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; }
  .sp-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .sp-content { font-size: 12px; color: #94a3b8; line-height: 1.6; }
  .sp-content strong { color: var(--text); }
  .sp-content ul { padding-left: 14px; }
  .sp-content ul li { margin-bottom: 4px; }

  /* ── Changelog ── */
  .changelog-box { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; margin-bottom: 20px; }
  .cl-text { font-size: 12px; color: #94a3b8; line-height: 1.7; max-height: 200px; overflow-y: auto; }
  .cl-text strong { color: #e2e8f0; }

  /* ── High priority ── */
  .hp-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  .hp-chip { background: #1a2232; border: 1px solid #1e3a5f; border-radius: 20px; padding: 5px 12px; font-size: 11px; color: #93c5fd; }

  /* ── View toggle ── */
  .view-toggle { display: flex; gap: 6px; }
  .vtab { padding: 5px 14px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; border: 1.5px solid var(--border); color: var(--muted); background: transparent; transition: all 0.15s; }
  .vtab.active { border-color: var(--accent); color: #fff; background: #1a2232; }

  /* ── Graph view ── */
  #graph-view { display: none; width: 100%; height: calc(100vh - 53px); position: relative; }
  #graph-view.visible { display: block; }
  #graph-svg { width: 100%; height: 100%; touch-action: none; }
  #graph-zoom-wrap { will-change: transform; }
  .node-label { font-size: 11px; fill: #e2e8f0; pointer-events: none; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .node-sublabel { font-size: 9px; fill: #64748b; pointer-events: none; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  /* ── Graph tooltip ── */
  #graph-tooltip { position: fixed; background: #111827; border: 1px solid #1e2d40; border-radius: 10px; padding: 12px 16px; font-size: 12px; color: #e2e8f0; pointer-events: none; opacity: 0; transition: opacity 0.15s; max-width: 280px; z-index: 200; line-height: 1.6; }
  #graph-tooltip.touch-visible { pointer-events: auto; }
  #graph-tooltip .tt-title { font-weight: 700; font-size: 13px; margin-bottom: 6px; }
  #graph-tooltip .tt-tag { font-size: 10px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; margin-bottom: 6px; }
  #tt-dismiss { display: none; position: absolute; top: 6px; right: 8px; background: none; border: none; color: #64748b; font-size: 16px; cursor: pointer; line-height: 1; padding: 2px 4px; }
  @media (hover: none) { #tt-dismiss { display: block; } }

  /* ── scrollbar ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">Trust<span>Square</span></div>
    <div class="session-badge" id="session-badge">Session —</div>
    <div><span class="live-dot"></span><span class="gen-time" id="gen-time">Loading…</span></div>
  </div>
  <div class="view-toggle">
    <button class="vtab active" id="vtab-dashboard" onclick="switchView('dashboard')">📋 Dashboard</button>
    <button class="vtab" id="vtab-graph" onclick="switchView('graph')">🌌 Graph</button>
  </div>
</div>

<div id="graph-tooltip"><button id="tt-dismiss" onclick="dismissTooltip()">✕</button><div class="tt-tag" id="tt-tag"></div><div class="tt-title" id="tt-title"></div><div id="tt-body"></div></div>

<div class="main">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="sidebar-section">
      <div class="sidebar-label">Live State</div>
      <div id="live-state-list"></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">⚠ Launch Blockers</div>
      <div id="blockers-list"></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Session Rules</div>
      <div id="rules-list"></div>
    </div>

  </div>

  <!-- MAIN CONTENT -->
  <div class="content">

    <div class="section-title">Choose your session direction — click a card, then copy the prompt</div>

    <div class="directions-grid" id="directions-grid"></div>

    <!-- Generated prompt panel -->
    <div class="prompt-panel" id="prompt-panel">
      <div class="prompt-header">
        <div style="display:flex;align-items:center;gap:12px;">
          <div class="prompt-title" id="prompt-title">Session Prompt</div>
          <div class="prompt-tabs">
            <button class="ptab active" id="tab-desktop" onclick="switchTab('desktop')">🖥 Desktop / Cowork</button>
            <button class="ptab mobile" id="tab-mobile" onclick="switchTab('mobile')">📱 iPhone / Claude.ai</button>
          </div>
        </div>
        <button class="copy-btn" id="copy-btn" onclick="copyPrompt()">📋 Copy</button>
      </div>
      <div class="prompt-text" id="prompt-text"></div>
    </div>

    <!-- Last session / Next session -->
    <div class="two-col">
      <div class="status-panel">
        <div class="sp-label" id="last-label">Last Completed</div>
        <div class="sp-content" id="last-content"></div>
      </div>
      <div class="status-panel">
        <div class="sp-label" id="next-label">Next Session Priority</div>
        <div class="sp-content" id="next-content"></div>
      </div>
    </div>

    <!-- High priority items -->
    <div class="section-title">High Priority Backlog</div>
    <div class="hp-grid" id="hp-grid"></div>

    <!-- Recent changelog -->
    <div class="section-title">Last Session — What Changed</div>
    <div class="changelog-box">
      <div class="cl-text" id="changelog-text"></div>
    </div>

  </div>
</div>

<!-- GRAPH VIEW -->
<div id="graph-view">
  <svg id="graph-svg"></svg>
</div>

<script>
// ── Data injected by session_dashboard.py ──────────────────
const DATA = /*__DATA__*/null;

// ── Markdown mini-renderer ──────────────────────────────────
function md(text) {
  if (!text) return '';
  return text
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code style="background:#0f1a2e;padding:1px 5px;border-radius:4px;font-size:11px;color:#93c5fd;">$1</code>')
    .replace(/^### (.+)$/gm, '<div style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.8px;margin:10px 0 5px;">$1</div>')
    .replace(/^- (.+)$/gm, '<div style="padding:2px 0 2px 12px;border-left:2px solid #1e3a5f;margin-bottom:4px;">$1</div>')
    .replace(/\n\n/g, '<br>');
}

// ── Render ──────────────────────────────────────────────────
function init() {
  if (!DATA) return;

  // Header
  document.getElementById('session-badge').textContent = `Session ${DATA.nextSession}`;
  document.getElementById('gen-time').textContent = `Generated ${DATA.generatedAt}`;

  // Live state sidebar
  const lsEl = document.getElementById('live-state-list');
  DATA.liveState.split('\n').filter(l => l.trim().startsWith('-')).forEach(line => {
    const text = line.replace(/^- /, '').trim();
    const el = document.createElement('div');
    el.className = 'state-item';
    el.innerHTML = md(text);
    lsEl.appendChild(el);
  });

  // Blockers sidebar
  const blEl = document.getElementById('blockers-list');
  if (DATA.blockers && DATA.blockers.length) {
    DATA.blockers.forEach(b => {
      const el = document.createElement('div');
      el.className = 'blocker-item';
      el.textContent = b;
      blEl.appendChild(el);
    });
  } else {
    blEl.innerHTML = '<div style="font-size:12px;color:#4ade80;padding:6px 0;">✅ No blockers logged</div>';
  }

  // Rules sidebar
  const rulesEl = document.getElementById('rules-list');
  DATA.knownRules.split('\n').filter(l => l.trim().startsWith('-')).slice(0, 6).forEach(line => {
    const el = document.createElement('div');
    el.className = 'rule-item';
    el.innerHTML = md(line.replace(/^- /, '').trim());
    rulesEl.appendChild(el);
  });

  // Direction cards
  const grid = document.getElementById('directions-grid');
  DATA.directions.forEach((dir, idx) => {
    const card = document.createElement('div');
    card.className = 'dir-card';
    card.style.setProperty('--card-color', dir.colour);
    card.id = 'card-' + dir.id;
    card.onclick = () => selectDirection(dir, card);

    const items = dir.items.map(i => `<li>${i}</li>`).join('');
    card.innerHTML = `
      <div class="dir-project">${dir.project}</div>
      <div class="dir-title">${dir.title}</div>
      <ul class="dir-items">${items}</ul>
      <div class="dir-select-hint">Click to generate prompt →</div>
    `;
    grid.appendChild(card);
  });

  // Last / Next panels
  document.getElementById('last-label').textContent = `Last Completed — Session ${DATA.currentSession}`;
  document.getElementById('last-content').innerHTML = md(DATA.lastDone.slice(0, 600));
  document.getElementById('next-label').textContent = `Session ${DATA.nextSession} — Priority`;
  document.getElementById('next-content').innerHTML = md(DATA.nextGoals.slice(0, 600));

  // High priority chips
  const hpEl = document.getElementById('hp-grid');
  (DATA.highPriority || []).forEach(item => {
    const chip = document.createElement('div');
    chip.className = 'hp-chip';
    chip.textContent = item;
    hpEl.appendChild(chip);
  });

  // Changelog
  document.getElementById('changelog-text').innerHTML = md(DATA.recentChangelog);
}

let selectedDir = null;
let activeTab = 'desktop';

function selectDirection(dir, cardEl) {
  document.querySelectorAll('.dir-card').forEach(c => c.classList.remove('selected'));
  cardEl.classList.add('selected');
  selectedDir = dir;

  const panel = document.getElementById('prompt-panel');
  document.getElementById('prompt-title').textContent = dir.title;
  panel.classList.add('visible');
  renderTab();
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-desktop').classList.toggle('active', tab === 'desktop');
  document.getElementById('tab-mobile').classList.toggle('active', tab === 'mobile');
  renderTab();
}

function renderTab() {
  if (!selectedDir) return;
  const textEl = document.getElementById('prompt-text');
  const btn = document.getElementById('copy-btn');
  if (activeTab === 'mobile') {
    textEl.textContent = selectedDir.mobile_prompt || '(No mobile prompt for this direction)';
    textEl.style.color = '#c4b5fd';
  } else {
    textEl.textContent = selectedDir.prompt;
    textEl.style.color = '#93c5fd';
  }
  btn.textContent = '📋 Copy';
  btn.classList.remove('copied');
}

function copyPrompt() {
  if (!selectedDir) return;
  const text = activeTab === 'mobile' ? selectedDir.mobile_prompt : selectedDir.prompt;
  if (!text) return;
  const btn = document.getElementById('copy-btn');
  const finish = () => {
    btn.textContent = '✅ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copy'; btn.classList.remove('copied'); }, 2500);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(finish).catch(() => fallbackCopy(text, finish));
  } else {
    fallbackCopy(text, finish);
  }
}

function fallbackCopy(text, finish) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); finish(); } catch(e) { alert('Copy failed — please select and copy manually.'); }
  document.body.removeChild(ta);
}

init();

// ── View switcher ────────────────────────────────────────────
function switchView(view) {
  const dash = document.querySelector('.main');
  const graph = document.getElementById('graph-view');
  document.getElementById('vtab-dashboard').classList.toggle('active', view === 'dashboard');
  document.getElementById('vtab-graph').classList.toggle('active', view === 'graph');
  if (view === 'graph') {
    dash.style.display = 'none';
    graph.classList.add('visible');
    if (!window._graphBuilt) buildGraph();
  } else {
    dash.style.display = '';
    graph.classList.remove('visible');
  }
}

// ── Graph data ────────────────────────────────────────────────
function getGalaxyData() {
  const priorities = DATA.nextGoals.split('\n').filter(l => /^\d+\./.test(l.trim())).slice(0, 4);

  const nodes = [
    { id: 'ts',     label: 'TrustSquare',  sub: `Session ${DATA.nextSession}`, group: 'TrustSquare',    size: 28, drilldown: 'ts',    detail: `Live at trustsquare.co · BEA v1.3.0\nSession ${DATA.currentSession} complete` },
    { id: 'cl',     label: 'CityLauncher', sub: 'Paused',                      group: 'CityLauncher',   size: 22, drilldown: 'cl',    detail: `Scheduler DISABLED · Dashboard API running\nMethodology redesign pending` },
    { id: 'aa',     label: 'AdvertAgent',  sub: 'Pre-kickoff',                 group: 'AdvertAgent',    size: 20, drilldown: 'aa',    detail: 'Seller-facing AI assistance\nSession 1 kickoff pending' },
    { id: 'infra',  label: 'Agentic OS',   sub: 'Framework',                   group: 'Infrastructure', size: 18, drilldown: 'infra', detail: 'Branch structure · Session automation\nAudit baseline' },
    { id: 'tuppence', label: 'Tuppence',     sub: 'Currency',    group: 'Concept', size: 14, detail: 'Introduction currency shared across all projects' },
    { id: 'bea',      label: 'BEA v1.3.0',  sub: 'FastAPI',     group: 'Concept', size: 16, detail: '✅ Active · 72MB · running 22h+\nSQLite + Redis · Hetzner CPX22' },
    { id: 'hetzner',  label: 'Hetzner',     sub: 'Server',      group: 'Concept', size: 13, detail: '178.104.73.239 · Ubuntu 24.04\nNginx + FastAPI + CityLauncher API' },
    { id: 'paystack', label: 'Paystack',    sub: 'Payments',     group: 'Concept', size: 14, detail: 'Test mode active · Live mode pending CIPC' },
    { id: 'trust',    label: 'Trust Score', sub: 'Metric',       group: 'Concept', size: 13, detail: 'Seller credibility score · Stamped on publish' },
    { id: 'geo',      label: 'Geo',         sub: '4-level',      group: 'Concept', size: 12, detail: 'Country → Region → City → Suburb\nZA: 9 provinces · 54 cities' },
    { id: 'codex',    label: 'Solar Codex', sub: 'Rules v4.5',   group: 'Concept', size: 15, detail: 'Canonical product rules · All agents check before business logic' },
    { id: 'pretoria', label: 'Pretoria',    sub: 'Launch city',  group: 'CityLauncher', size: 13, detail: '0 live · 70 demo listings\n23/60 founding sellers' },
    { id: 'github',   label: 'GitHub',      sub: 'Backup',       group: 'Infrastructure', size: 12, detail: 'github.com/dmcontiki2/marketsquare' },
  ];

  (DATA.blockers || []).slice(0, 4).forEach((b, i) =>
    nodes.push({ id: 'blocker_'+i, label: b.length>22?b.slice(0,22)+'…':b, sub:'Blocker', group:'Blocker', size:11, detail:b }));

  priorities.forEach((p, i) => {
    const text = p.replace(/^\d+\.\s*/, '').replace(/\*\*/g, '');
    nodes.push({ id:'pri_'+i, label:text.length>24?text.slice(0,24)+'…':text, sub:`Priority ${i+1}`, group:'Priority', size:11, detail:text });
  });

  const edges = [
    {source:'ts',target:'bea',strength:0.9},{source:'cl',target:'bea',strength:0.7},{source:'aa',target:'bea',strength:0.6},
    {source:'ts',target:'hetzner',strength:0.6},{source:'cl',target:'hetzner',strength:0.6},
    {source:'ts',target:'paystack',strength:0.7},{source:'ts',target:'tuppence',strength:0.9},
    {source:'cl',target:'tuppence',strength:0.5},{source:'aa',target:'tuppence',strength:0.5},
    {source:'ts',target:'trust',strength:0.8},{source:'cl',target:'trust',strength:0.4},
    {source:'ts',target:'geo',strength:0.7},{source:'cl',target:'geo',strength:0.8},
    {source:'ts',target:'codex',strength:0.7},{source:'cl',target:'codex',strength:0.7},{source:'aa',target:'codex',strength:0.7},
    {source:'ts',target:'github',strength:0.5},{source:'cl',target:'github',strength:0.5},{source:'infra',target:'github',strength:0.7},
    {source:'cl',target:'pretoria',strength:0.9},{source:'ts',target:'pretoria',strength:0.6},
    {source:'aa',target:'ts',strength:0.7},{source:'infra',target:'ts',strength:0.5},
    {source:'infra',target:'cl',strength:0.5},{source:'infra',target:'aa',strength:0.5},
  ];
  (DATA.blockers||[]).slice(0,4).forEach((_,i)=>edges.push({source:'ts',target:'blocker_'+i,strength:0.6}));
  priorities.forEach((_,i)=>edges.push({source:'ts',target:'pri_'+i,strength:0.5}));
  return { nodes, edges };
}

// ── Graph builder ─────────────────────────────────────────────
let _galaxySim = null;
let _galaxyState = 'galaxy'; // 'galaxy' | 'drilldown'

function buildGraph() {
  window._graphBuilt = true;
  if (!DATA) return;
  drawGalaxy();
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && _galaxyState==='drilldown') drawGalaxy(); });
  // Touch: tap SVG background to dismiss tooltip
  document.getElementById('graph-svg').addEventListener('touchstart', e => {
    if (e.target.tagName === 'svg' || e.target.id === 'graph-svg') dismissTooltip();
  }, { passive: true });
}

const COLORS = {
  'TrustSquare':'#3b82f6','CityLauncher':'#8b5cf6','AdvertAgent':'#f59e0b',
  'Infrastructure':'#10b981','Concept':'#64748b','Blocker':'#ef4444','Priority':'#06b6d4',
  'kpi':'#f59e0b','tool':'#3b82f6','risk':'#ef4444','priority':'#06b6d4','metric':'#8b5cf6',
};

function setupSvg() {
  const svg = d3.select('#graph-svg');
  svg.selectAll('*').remove();
  const W = document.getElementById('graph-view').clientWidth;
  const H = document.getElementById('graph-view').clientHeight;
  svg.attr('viewBox', `0 0 ${W} ${H}`);

  // Starfield (outside zoom group so it stays fixed)
  for (let i=0;i<140;i++) {
    svg.append('circle')
      .attr('cx',Math.random()*W).attr('cy',Math.random()*H)
      .attr('r',Math.random()*1.2+0.2)
      .attr('fill','#fff').attr('opacity',Math.random()*0.35+0.05);
  }

  // Glow filters
  const defs = svg.append('defs');
  [...Object.values(COLORS),'#fff'].forEach(color => {
    const id = 'glow'+color.replace('#','');
    if (defs.select('#'+id).size()) return;
    const f = defs.append('filter').attr('id',id);
    f.append('feGaussianBlur').attr('stdDeviation','4').attr('result','blur');
    const m = f.append('feMerge');
    m.append('feMergeNode').attr('in','blur');
    m.append('feMergeNode').attr('in','SourceGraphic');
  });

  // Zoom + pan wrapper group
  const zoomG = svg.append('g').attr('id','graph-zoom-wrap');
  const zoom = d3.zoom()
    .scaleExtent([0.25, 4])
    .on('zoom', e => zoomG.attr('transform', e.transform));
  svg.call(zoom).on('dblclick.zoom', null);

  // Expose reset helper
  svg._zoomReset = () => svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity);

  return { svg, W, H, zoomG };
}

function drawNode(parent, d, colorFn, clickFn) {
  const g = parent.append('g').style('cursor','pointer');
  g.append('circle').attr('r',d.size+6).attr('fill','none')
    .attr('stroke',colorFn(d)).attr('stroke-opacity',0.15).attr('stroke-width',6);
  g.append('circle').attr('r',d.size)
    .attr('fill',colorFn(d)).attr('fill-opacity',0.85)
    .attr('filter',`url(#glow${colorFn(d).replace('#','')})`)
    .attr('stroke','#0b0f1a').attr('stroke-width',2);
  g.append('circle').attr('r',d.size*0.45).attr('cx',-d.size*0.2).attr('cy',-d.size*0.2)
    .attr('fill','#fff').attr('fill-opacity',0.12);
  g.append('text').attr('class','node-label').attr('text-anchor','middle').attr('dy',d.size+14).text(d.label);
  g.append('text').attr('class','node-sublabel').attr('text-anchor','middle').attr('dy',d.size+25).text(d.sub);
  if (clickFn) g.on('click', (event) => { event.stopPropagation(); clickFn(d); });
  return g;
}

function dismissTooltip() {
  const tt = document.getElementById('graph-tooltip');
  tt.style.opacity = 0;
  tt.classList.remove('touch-visible');
}

function showTooltip(d, colorFn, cx, cy) {
  const tt = document.getElementById('graph-tooltip');
  document.getElementById('tt-tag').textContent = d.type || d.group || '';
  document.getElementById('tt-tag').style.color = colorFn(d);
  document.getElementById('tt-title').textContent = d.label;
  document.getElementById('tt-body').textContent = d.detail || '';
  // Position: keep within viewport
  const pad = 12, w = 280, h = 120;
  let left = cx + 16, top = cy - 10;
  if (left + w > window.innerWidth - pad) left = cx - w - 16;
  if (top + h > window.innerHeight - pad) top = window.innerHeight - h - pad;
  if (top < pad) top = pad;
  tt.style.left = left + 'px';
  tt.style.top = top + 'px';
  tt.style.opacity = 1;
  tt.classList.add('touch-visible');
}

function attachTooltip(selection, colorFn) {
  const tt = document.getElementById('graph-tooltip');
  selection
    // Mouse (desktop)
    .on('mouseenter', (event, d) => showTooltip(d, colorFn, event.clientX, event.clientY))
    .on('mousemove', event => {
      tt.style.left = (event.clientX+16)+'px';
      tt.style.top  = (event.clientY-10)+'px';
    })
    .on('mouseleave', () => {
      // Only auto-hide on non-touch devices
      if (window.matchMedia('(hover: hover)').matches) dismissTooltip();
    })
    // Touch (mobile) — tap node to show, tap ✕ or background to hide
    .on('touchstart', (event, d) => {
      event.preventDefault();
      const t = event.touches[0];
      showTooltip(d, colorFn, t.clientX, t.clientY);
    }, { passive: false });
}

function drawGalaxy() {
  _galaxyState = 'galaxy';
  if (_galaxySim) _galaxySim.stop();
  const { svg, W, H, zoomG } = setupSvg();
  const { nodes, edges } = getGalaxyData();
  const colorFn = d => COLORS[d.group] || '#64748b';

  // Hint + reset button (outside zoomG, stays fixed on screen)
  svg.append('text').attr('x',W/2).attr('y',H-10)
    .attr('text-anchor','middle').attr('fill','#334155').attr('font-size','11px')
    .text('Tap a project star to drill in  ·  Pinch or scroll to zoom  ·  Drag to pan');
  const resetG = svg.append('g').attr('transform',`translate(${W-44},${H-44})`).style('cursor','pointer')
    .on('click', () => svg._zoomReset && svg._zoomReset());
  resetG.append('circle').attr('r',18).attr('fill','#1a2232').attr('stroke','#334155').attr('stroke-width',1);
  resetG.append('text').attr('text-anchor','middle').attr('dy',5).attr('fill','#64748b').attr('font-size','14px').text('⌖');

  const sim = d3.forceSimulation(nodes)
    .force('link',d3.forceLink(edges).id(d=>d.id).distance(d=>100/d.strength).strength(d=>d.strength*0.3))
    .force('charge',d3.forceManyBody().strength(d=>-d.size*18))
    .force('center',d3.forceCenter(W/2,H/2))
    .force('collision',d3.forceCollide(d=>d.size+14));
  _galaxySim = sim;

  const link = zoomG.append('g').selectAll('line').data(edges).join('line')
    .attr('stroke',d=>{const s=nodes.find(n=>n.id===(d.source.id||d.source));return s?colorFn(s):'#334155';})
    .attr('stroke-opacity',0.22).attr('stroke-width',d=>d.strength*1.5);

  const nodeG = zoomG.append('g').selectAll('g').data(nodes).join('g').style('cursor','pointer')
    .call(d3.drag()
      .on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
      .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;})
      .on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));

  nodeG.append('circle').attr('r',d=>d.size+6).attr('fill','none')
    .attr('stroke',colorFn).attr('stroke-opacity',0.15).attr('stroke-width',6);
  nodeG.append('circle').attr('r',d=>d.size)
    .attr('fill',colorFn).attr('fill-opacity',0.85)
    .attr('filter',d=>`url(#glow${colorFn(d).replace('#','')})`)
    .attr('stroke','#0b0f1a').attr('stroke-width',2);
  nodeG.append('circle').attr('r',d=>d.size*0.45).attr('cx',d=>-d.size*0.2).attr('cy',d=>-d.size*0.2)
    .attr('fill','#fff').attr('fill-opacity',0.12);
  nodeG.filter(d=>d.drilldown).append('circle').attr('r',d=>d.size+10).attr('fill','none')
    .attr('stroke',colorFn).attr('stroke-opacity',0.35).attr('stroke-width',1.5)
    .attr('stroke-dasharray','4 3');
  nodeG.append('text').attr('class','node-label').attr('text-anchor','middle').attr('dy',d=>d.size+14).text(d=>d.label);
  nodeG.append('text').attr('class','node-sublabel').attr('text-anchor','middle').attr('dy',d=>d.size+25).text(d=>d.sub);

  attachTooltip(nodeG, colorFn);
  nodeG.on('click',(event,d)=>{ if(d.drilldown) drawDrilldown(d.drilldown, d.label); });

  sim.on('tick',()=>{
    link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
        .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    nodeG.attr('transform',d=>`translate(${Math.max(d.size+5,Math.min(W-d.size-5,d.x))},${Math.max(d.size+5,Math.min(H-d.size-25,d.y))})`);
  });
}

function drawDrilldown(projectId, projectLabel) {
  _galaxyState = 'drilldown';
  if (_galaxySim) _galaxySim.stop();
  const dd = getDrilldownData(projectId);
  if (!dd) return;

  const { svg, W, H, zoomG } = setupSvg();
  const cx = W/2, cy = H/2;
  const color = dd.center.color;

  // Scale orbit radii to fit smallest screen dimension with padding
  const maxR = Math.min(W, H) * 0.44;
  const orbits = [maxR*0.40, maxR*0.70, maxR*1.00];

  // Background tap-to-return (outside zoomG, fixed)
  svg.append('rect').attr('width',W).attr('height',H).attr('fill','transparent')
    .style('cursor','pointer').on('click',()=>drawGalaxy());

  // Hints (fixed, outside zoom)
  svg.append('text').attr('x',W/2).attr('y',H-10)
    .attr('text-anchor','middle').attr('fill','#334155').attr('font-size','11px')
    .text('Tap background or Escape to return  ·  Pinch/scroll to zoom  ·  Drag to pan');

  // Zoom reset button
  const resetG = svg.append('g').attr('transform',`translate(${W-44},${H-44})`).style('cursor','pointer')
    .on('click', e => { e.stopPropagation(); svg._zoomReset && svg._zoomReset(); });
  resetG.append('circle').attr('r',18).attr('fill','#1a2232').attr('stroke','#334155').attr('stroke-width',1);
  resetG.append('text').attr('text-anchor','middle').attr('dy',5).attr('fill','#64748b').attr('font-size','14px').text('⌖');

  // Project title (inside zoomG so it zooms with content)
  zoomG.append('text').attr('x',cx).attr('y',cy - maxR - 18)
    .attr('text-anchor','middle').attr('fill',color).attr('font-size','14px').attr('font-weight','700')
    .attr('filter',`url(#glow${color.replace('#','')})`)
    .text(projectLabel + ' — Solar System');

  // Legend (fixed top-right, outside zoom)
  const legendItems = [{t:'kpi',l:'KPI'},{t:'tool',l:'Tool'},{t:'risk',l:'Risk'},{t:'priority',l:'Priority'},{t:'metric',l:'Metric'}];
  legendItems.forEach((li,i) => {
    const lx = W-110, ly = 54+i*20;
    svg.append('circle').attr('cx',lx).attr('cy',ly).attr('r',5).attr('fill',COLORS[li.t]||'#64748b').attr('fill-opacity',0.85);
    svg.append('text').attr('x',lx+11).attr('y',ly+4).attr('fill','#64748b').attr('font-size','10px').text(li.l);
  });

  // Orbit rings (inside zoomG)
  orbits.forEach(r => {
    zoomG.append('circle').attr('cx',cx).attr('cy',cy).attr('r',r)
      .attr('fill','none').attr('stroke',color).attr('stroke-opacity',0.07).attr('stroke-width',1);
  });

  // Centre star (inside zoomG)
  const centerG = zoomG.append('g').attr('transform',`translate(${cx},${cy})`);
  centerG.append('circle').attr('r',38).attr('fill','none').attr('stroke',color).attr('stroke-opacity',0.2).attr('stroke-width',8);
  centerG.append('circle').attr('r',30).attr('fill',color).attr('fill-opacity',0.9)
    .attr('filter',`url(#glow${color.replace('#','')})`)
    .attr('stroke','#0b0f1a').attr('stroke-width',2);
  centerG.append('circle').attr('r',12).attr('cx',-8).attr('cy',-8).attr('fill','#fff').attr('fill-opacity',0.15);
  centerG.append('text').attr('text-anchor','middle').attr('dy',4).attr('fill','#fff')
    .attr('font-size','11px').attr('font-weight','700').text(dd.center.label);
  centerG.style('cursor','pointer').on('click', e => { e.stopPropagation(); drawGalaxy(); });

  // Arrange satellites by type in orbit rings
  const typeOrder = ['risk','priority','kpi','tool','metric'];
  const sorted = [...dd.nodes].sort((a,b)=>typeOrder.indexOf(a.type)-typeOrder.indexOf(b.type));
  const perOrbit = [Math.ceil(sorted.length/3), Math.ceil(sorted.length/3)];
  perOrbit[2] = sorted.length - perOrbit[0] - perOrbit[1];

  let idx = 0;
  orbits.forEach((r, oi) => {
    const count = oi===2 ? sorted.length-idx : perOrbit[oi];
    const batch = sorted.slice(idx, idx+count);
    idx += count;
    batch.forEach((node, ni) => {
      const angle = (2*Math.PI/batch.length)*ni - Math.PI/2 + (oi*0.4);
      const x = cx + r*Math.cos(angle);
      const y = cy + r*Math.sin(angle);

      zoomG.append('line').attr('x1',cx).attr('y1',cy).attr('x2',x).attr('y2',y)
        .attr('stroke',node.color||color).attr('stroke-opacity',0.12).attr('stroke-width',1);

      const g = zoomG.append('g').attr('transform',`translate(${x},${y})`).style('cursor','default');
      g.append('circle').attr('r',node.size+5).attr('fill','none')
        .attr('stroke',node.color||color).attr('stroke-opacity',0.2).attr('stroke-width',5);
      g.append('circle').attr('r',node.size)
        .attr('fill',node.color||color).attr('fill-opacity',0.85)
        .attr('filter',`url(#glow${(node.color||color).replace('#','')})`)
        .attr('stroke','#0b0f1a').attr('stroke-width',1.5);
      g.append('circle').attr('r',node.size*0.4).attr('cx',-node.size*0.2).attr('cy',-node.size*0.2)
        .attr('fill','#fff').attr('fill-opacity',0.12);
      g.append('text').attr('class','node-label').attr('text-anchor','middle').attr('dy',node.size+13).text(node.label);
      g.append('text').attr('class','node-sublabel').attr('text-anchor','middle').attr('dy',node.size+24).text(node.sub);

      const tt = document.getElementById('graph-tooltip');
      g.on('mouseenter',(event)=>{
        document.getElementById('tt-tag').textContent = node.type||'';
        document.getElementById('tt-tag').style.color = node.color||color;
        document.getElementById('tt-title').textContent = node.label;
        document.getElementById('tt-body').textContent = node.detail||'';
        tt.style.opacity=1;
      }).on('mousemove',event=>{
        tt.style.left=(event.clientX+16)+'px';tt.style.top=(event.clientY-10)+'px';
      }).on('mouseleave',()=>{tt.style.opacity=0;});
    });
  });
}
