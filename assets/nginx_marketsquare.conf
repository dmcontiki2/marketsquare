# Reject raw IP access
server {
    listen 80;
    listen 443 ssl;
    server_name 178.104.73.239;
    ssl_certificate /etc/letsencrypt/live/trustsquare.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trustsquare.co/privkey.pem;
    return 444;
}
server {
    server_name trustsquare.co www.trustsquare.co;

    # Serve the FEA
    location = / {
        root /var/www/marketsquare;
        try_files /index.html =404;
    }

    location = /rental.html {
        root /var/www/marketsquare;
    }

    location = /dashboard.html {
        root /var/www/marketsquare;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        expires -1;
    }

    location = /admin.html {
        root /var/www/marketsquare;
    }


    location = /command.html {
        root /var/www/marketsquare;
        add_header Cache-Control 'no-store, no-cache, must-revalidate';
        expires -1;
    }
    # ── CityLauncher dashboard ───────────────────────
    location /launch/ {
        root /var/www/citylauncher;
        try_files /launch/index.html =404;
    }

    location = /launch {
        return 301 /launch/;
    }

    # ── CityLauncher API proxy ───────────────────────
    location /launch-api/ {
        rewrite ^/launch-api/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }


    # ── Demo mode ────────────────────────────────────────────
    # /demo redirects to /?demo=1 so the frontend activates demo mode.
    # Prospects see the marketplace but Sell/Wallet/Seller are hidden.
    location = /demo {
        return 301 /?demo=1;
    }

    location = /demo/ {
        return 301 /?demo=1;
    }


    # Static assets (CSS + JS) -- long cache, served directly from disk
    location /static/ {
        root /var/www/marketsquare;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Proxy API calls to FastAPI (MarketSquare)
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/trustsquare.co/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/trustsquare.co/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = www.trustsquare.co) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = trustsquare.co) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name trustsquare.co www.trustsquare.co;
    return 404; # managed by Certbot




}
