<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="809" viewBox="0 0 1080 809"><rect width="1080" height="809" fill="#ffffff"/><rect x="0" y="0" width="1080" height="86" fill="#14213d"/><text x="40" y="34" font-family="DejaVu Sans" font-size="15" font-weight="bold" fill="#9fb3d9" letter-spacing="2">ABSOLUTE MUST-HAVES · PRIVATE SALES · SOUTH AFRICA</text><text x="40" y="66" font-family="DejaVu Sans" font-size="27" font-weight="bold" fill="#ffffff">SELLING YOUR HOUSE PRIVATELY</text><rect x="964" y="24" width="76" height="38" rx="8" fill="#ffffff" opacity="0.14"/><text x="1002" y="50" font-family="DejaVu Sans" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">ZA</text><rect x="0" y="86" width="1080" height="46" fill="#3f51b5"/><text x="40" y="117" font-family="DejaVu Sans" font-size="19" font-weight="bold" fill="#ffffff" letter-spacing="1.5">PROPERTY</text><rect x="0" y="132" width="1080" height="109" fill="#ffffff"/><circle cx="72" cy="186" r="27" fill="#3f51b5"/><g transform="translate(72,186)"><rect x="-11" y="-15" width="22" height="30" rx="3" fill="#fff"/><rect x="-7" y="-9" width="14" height="2.6" rx="1.3" fill="#3f51b5"/><rect x="-7" y="-4" width="14" height="2.6" rx="1.3" fill="#3f51b5"/><rect x="-7" y="1" width="14" height="2.6" rx="1.3" fill="#3f51b5"/><rect x="-7" y="6" width="14" height="2.6" rx="1.3" fill="#3f51b5"/></g><text x="118" y="173" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Compliance Certificates</text><text x="118" y="195" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">(CoCs)</text><text x="118" y="217" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Electrical, gas, electric fence*</text><path d="M 448,186 h 26 m -8,-7 l 8,7 l -8,7" stroke="#3f51b5" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="182" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller contracts &amp; pays electrician /</text><text x="492" y="200" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">specialists</text><rect x="838" y="160" width="212" height="54" rx="6" fill="#dfe3f5"/><text x="944" y="180" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIRED BY CONVEYANCER</text><text x="944" y="196" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">FOR TRANSFER</text><rect x="0" y="240" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="241" width="1080" height="96" fill="#e8eaf6"/><circle cx="72" cy="289" r="27" fill="#3f51b5"/><g transform="translate(72,289)"><path d="M -14,-6 L 0,-15 L 14,-6 Z" fill="#fff"/><rect x="-13" y="-4" width="4.5" height="14" fill="#fff"/><rect x="-6" y="-4" width="4.5" height="14" fill="#fff"/><rect x="1" y="-4" width="4.5" height="14" fill="#fff"/><rect x="8" y="-4" width="4.5" height="14" fill="#fff"/><rect x="-14" y="11" width="28" height="4" fill="#fff"/></g><text x="118" y="286" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Rates Clearance Figures</text><text x="118" y="308" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">From the municipality</text><path d="M 448,289 h 26 m -8,-7 l 8,7 l -8,7" stroke="#3f51b5" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="284" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Conveyancing attorney requests figures —</text><text x="492" y="303" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">seller pays advance amounts</text><rect x="838" y="270" width="212" height="37" rx="6" fill="#dfe3f5"/><text x="944" y="290" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIRED BY DEEDS OFFICE</text><rect x="0" y="336" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="337" width="1080" height="109" fill="#ffffff"/><circle cx="72" cy="392" r="27" fill="#3f51b5"/><g transform="translate(72,392)"><path d="M 0,-15 L 15,-1 L 11,-1 L 11,13 L -11,13 L -11,-1 L -15,-1 Z" fill="#fff"/><rect x="-4" y="3" width="8" height="10" fill="#3f51b5"/></g><text x="118" y="378" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Body Corporate / HOA</text><text x="118" y="400" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Clearance</text><text x="118" y="422" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">If applicable (sectional title / estate)</text><path d="M 448,392 h 26 m -8,-7 l 8,7 l -8,7" stroke="#3f51b5" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="386" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Conveyancing attorney requests figures —</text><text x="492" y="406" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">seller pays levy advance</text><rect x="838" y="373" width="212" height="37" rx="6" fill="#dfe3f5"/><text x="944" y="393" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIRED BY DEEDS OFFICE</text><rect x="0" y="445" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="446" width="1080" height="109" fill="#e8eaf6"/><circle cx="72" cy="500" r="27" fill="#3f51b5"/><g transform="translate(72,500)"><rect x="-10" y="-3" width="20" height="17" rx="3" fill="#fff"/><path d="M -6,-3 v-4 a 6 6 0 0 1 12 0 v 4" fill="none" stroke="#fff" stroke-width="3.4"/></g><text x="118" y="487" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Bond Cancellation (get Title</text><text x="118" y="509" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Deed)</text><text x="118" y="531" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Original deed held by the bank</text><path d="M 448,500 h 26 m -8,-7 l 8,7 l -8,7" stroke="#3f51b5" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="486" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller notifies bank — conveyancer</text><text x="492" y="505" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">manages cancellation, bank releases</text><text x="492" y="524" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">original title deed</text><rect x="838" y="474" width="212" height="54" rx="6" fill="#dfe3f5"/><text x="944" y="494" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">HELD BY BANK UNTIL</text><text x="944" y="510" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">CANCELLED</text><rect x="0" y="554" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="555" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="603" r="27" fill="#3f51b5"/><g transform="translate(72,603)"><rect x="-15" y="-11" width="30" height="22" rx="3" fill="#fff"/><circle cx="-7" cy="-2" r="4" fill="#3f51b5"/><rect x="-11" y="4" width="8" height="2.4" fill="#3f51b5"/><rect x="2" y="-6" width="11" height="2.4" fill="#3f51b5"/><rect x="2" y="-1" width="11" height="2.4" fill="#3f51b5"/><rect x="2" y="4" width="11" height="2.4" fill="#3f51b5"/></g><text x="118" y="600" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Proof of Identity (FICA)</text><text x="118" y="622" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">ID + proof of address</text><path d="M 448,603 h 26 m -8,-7 l 8,7 l -8,7" stroke="#3f51b5" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="608" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller provides to conveyancer</text><rect x="838" y="584" width="212" height="37" rx="6" fill="#dfe3f5"/><text x="944" y="604" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">FICA COMPLIANCE</text><rect x="0" y="650" width="1080" height="1" fill="#d8dbe4"/><text x="540.0" y="683" font-family="DejaVu Sans" font-size="15.5" font-weight="bold" fill="#3f51b5" text-anchor="middle">Accredited agencies on MarketSquare manage what they may, and facilitate the rest with the right professionals.</text><rect x="90" y="699" width="900" height="64" rx="10" fill="#14213d"/><text x="540.0" y="726" font-family="DejaVu Sans" font-size="14.5" font-weight="bold" fill="#ffffff" text-anchor="middle">A private sale doesn&#x27;t mean “no legal process.” A conveyancer is still needed for the</text><text x="540.0" y="747" font-family="DejaVu Sans" font-size="14.5" font-weight="bold" fill="#ffffff" text-anchor="middle">transfer.</text><text x="40" y="789" font-family="DejaVu Sans" font-size="11.5" fill="#6b7280">*Beetle / plumbing CoCs are context-dependent (e.g. coastal areas, City of Cape Town).</text><text x="1040" y="789" font-family="DejaVu Sans" font-size="11.5" fill="#9aa1ad" text-anchor="end">General guidance for South Africa — not legal advice.</text></svg>