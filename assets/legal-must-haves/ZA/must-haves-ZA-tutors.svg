<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="801" viewBox="0 0 1080 801"><rect width="1080" height="801" fill="#ffffff"/><rect x="0" y="0" width="1080" height="86" fill="#14213d"/><text x="40" y="34" font-family="DejaVu Sans" font-size="15" font-weight="bold" fill="#9fb3d9" letter-spacing="2">ABSOLUTE MUST-HAVES · PRIVATE SALES · SOUTH AFRICA</text><text x="40" y="66" font-family="DejaVu Sans" font-size="27" font-weight="bold" fill="#ffffff">TUTORING PRIVATELY</text><rect x="964" y="24" width="76" height="38" rx="8" fill="#ffffff" opacity="0.14"/><text x="1002" y="50" font-family="DejaVu Sans" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">ZA</text><rect x="0" y="86" width="1080" height="46" fill="#c07a10"/><text x="40" y="117" font-family="DejaVu Sans" font-size="19" font-weight="bold" fill="#ffffff" letter-spacing="1.5">TUTORS</text><rect x="0" y="132" width="1080" height="109" fill="#ffffff"/><circle cx="72" cy="186" r="27" fill="#c07a10"/><g transform="translate(72,186)"><path d="M 0,-15 C 5,-12 10,-11 13,-11 C 13,2 9,11 0,15 C -9,11 -13,2 -13,-11 C -10,-11 -5,-12 0,-15 Z" fill="#fff"/><path d="M -5,-1 L -1,4 L 7,-6" fill="none" stroke="#c07a10" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="173" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Sex Offenders Register</text><text x="118" y="195" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Clearance</text><text x="118" y="217" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Children&#x27;s Act s126 — working with minors</text><path d="M 448,186 h 26 m -8,-7 l 8,7 l -8,7" stroke="#c07a10" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="182" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Tutor applies for a clearance</text><text x="492" y="200" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">certificate (Form 29, Dept of Justice)</text><rect x="838" y="160" width="212" height="54" rx="6" fill="#f7e8cc"/><text x="944" y="180" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">LEGALLY REQUIRED WHEN</text><text x="944" y="196" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">TUTORING MINORS</text><rect x="0" y="240" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="241" width="1080" height="109" fill="#fdf3e3"/><circle cx="72" cy="296" r="27" fill="#c07a10"/><g transform="translate(72,296)"><path d="M 0,-12 L 16,-5 L 0,2 L -16,-5 Z" fill="#fff"/><path d="M -8,-1 v 7 q 8,6 16,0 v -7" fill="#fff"/><rect x="14" y="-5" width="2.4" height="12" fill="#fff"/></g><text x="118" y="282" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Qualifications / SACE</text><text x="118" y="304" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Registration</text><text x="118" y="326" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">SACE applies to qualified educators</text><path d="M 448,296 h 26 m -8,-7 l 8,7 l -8,7" stroke="#c07a10" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="290" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Tutor provides certified copies to</text><text x="492" y="310" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">parents on request</text><rect x="838" y="268" width="212" height="54" rx="6" fill="#f7e8cc"/><text x="944" y="288" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">BUILDS TRUST — REQUIRED</text><text x="944" y="306" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">FOR SCHOOL-BASED WORK</text><rect x="0" y="349" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="350" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="398" r="27" fill="#c07a10"/><g transform="translate(72,398)"><rect x="-11" y="-15" width="22" height="30" rx="3" fill="#fff"/><path d="M -6,0 L -2,5 L 7,-6" fill="none" stroke="#c07a10" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="396" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Written Service Agreement</text><text x="118" y="418" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Rates, cancellation, refund terms</text><path d="M 448,398 h 26 m -8,-7 l 8,7 l -8,7" stroke="#c07a10" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="402" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Both parties sign — CPA-compliant terms</text><rect x="838" y="380" width="212" height="37" rx="6" fill="#f7e8cc"/><text x="944" y="400" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">PROTECTS BOTH PARTIES</text><rect x="0" y="445" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="446" width="1080" height="109" fill="#fdf3e3"/><circle cx="72" cy="500" r="27" fill="#c07a10"/><g transform="translate(72,500)"><rect x="-10" y="-3" width="20" height="17" rx="3" fill="#fff"/><path d="M -6,-3 v-4 a 6 6 0 0 1 12 0 v 4" fill="none" stroke="#fff" stroke-width="3.4"/></g><text x="118" y="487" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">POPIA Consent for Learner</text><text x="118" y="509" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Data</text><text x="118" y="531" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Minors&#x27; information needs guardian consent</text><path d="M 448,500 h 26 m -8,-7 l 8,7 l -8,7" stroke="#c07a10" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="496" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Parent / guardian signs consent for</text><text x="492" y="514" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">records &amp; progress reports</text><rect x="838" y="482" width="212" height="37" rx="6" fill="#f7e8cc"/><text x="944" y="502" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIRED BY POPIA</text><rect x="0" y="554" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="555" width="1080" height="109" fill="#ffffff"/><circle cx="72" cy="610" r="27" fill="#c07a10"/><g transform="translate(72,610)"><rect x="-15" y="-9" width="30" height="18" rx="3" fill="#fff"/><circle cx="0" cy="0" r="5.5" fill="#c07a10"/><rect x="-12" y="-6" width="3" height="3" fill="#c07a10"/><rect x="9" y="3" width="3" height="3" fill="#c07a10"/></g><text x="118" y="596" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Declare Tutoring Income</text><text x="118" y="618" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">(SARS)</text><text x="118" y="640" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Provisional tax may apply</text><path d="M 448,610 h 26 m -8,-7 l 8,7 l -8,7" stroke="#c07a10" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="614" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Tutor invoices and declares income</text><rect x="838" y="591" width="212" height="37" rx="6" fill="#f7e8cc"/><text x="944" y="611" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">SARS REQUIREMENT</text><rect x="0" y="663" width="1080" height="1" fill="#d8dbe4"/><text x="540.0" y="696" font-family="DejaVu Sans" font-size="15.5" font-weight="bold" fill="#c07a10" text-anchor="middle">Accredited agencies on MarketSquare manage what they may, and facilitate the rest with the right professionals.</text><rect x="90" y="712" width="900" height="43" rx="10" fill="#14213d"/><text x="540.0" y="739" font-family="DejaVu Sans" font-size="14.5" font-weight="bold" fill="#ffffff" text-anchor="middle">Working with children is regulated — clearance and consent are not optional extras.</text><text x="40" y="781" font-family="DejaVu Sans" font-size="11.5" fill="#6b7280">For in-home tutoring of minors, a parent or guardian present is strongly recommended.</text><text x="1040" y="781" font-family="DejaVu Sans" font-size="11.5" fill="#9aa1ad" text-anchor="end">General guidance for South Africa — not legal advice.</text></svg>