<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="770" viewBox="0 0 1080 770"><rect width="1080" height="770" fill="#ffffff"/><rect x="0" y="0" width="1080" height="86" fill="#14213d"/><text x="40" y="34" font-family="DejaVu Sans" font-size="15" font-weight="bold" fill="#9fb3d9" letter-spacing="2">ABSOLUTE MUST-HAVES · PRIVATE SALES · SOUTH AFRICA</text><text x="40" y="66" font-family="DejaVu Sans" font-size="27" font-weight="bold" fill="#ffffff">SELLING COLLECTABLES PRIVATELY</text><rect x="964" y="24" width="76" height="38" rx="8" fill="#ffffff" opacity="0.14"/><text x="1002" y="50" font-family="DejaVu Sans" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">ZA</text><rect x="0" y="86" width="1080" height="46" fill="#6a3ab2"/><text x="40" y="117" font-family="DejaVu Sans" font-size="19" font-weight="bold" fill="#ffffff" letter-spacing="1.5">COLLECTORS</text><rect x="0" y="132" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="180" r="27" fill="#6a3ab2"/><g transform="translate(72,180)"><path d="M -9,-11 L 9,-11 L 15,-3 L 0,14 L -15,-3 Z" fill="#fff"/><path d="M -9,-11 L 0,14 L 9,-11 M -15,-3 L 15,-3" stroke="#6a3ab2" stroke-width="2" fill="none"/></g><text x="118" y="178" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Provenance &amp; Authenticity</text><text x="118" y="200" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Certificates, receipts, grading reports</text><path d="M 448,180 h 26 m -8,-7 l 8,7 l -8,7" stroke="#6a3ab2" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="184" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller provides documentation to buyer</text><rect x="838" y="153" width="212" height="54" rx="6" fill="#e4d8f4"/><text x="944" y="173" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">PROTECTS VALUE &amp; BUYER</text><text x="944" y="190" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">TRUST</text><rect x="0" y="227" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="228" width="1080" height="109" fill="#efe8f9"/><circle cx="72" cy="282" r="27" fill="#6a3ab2"/><g transform="translate(72,282)"><rect x="-15" y="-11" width="30" height="22" rx="3" fill="#fff"/><circle cx="-7" cy="-2" r="4" fill="#6a3ab2"/><rect x="-11" y="4" width="8" height="2.4" fill="#6a3ab2"/><rect x="2" y="-6" width="11" height="2.4" fill="#6a3ab2"/><rect x="2" y="-1" width="11" height="2.4" fill="#6a3ab2"/><rect x="2" y="4" width="11" height="2.4" fill="#6a3ab2"/></g><text x="118" y="269" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Second-Hand Goods Act</text><text x="118" y="291" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Registration</text><text x="118" y="313" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">If dealing / trading regularly</text><path d="M 448,282 h 26 m -8,-7 l 8,7 l -8,7" stroke="#6a3ab2" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="287" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Dealer registers with SAPS</text><rect x="838" y="256" width="212" height="54" rx="6" fill="#e4d8f4"/><text x="944" y="276" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIRED FOR DEALERS —</text><text x="944" y="292" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">NOT ONE-OFF SALES</text><rect x="0" y="336" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="337" width="1080" height="104" fill="#ffffff"/><circle cx="72" cy="389" r="27" fill="#6a3ab2"/><g transform="translate(72,389)"><path d="M 0,-16 L 9,-4 L 5,-4 L 12,6 L -12,6 L -5,-4 L -9,-4 Z" fill="#fff"/><rect x="-2.4" y="6" width="4.8" height="8" fill="#fff"/></g><text x="118" y="378" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Heritage &amp; Wildlife Permits</text><text x="118" y="400" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">NHRA export permits; CITES (ivory, horn,</text><text x="118" y="417" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">etc.)</text><path d="M 448,389 h 26 m -8,-7 l 8,7 l -8,7" stroke="#6a3ab2" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="394" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller obtains before sale or export</text><rect x="838" y="362" width="212" height="54" rx="6" fill="#e4d8f4"/><text x="944" y="382" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">LEGALLY REQUIRED —</text><text x="944" y="399" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">SEVERE PENALTIES</text><rect x="0" y="440" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="441" width="1080" height="96" fill="#efe8f9"/><circle cx="72" cy="489" r="27" fill="#6a3ab2"/><g transform="translate(72,489)"><rect x="-11" y="-15" width="22" height="30" rx="3" fill="#fff"/><path d="M -6,0 L -2,5 L 7,-6" fill="none" stroke="#6a3ab2" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="486" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Sales Agreement (Voetstoots)</text><text x="118" y="508" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Condition &amp; authenticity documented</text><path d="M 448,489 h 26 m -8,-7 l 8,7 l -8,7" stroke="#6a3ab2" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="494" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Both parties sign</text><rect x="838" y="470" width="212" height="37" rx="6" fill="#e4d8f4"/><text x="944" y="490" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">PROTECTS SELLER</text><rect x="0" y="536" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="537" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="585" r="27" fill="#6a3ab2"/><g transform="translate(72,585)"><rect x="-15" y="-9" width="30" height="18" rx="3" fill="#fff"/><circle cx="0" cy="0" r="5.5" fill="#6a3ab2"/><rect x="-12" y="-6" width="3" height="3" fill="#6a3ab2"/><rect x="9" y="3" width="3" height="3" fill="#6a3ab2"/></g><text x="118" y="582" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Traceable Payment</text><text x="118" y="604" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Avoid large cash transactions</text><path d="M 448,585 h 26 m -8,-7 l 8,7 l -8,7" stroke="#6a3ab2" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="590" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Use bank transfer / platform payment</text><rect x="838" y="566" width="212" height="37" rx="6" fill="#e4d8f4"/><text x="944" y="586" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">STRONGLY RECOMMENDED</text><rect x="0" y="632" width="1080" height="1" fill="#d8dbe4"/><text x="540.0" y="665" font-family="DejaVu Sans" font-size="15.5" font-weight="bold" fill="#6a3ab2" text-anchor="middle">Accredited agencies on MarketSquare manage what they may, and facilitate the rest with the right professionals.</text><rect x="90" y="681" width="900" height="43" rx="10" fill="#14213d"/><text x="540.0" y="708" font-family="DejaVu Sans" font-size="14.5" font-weight="bold" fill="#ffffff" text-anchor="middle">Rare items attract rare rules — provenance and permits before price.</text><text x="40" y="750" font-family="DejaVu Sans" font-size="11.5" fill="#6b7280">One-off private sales are generally exempt from dealer registration.</text><text x="1040" y="750" font-family="DejaVu Sans" font-size="11.5" fill="#9aa1ad" text-anchor="end">General guidance for South Africa — not legal advice.</text></svg>