<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="905" viewBox="0 0 1080 905"><rect width="1080" height="905" fill="#ffffff"/><rect x="0" y="0" width="1080" height="86" fill="#14213d"/><text x="40" y="34" font-family="DejaVu Sans" font-size="15" font-weight="bold" fill="#9fb3d9" letter-spacing="2">ABSOLUTE MUST-HAVES · PRIVATE SALES · SOUTH AFRICA</text><text x="40" y="66" font-family="DejaVu Sans" font-size="27" font-weight="bold" fill="#ffffff">SELLING YOUR CAR PRIVATELY</text><rect x="964" y="24" width="76" height="38" rx="8" fill="#ffffff" opacity="0.14"/><text x="1002" y="50" font-family="DejaVu Sans" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">ZA</text><rect x="0" y="86" width="1080" height="46" fill="#2e7d54"/><text x="40" y="117" font-family="DejaVu Sans" font-size="19" font-weight="bold" fill="#ffffff" letter-spacing="1.5">CARS</text><rect x="0" y="132" width="1080" height="109" fill="#ffffff"/><circle cx="72" cy="186" r="27" fill="#2e7d54"/><g transform="translate(72,186)"><rect x="-15" y="-11" width="30" height="22" rx="3" fill="#fff"/><circle cx="-7" cy="-2" r="4" fill="#2e7d54"/><rect x="-11" y="4" width="8" height="2.4" fill="#2e7d54"/><rect x="2" y="-6" width="11" height="2.4" fill="#2e7d54"/><rect x="2" y="-1" width="11" height="2.4" fill="#2e7d54"/><rect x="2" y="4" width="11" height="2.4" fill="#2e7d54"/></g><text x="118" y="173" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Original NaTIS Certificate</text><text x="118" y="195" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">(RC1)</text><text x="118" y="217" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Proves ownership</text><path d="M 448,186 h 26 m -8,-7 l 8,7 l -8,7" stroke="#2e7d54" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="182" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller pays off finance (if any) — bank</text><text x="492" y="200" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">then provides the RC1</text><rect x="838" y="168" width="212" height="37" rx="6" fill="#d5ecdd"/><text x="944" y="188" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">MANDATORY FOR SALE</text><rect x="0" y="240" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="241" width="1080" height="109" fill="#e3f2e9"/><circle cx="72" cy="296" r="27" fill="#2e7d54"/><g transform="translate(72,296)"><rect x="-11" y="-15" width="22" height="30" rx="3" fill="#fff"/><path d="M -6,0 L -2,5 L 7,-6" fill="none" stroke="#2e7d54" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="282" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">NCO (Yellow Form) — Change of</text><text x="118" y="304" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Ownership</text><text x="118" y="326" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Notification of Change of Ownership</text><path d="M 448,296 h 26 m -8,-7 l 8,7 l -8,7" stroke="#2e7d54" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="281" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller completes &amp; submits to the</text><text x="492" y="300" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">licensing department — releases seller</text><text x="492" y="319" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">from liability</text><rect x="838" y="277" width="212" height="37" rx="6" fill="#d5ecdd"/><text x="944" y="297" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">SELLER RESPONSIBILITY</text><rect x="0" y="349" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="350" width="1080" height="109" fill="#ffffff"/><circle cx="72" cy="404" r="27" fill="#2e7d54"/><g transform="translate(72,404)"><rect x="-11" y="-15" width="22" height="30" rx="3" fill="#fff"/><rect x="-7" y="-9" width="14" height="2.6" rx="1.3" fill="#2e7d54"/><rect x="-7" y="-4" width="14" height="2.6" rx="1.3" fill="#2e7d54"/><rect x="-7" y="1" width="14" height="2.6" rx="1.3" fill="#2e7d54"/><rect x="-7" y="6" width="14" height="2.6" rx="1.3" fill="#2e7d54"/></g><text x="118" y="391" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">RLV (Blue Form) — Buyer&#x27;s</text><text x="118" y="413" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Application</text><text x="118" y="435" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Application for registration &amp; licensing</text><path d="M 448,404 h 26 m -8,-7 l 8,7 l -8,7" stroke="#2e7d54" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="409" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller provides to buyer</text><rect x="838" y="378" width="212" height="54" rx="6" fill="#d5ecdd"/><text x="944" y="398" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">FOR BUYER TO REGISTER</text><text x="944" y="414" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">CAR</text><rect x="0" y="458" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="459" width="1080" height="96" fill="#e3f2e9"/><circle cx="72" cy="507" r="27" fill="#2e7d54"/><g transform="translate(72,507)"><path d="M -14,4 L -11,-4 Q -10,-7 -6,-7 L 6,-7 Q 9,-7 11,-4 L 14,4 Z" fill="#fff"/><rect x="-15" y="3" width="30" height="7" rx="3" fill="#fff"/><circle cx="-8" cy="11" r="3.4" fill="#2e7d54" stroke="#fff" stroke-width="2"/><circle cx="8" cy="11" r="3.4" fill="#2e7d54" stroke="#fff" stroke-width="2"/></g><text x="118" y="504" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Roadworthy Certificate (RWC)</text><text x="118" y="526" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Needed to register in buyer&#x27;s name</text><path d="M 448,507 h 26 m -8,-7 l 8,7 l -8,7" stroke="#2e7d54" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="502" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Buyer&#x27;s responsibility to obtain — buyer</text><text x="492" y="521" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">must register within 21 days of sale</text><rect x="838" y="488" width="212" height="37" rx="6" fill="#d5ecdd"/><text x="944" y="508" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">BUYER&#x27;S RESPONSIBILITY</text><rect x="0" y="554" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="555" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="603" r="27" fill="#2e7d54"/><g transform="translate(72,603)"><rect x="-11" y="-15" width="22" height="30" rx="3" fill="#fff"/><path d="M -6,0 L -2,5 L 7,-6" fill="none" stroke="#2e7d54" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="600" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Sales Agreement (Voetstoots)</text><text x="118" y="622" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Documents price, condition, parties</text><path d="M 448,603 h 26 m -8,-7 l 8,7 l -8,7" stroke="#2e7d54" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="608" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Both parties sign</text><rect x="838" y="576" width="212" height="54" rx="6" fill="#d5ecdd"/><text x="944" y="596" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">PROTECTS SELLER,</text><text x="944" y="613" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">DOCUMENTS TRANSACTION</text><rect x="0" y="650" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="651" width="1080" height="96" fill="#e3f2e9"/><circle cx="72" cy="699" r="27" fill="#2e7d54"/><g transform="translate(72,699)"><rect x="-15" y="-11" width="30" height="22" rx="3" fill="#fff"/><circle cx="-7" cy="-2" r="4" fill="#2e7d54"/><rect x="-11" y="4" width="8" height="2.4" fill="#2e7d54"/><rect x="2" y="-6" width="11" height="2.4" fill="#2e7d54"/><rect x="2" y="-1" width="11" height="2.4" fill="#2e7d54"/><rect x="2" y="4" width="11" height="2.4" fill="#2e7d54"/></g><text x="118" y="696" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Identity Documents</text><text x="118" y="718" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Certified copies</text><path d="M 448,699 h 26 m -8,-7 l 8,7 l -8,7" stroke="#2e7d54" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="704" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Copies exchanged by both parties</text><rect x="838" y="680" width="212" height="37" rx="6" fill="#d5ecdd"/><text x="944" y="700" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIRED FOR NCO &amp; RLV</text><rect x="0" y="746" width="1080" height="1" fill="#d8dbe4"/><text x="540.0" y="779" font-family="DejaVu Sans" font-size="15.5" font-weight="bold" fill="#2e7d54" text-anchor="middle">Accredited agencies on MarketSquare manage what they may, and facilitate the rest with the right professionals.</text><rect x="90" y="795" width="900" height="64" rx="10" fill="#14213d"/><text x="540.0" y="822" font-family="DejaVu Sans" font-size="14.5" font-weight="bold" fill="#ffffff" text-anchor="middle">A private sale doesn&#x27;t mean “no legal process.” Paperwork protects the seller from fines</text><text x="540.0" y="843" font-family="DejaVu Sans" font-size="14.5" font-weight="bold" fill="#ffffff" text-anchor="middle">&amp; liability.</text><text x="40" y="885" font-family="DejaVu Sans" font-size="11.5" fill="#6b7280">Seller submits the NCO; buyer applies with RLV &amp; RWC and must register within 21 days.</text><text x="1040" y="885" font-family="DejaVu Sans" font-size="11.5" fill="#9aa1ad" text-anchor="end">General guidance for South Africa — not legal advice.</text></svg>