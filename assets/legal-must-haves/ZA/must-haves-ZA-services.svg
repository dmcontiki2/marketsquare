<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="770" viewBox="0 0 1080 770"><rect width="1080" height="770" fill="#ffffff"/><rect x="0" y="0" width="1080" height="86" fill="#14213d"/><text x="40" y="34" font-family="DejaVu Sans" font-size="15" font-weight="bold" fill="#9fb3d9" letter-spacing="2">ABSOLUTE MUST-HAVES · PRIVATE SALES · SOUTH AFRICA</text><text x="40" y="66" font-family="DejaVu Sans" font-size="27" font-weight="bold" fill="#ffffff">OFFERING TRADE SERVICES PRIVATELY</text><rect x="964" y="24" width="76" height="38" rx="8" fill="#ffffff" opacity="0.14"/><text x="1002" y="50" font-family="DejaVu Sans" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">ZA</text><rect x="0" y="86" width="1080" height="46" fill="#00838f"/><text x="40" y="117" font-family="DejaVu Sans" font-size="19" font-weight="bold" fill="#ffffff" letter-spacing="1.5">SERVICES</text><rect x="0" y="132" width="1080" height="104" fill="#ffffff"/><circle cx="72" cy="184" r="27" fill="#00838f"/><g transform="translate(72,184)"><path d="M 2,-16 L -9,2 L -1,2 L -3,16 L 9,-3 L 1,-3 Z" fill="#fff"/></g><text x="118" y="173" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Trade Registration / Licence</text><text x="118" y="195" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Electricians: Dept of Employment &amp; Labour.</text><text x="118" y="212" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Plumbers: PIRB</text><path d="M 448,184 h 26 m -8,-7 l 8,7 l -8,7" stroke="#00838f" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="179" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Provider registers before doing</text><text x="492" y="198" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">regulated work</text><rect x="838" y="157" width="212" height="54" rx="6" fill="#cfe9ec"/><text x="944" y="177" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIRED TO ISSUE</text><text x="944" y="194" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">COMPLIANCE CERTIFICATES</text><rect x="0" y="235" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="236" width="1080" height="109" fill="#e0f2f4"/><circle cx="72" cy="290" r="27" fill="#00838f"/><g transform="translate(72,290)"><rect x="-11" y="-15" width="22" height="30" rx="3" fill="#fff"/><path d="M -6,0 L -2,5 L 7,-6" fill="none" stroke="#00838f" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="277" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Written Quote &amp; Contract</text><text x="118" y="299" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">(CPA)</text><text x="118" y="321" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Itemised, agreed before work starts</text><path d="M 448,290 h 26 m -8,-7 l 8,7 l -8,7" stroke="#00838f" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="286" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">No work beyond the quote without client</text><text x="492" y="304" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">consent</text><rect x="838" y="272" width="212" height="37" rx="6" fill="#cfe9ec"/><text x="944" y="292" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">CPA REQUIREMENT</text><rect x="0" y="344" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="345" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="393" r="27" fill="#00838f"/><g transform="translate(72,393)"><path d="M 0,-15 C 5,-12 10,-11 13,-11 C 13,2 9,11 0,15 C -9,11 -13,2 -13,-11 C -10,-11 -5,-12 0,-15 Z" fill="#fff"/><path d="M -5,-1 L -1,4 L 7,-6" fill="none" stroke="#00838f" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="390" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Public Liability Insurance</text><text x="118" y="412" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Covers damage &amp; injury on site</text><path d="M 448,393 h 26 m -8,-7 l 8,7 l -8,7" stroke="#00838f" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="398" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Provider arranges own cover</text><rect x="838" y="366" width="212" height="54" rx="6" fill="#cfe9ec"/><text x="944" y="386" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">PROTECTS CLIENT &amp;</text><text x="944" y="403" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">PROVIDER</text><rect x="0" y="440" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="441" width="1080" height="96" fill="#e0f2f4"/><circle cx="72" cy="489" r="27" fill="#00838f"/><g transform="translate(72,489)"><rect x="-15" y="-11" width="30" height="22" rx="3" fill="#fff"/><circle cx="-7" cy="-2" r="4" fill="#00838f"/><rect x="-11" y="4" width="8" height="2.4" fill="#00838f"/><rect x="2" y="-6" width="11" height="2.4" fill="#00838f"/><rect x="2" y="-1" width="11" height="2.4" fill="#00838f"/><rect x="2" y="4" width="11" height="2.4" fill="#00838f"/></g><text x="118" y="486" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">COIDA Registration</text><text x="118" y="508" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">If the provider employs workers</text><path d="M 448,489 h 26 m -8,-7 l 8,7 l -8,7" stroke="#00838f" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="494" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Register with the Compensation Fund</text><rect x="838" y="462" width="212" height="54" rx="6" fill="#cfe9ec"/><text x="944" y="482" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">LEGALLY REQUIRED FOR</text><text x="944" y="499" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">EMPLOYERS</text><rect x="0" y="536" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="537" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="585" r="27" fill="#00838f"/><g transform="translate(72,585)"><path d="M 0,-15 L 4,-5 L 15,-5 L 6,2 L 9,13 L 0,7 L -9,13 L -6,2 L -15,-5 L -4,-5 Z" fill="#fff"/></g><text x="118" y="582" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">CPA Workmanship Warranty</text><text x="118" y="604" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Implied 6-month warranty on services &amp; goods</text><path d="M 448,585 h 26 m -8,-7 l 8,7 l -8,7" stroke="#00838f" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="580" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Applies automatically — put it in</text><text x="492" y="599" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">writing anyway</text><rect x="838" y="558" width="212" height="54" rx="6" fill="#cfe9ec"/><text x="944" y="578" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">AUTOMATIC UNDER CPA</text><text x="944" y="595" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">s56/57</text><rect x="0" y="632" width="1080" height="1" fill="#d8dbe4"/><text x="540.0" y="665" font-family="DejaVu Sans" font-size="15.5" font-weight="bold" fill="#00838f" text-anchor="middle">Accredited agencies on MarketSquare manage what they may, and facilitate the rest with the right professionals.</text><rect x="90" y="681" width="900" height="43" rx="10" fill="#14213d"/><text x="540.0" y="708" font-family="DejaVu Sans" font-size="14.5" font-weight="bold" fill="#ffffff" text-anchor="middle">Unregistered work on regulated trades can void insurance and CoCs.</text><text x="40" y="750" font-family="DejaVu Sans" font-size="11.5" fill="#6b7280">CIDB registration is required for public-sector construction work above thresholds.</text><text x="1040" y="750" font-family="DejaVu Sans" font-size="11.5" fill="#9aa1ad" text-anchor="end">General guidance for South Africa — not legal advice.</text></svg>