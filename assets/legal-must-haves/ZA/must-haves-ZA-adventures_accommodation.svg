<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="901" viewBox="0 0 1080 901"><rect width="1080" height="901" fill="#ffffff"/><rect x="0" y="0" width="1080" height="86" fill="#14213d"/><text x="40" y="34" font-family="DejaVu Sans" font-size="15" font-weight="bold" fill="#9fb3d9" letter-spacing="2">ABSOLUTE MUST-HAVES · PRIVATE SALES · SOUTH AFRICA</text><text x="40" y="66" font-family="DejaVu Sans" font-size="27" font-weight="bold" fill="#ffffff">HOSTING GUESTS PRIVATELY</text><rect x="964" y="24" width="76" height="38" rx="8" fill="#ffffff" opacity="0.14"/><text x="1002" y="50" font-family="DejaVu Sans" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">ZA</text><rect x="0" y="86" width="1080" height="46" fill="#0277bd"/><text x="40" y="117" font-family="DejaVu Sans" font-size="19" font-weight="bold" fill="#ffffff" letter-spacing="1.5">ADVENTURES — ACCOMMODATION</text><rect x="0" y="132" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="180" r="27" fill="#0277bd"/><g transform="translate(72,180)"><path d="M 0,-15 L 15,-1 L 11,-1 L 11,13 L -11,13 L -11,-1 L -15,-1 Z" fill="#fff"/><rect x="-4" y="3" width="8" height="10" fill="#0277bd"/></g><text x="118" y="178" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Zoning / Land-Use Consent</text><text x="118" y="200" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Consent use for guesthouse or B&amp;B</text><path d="M 448,180 h 26 m -8,-7 l 8,7 l -8,7" stroke="#0277bd" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="184" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Host applies to the municipality</text><rect x="838" y="162" width="212" height="37" rx="6" fill="#d2e8f6"/><text x="944" y="182" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIRED BY MUNICIPALITY</text><rect x="0" y="227" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="228" width="1080" height="109" fill="#e3f1fa"/><circle cx="72" cy="282" r="27" fill="#0277bd"/><g transform="translate(72,282)"><path d="M 0,-15 C 6,-8 11,-3 11,4 A 11 11 0 0 1 -11,4 C -11,-1 -8,-5 -5,-8 C -5,-4 -3,-2 0,-1 C -2,-6 -2,-10 0,-15 Z" fill="#fff"/></g><text x="118" y="269" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Health &amp; Fire Safety</text><text x="118" y="291" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Compliance</text><text x="118" y="313" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Occupancy certificate, fire equipment</text><path d="M 448,282 h 26 m -8,-7 l 8,7 l -8,7" stroke="#0277bd" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="287" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Host arranges inspection &amp; equipment</text><rect x="838" y="256" width="212" height="54" rx="6" fill="#d2e8f6"/><text x="944" y="276" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIRED BY MUNICIPAL</text><text x="944" y="292" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">BYLAWS</text><rect x="0" y="336" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="337" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="385" r="27" fill="#0277bd"/><g transform="translate(72,385)"><rect x="-11" y="-15" width="22" height="30" rx="3" fill="#fff"/><path d="M -6,0 L -2,5 L 7,-6" fill="none" stroke="#0277bd" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="382" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Guest Indemnity &amp; House Rules</text><text x="118" y="404" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Signed at check-in</text><path d="M 448,385 h 26 m -8,-7 l 8,7 l -8,7" stroke="#0277bd" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="390" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Host provides &amp; keeps signed copies</text><rect x="838" y="366" width="212" height="37" rx="6" fill="#d2e8f6"/><text x="944" y="386" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">PROTECTS HOST</text><rect x="0" y="432" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="433" width="1080" height="126" fill="#e3f1fa"/><circle cx="72" cy="496" r="27" fill="#0277bd"/><g transform="translate(72,496)"><path d="M 0,-15 C 5,-12 10,-11 13,-11 C 13,2 9,11 0,15 C -9,11 -13,2 -13,-11 C -10,-11 -5,-12 0,-15 Z" fill="#fff"/><path d="M -5,-1 L -1,4 L 7,-6" fill="none" stroke="#0277bd" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="474" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Hospitality / Public</text><text x="118" y="496" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Liability Insurance</text><text x="118" y="518" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Standard home policies usually exclude</text><text x="118" y="535" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">paying guests</text><path d="M 448,496 h 26 m -8,-7 l 8,7 l -8,7" stroke="#0277bd" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="500" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Host arranges specific cover</text><rect x="838" y="478" width="212" height="37" rx="6" fill="#d2e8f6"/><text x="944" y="498" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">PROTECTS HOST &amp; GUESTS</text><rect x="0" y="558" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="559" width="1080" height="109" fill="#ffffff"/><circle cx="72" cy="614" r="27" fill="#0277bd"/><g transform="translate(72,614)"><rect x="-10" y="-3" width="20" height="17" rx="3" fill="#fff"/><path d="M -6,-3 v-4 a 6 6 0 0 1 12 0 v 4" fill="none" stroke="#fff" stroke-width="3.4"/></g><text x="118" y="600" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">POPIA-Compliant Guest</text><text x="118" y="622" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Register</text><text x="118" y="644" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Guest ID details stored securely</text><path d="M 448,614 h 26 m -8,-7 l 8,7 l -8,7" stroke="#0277bd" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="618" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Host keeps register, protects data</text><rect x="838" y="595" width="212" height="37" rx="6" fill="#d2e8f6"/><text x="944" y="615" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIRED BY POPIA</text><rect x="0" y="667" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="668" width="1080" height="96" fill="#e3f1fa"/><circle cx="72" cy="716" r="27" fill="#0277bd"/><g transform="translate(72,716)"><path d="M 0,-15 L 4,-5 L 15,-5 L 6,2 L 9,13 L 0,7 L -9,13 L -6,2 L -15,-5 L -4,-5 Z" fill="#fff"/></g><text x="118" y="714" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">TGCSA Star Grading</text><text x="118" y="736" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Optional but boosts credibility &amp; bookings</text><path d="M 448,716 h 26 m -8,-7 l 8,7 l -8,7" stroke="#0277bd" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="711" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Host applies to the Tourism Grading</text><text x="492" y="730" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Council</text><rect x="838" y="698" width="212" height="37" rx="6" fill="#d2e8f6"/><text x="944" y="718" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">OPTIONAL — RECOMMENDED</text><rect x="0" y="763" width="1080" height="1" fill="#d8dbe4"/><text x="540.0" y="796" font-family="DejaVu Sans" font-size="15.5" font-weight="bold" fill="#0277bd" text-anchor="middle">Accredited agencies on MarketSquare manage what they may, and facilitate the rest with the right professionals.</text><rect x="90" y="812" width="900" height="43" rx="10" fill="#14213d"/><text x="540.0" y="839" font-family="DejaVu Sans" font-size="14.5" font-weight="bold" fill="#ffffff" text-anchor="middle">Paying guests change your legal position — zoning, insurance and safety rules apply.</text><text x="40" y="881" font-family="DejaVu Sans" font-size="11.5" fill="#6b7280">Some municipalities require a specific accommodation licence — check local bylaws.</text><text x="1040" y="881" font-family="DejaVu Sans" font-size="11.5" fill="#9aa1ad" text-anchor="end">General guidance for South Africa — not legal advice.</text></svg>