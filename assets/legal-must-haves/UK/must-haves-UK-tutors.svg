<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="762" viewBox="0 0 1080 762"><rect width="1080" height="762" fill="#ffffff"/><rect x="0" y="0" width="1080" height="86" fill="#14213d"/><text x="40" y="34" font-family="DejaVu Sans" font-size="15" font-weight="bold" fill="#9fb3d9" letter-spacing="2">ABSOLUTE MUST-HAVES · PRIVATE SALES · UNITED KINGDOM</text><text x="40" y="66" font-family="DejaVu Sans" font-size="27" font-weight="bold" fill="#ffffff">TUTORING PRIVATELY</text><rect x="964" y="24" width="76" height="38" rx="8" fill="#ffffff" opacity="0.14"/><text x="1002" y="50" font-family="DejaVu Sans" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">UK</text><rect x="0" y="86" width="1080" height="46" fill="#c07a10"/><text x="40" y="117" font-family="DejaVu Sans" font-size="19" font-weight="bold" fill="#ffffff" letter-spacing="1.5">TUTORS</text><rect x="0" y="132" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="180" r="27" fill="#c07a10"/><g transform="translate(72,180)"><path d="M 0,-15 C 5,-12 10,-11 13,-11 C 13,2 9,11 0,15 C -9,11 -13,2 -13,-11 C -10,-11 -5,-12 0,-15 Z" fill="#fff"/><path d="M -5,-1 L -1,4 L 7,-6" fill="none" stroke="#c07a10" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="178" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Enhanced DBS Check</text><text x="118" y="200" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Expected when tutoring children</text><path d="M 448,180 h 26 m -8,-7 l 8,7 l -8,7" stroke="#c07a10" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="175" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Tutor obtains via an umbrella body —</text><text x="492" y="194" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">parents may ask to see it</text><rect x="838" y="153" width="212" height="54" rx="6" fill="#f7e8cc"/><text x="944" y="173" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">EXPECTED FOR MINORS —</text><text x="944" y="190" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIRED FOR SCHOOLS</text><rect x="0" y="227" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="228" width="1080" height="96" fill="#fdf3e3"/><circle cx="72" cy="276" r="27" fill="#c07a10"/><g transform="translate(72,276)"><rect x="-11" y="-15" width="22" height="30" rx="3" fill="#fff"/><path d="M -6,0 L -2,5 L 7,-6" fill="none" stroke="#c07a10" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="274" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Written Tutoring Agreement</text><text x="118" y="296" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Rates, cancellation, refunds</text><path d="M 448,276 h 26 m -8,-7 l 8,7 l -8,7" stroke="#c07a10" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="271" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Both parties sign — Consumer Rights Act</text><text x="492" y="290" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">applies</text><rect x="838" y="258" width="212" height="37" rx="6" fill="#f7e8cc"/><text x="944" y="278" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">PROTECTS BOTH PARTIES</text><rect x="0" y="323" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="324" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="372" r="27" fill="#c07a10"/><g transform="translate(72,372)"><rect x="-10" y="-3" width="20" height="17" rx="3" fill="#fff"/><path d="M -6,-3 v-4 a 6 6 0 0 1 12 0 v 4" fill="none" stroke="#fff" stroke-width="3.4"/></g><text x="118" y="370" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">UK GDPR — Pupil Data</text><text x="118" y="392" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Consent &amp; secure records</text><path d="M 448,372 h 26 m -8,-7 l 8,7 l -8,7" stroke="#c07a10" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="367" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Parent / guardian consents for minors&#x27;</text><text x="492" y="386" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">data</text><rect x="838" y="354" width="212" height="37" rx="6" fill="#f7e8cc"/><text x="944" y="374" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIRED BY UK GDPR</text><rect x="0" y="419" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="420" width="1080" height="96" fill="#fdf3e3"/><circle cx="72" cy="468" r="27" fill="#c07a10"/><g transform="translate(72,468)"><rect x="-15" y="-9" width="30" height="18" rx="3" fill="#fff"/><circle cx="0" cy="0" r="5.5" fill="#c07a10"/><rect x="-12" y="-6" width="3" height="3" fill="#c07a10"/><rect x="9" y="3" width="3" height="3" fill="#c07a10"/></g><text x="118" y="466" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Register with HMRC</text><text x="118" y="488" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Self-assessment for tutoring income</text><path d="M 448,468 h 26 m -8,-7 l 8,7 l -8,7" stroke="#c07a10" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="472" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Tutor registers &amp; declares income</text><rect x="838" y="450" width="212" height="37" rx="6" fill="#f7e8cc"/><text x="944" y="470" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">HMRC REQUIREMENT</text><rect x="0" y="515" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="516" width="1080" height="109" fill="#ffffff"/><circle cx="72" cy="570" r="27" fill="#c07a10"/><g transform="translate(72,570)"><path d="M 0,-15 L 4,-5 L 15,-5 L 6,2 L 9,13 L 0,7 L -9,13 L -6,2 L -15,-5 L -4,-5 Z" fill="#fff"/></g><text x="118" y="557" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Public Liability /</text><text x="118" y="579" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Professional Indemnity</text><text x="118" y="601" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Especially for in-person tuition</text><path d="M 448,570 h 26 m -8,-7 l 8,7 l -8,7" stroke="#c07a10" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="575" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Tutor arranges own cover</text><rect x="838" y="552" width="212" height="37" rx="6" fill="#f7e8cc"/><text x="944" y="572" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">RECOMMENDED</text><rect x="0" y="624" width="1080" height="1" fill="#d8dbe4"/><text x="540.0" y="657" font-family="DejaVu Sans" font-size="15.5" font-weight="bold" fill="#c07a10" text-anchor="middle">Accredited agencies on MarketSquare manage what they may, and facilitate the rest with the right professionals.</text><rect x="90" y="673" width="900" height="43" rx="10" fill="#14213d"/><text x="540.0" y="700" font-family="DejaVu Sans" font-size="14.5" font-weight="bold" fill="#ffffff" text-anchor="middle">Safeguarding first — a current DBS is the baseline parents expect.</text><text x="40" y="742" font-family="DejaVu Sans" font-size="11.5" fill="#6b7280">Self-employed tutors can&#x27;t apply for their own enhanced DBS directly — use an umbrella body.</text><text x="1040" y="742" font-family="DejaVu Sans" font-size="11.5" fill="#9aa1ad" text-anchor="end">General guidance for the United Kingdom — not legal advice.</text></svg>