<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="778" viewBox="0 0 1080 778"><rect width="1080" height="778" fill="#ffffff"/><rect x="0" y="0" width="1080" height="86" fill="#14213d"/><text x="40" y="34" font-family="DejaVu Sans" font-size="15" font-weight="bold" fill="#9fb3d9" letter-spacing="2">ABSOLUTE MUST-HAVES · PRIVATE SALES · UNITED KINGDOM</text><text x="40" y="66" font-family="DejaVu Sans" font-size="27" font-weight="bold" fill="#ffffff">OFFERING EXPERIENCES PRIVATELY</text><rect x="964" y="24" width="76" height="38" rx="8" fill="#ffffff" opacity="0.14"/><text x="1002" y="50" font-family="DejaVu Sans" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">UK</text><rect x="0" y="86" width="1080" height="46" fill="#d84315"/><text x="40" y="117" font-family="DejaVu Sans" font-size="19" font-weight="bold" fill="#ffffff" letter-spacing="1.5">ADVENTURES — EXPERIENCES</text><rect x="0" y="132" width="1080" height="104" fill="#ffffff"/><circle cx="72" cy="184" r="27" fill="#d84315"/><g transform="translate(72,184)"><rect x="-15" y="-11" width="30" height="22" rx="3" fill="#fff"/><circle cx="-7" cy="-2" r="4" fill="#d84315"/><rect x="-11" y="4" width="8" height="2.4" fill="#d84315"/><rect x="2" y="-6" width="11" height="2.4" fill="#d84315"/><rect x="2" y="-1" width="11" height="2.4" fill="#d84315"/><rect x="2" y="4" width="11" height="2.4" fill="#d84315"/></g><text x="118" y="173" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">AALA Licence</text><text x="118" y="195" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Adventure activities for under-18s</text><text x="118" y="212" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">(climbing, caving, trekking, watersports)</text><path d="M 448,184 h 26 m -8,-7 l 8,7 l -8,7" stroke="#d84315" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="179" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Operator licenses before taking young</text><text x="492" y="198" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">people</text><rect x="838" y="157" width="212" height="54" rx="6" fill="#f6dccf"/><text x="944" y="177" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">LEGALLY REQUIRED FOR</text><text x="944" y="194" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">UNDER-18s</text><rect x="0" y="235" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="236" width="1080" height="104" fill="#fbe9e2"/><circle cx="72" cy="288" r="27" fill="#d84315"/><g transform="translate(72,288)"><rect x="-11" y="-15" width="22" height="30" rx="3" fill="#fff"/><path d="M -6,0 L -2,5 L 7,-6" fill="none" stroke="#d84315" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="277" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Risk Assessment &amp; Waivers</text><text x="118" y="299" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">HSE duty of care — waivers can&#x27;t exclude</text><text x="118" y="316" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">injury liability</text><path d="M 448,288 h 26 m -8,-7 l 8,7 l -8,7" stroke="#d84315" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="283" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Operator documents risks; participants</text><text x="492" y="302" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">acknowledge them</text><rect x="838" y="270" width="212" height="37" rx="6" fill="#f6dccf"/><text x="944" y="290" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">HSE REQUIREMENT</text><rect x="0" y="339" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="340" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="388" r="27" fill="#d84315"/><g transform="translate(72,388)"><path d="M 0,-15 C 5,-12 10,-11 13,-11 C 13,2 9,11 0,15 C -9,11 -13,2 -13,-11 C -10,-11 -5,-12 0,-15 Z" fill="#fff"/><path d="M -5,-1 L -1,4 L 7,-6" fill="none" stroke="#d84315" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="386" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Public Liability Insurance</text><text x="118" y="408" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Adequate for the activity</text><path d="M 448,388 h 26 m -8,-7 l 8,7 l -8,7" stroke="#d84315" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="392" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Operator arranges own cover</text><rect x="838" y="370" width="212" height="37" rx="6" fill="#f6dccf"/><text x="944" y="390" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">ESSENTIAL PROTECTION</text><rect x="0" y="435" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="436" width="1080" height="96" fill="#fbe9e2"/><circle cx="72" cy="484" r="27" fill="#d84315"/><g transform="translate(72,484)"><rect x="-13" y="-13" width="26" height="26" rx="4" fill="#fff"/><path d="M 0,-8 v 16 M -8,0 h 16" stroke="#d84315" stroke-width="5" stroke-linecap="round"/></g><text x="118" y="482" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">First Aid Certification</text><text x="118" y="504" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Appropriate to activity &amp; remoteness</text><path d="M 448,484 h 26 m -8,-7 l 8,7 l -8,7" stroke="#d84315" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="488" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Guides keep certification current</text><rect x="838" y="466" width="212" height="37" rx="6" fill="#f6dccf"/><text x="944" y="486" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">INDUSTRY REQUIREMENT</text><rect x="0" y="531" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="532" width="1080" height="109" fill="#ffffff"/><circle cx="72" cy="586" r="27" fill="#d84315"/><g transform="translate(72,586)"><path d="M 0,-16 L 9,-4 L 5,-4 L 12,6 L -12,6 L -5,-4 L -9,-4 Z" fill="#fff"/><rect x="-2.4" y="6" width="4.8" height="8" fill="#fff"/></g><text x="118" y="573" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Landowner / Access</text><text x="118" y="595" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Permissions</text><text x="118" y="617" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">National parks, private estates</text><path d="M 448,586 h 26 m -8,-7 l 8,7 l -8,7" stroke="#d84315" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="591" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Operator obtains permission per venue</text><rect x="838" y="568" width="212" height="37" rx="6" fill="#f6dccf"/><text x="944" y="588" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIRED PER VENUE</text><rect x="0" y="640" width="1080" height="1" fill="#d8dbe4"/><text x="540.0" y="673" font-family="DejaVu Sans" font-size="15.5" font-weight="bold" fill="#d84315" text-anchor="middle">Accredited agencies on MarketSquare manage what they may, and facilitate the rest with the right professionals.</text><rect x="90" y="689" width="900" height="43" rx="10" fill="#14213d"/><text x="540.0" y="716" font-family="DejaVu Sans" font-size="14.5" font-weight="bold" fill="#ffffff" text-anchor="middle">UK law won&#x27;t let a waiver excuse negligence causing injury — run the activity safely.</text><text x="40" y="758" font-family="DejaVu Sans" font-size="11.5" fill="#6b7280">AALA licensing applies in Britain for listed activities with under-18s.</text><text x="1040" y="758" font-family="DejaVu Sans" font-size="11.5" fill="#9aa1ad" text-anchor="end">General guidance for the United Kingdom — not legal advice.</text></svg>