<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="944" viewBox="0 0 1080 944"><rect width="1080" height="944" fill="#ffffff"/><rect x="0" y="0" width="1080" height="86" fill="#14213d"/><text x="40" y="34" font-family="DejaVu Sans" font-size="15" font-weight="bold" fill="#9fb3d9" letter-spacing="2">ABSOLUTE MUST-HAVES · PRIVATE SALES · UNITED KINGDOM</text><text x="40" y="66" font-family="DejaVu Sans" font-size="27" font-weight="bold" fill="#ffffff">SELLING YOUR HOUSE PRIVATELY</text><rect x="964" y="24" width="76" height="38" rx="8" fill="#ffffff" opacity="0.14"/><text x="1002" y="50" font-family="DejaVu Sans" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">UK</text><rect x="0" y="86" width="1080" height="46" fill="#3f51b5"/><text x="40" y="117" font-family="DejaVu Sans" font-size="19" font-weight="bold" fill="#ffffff" letter-spacing="1.5">PROPERTY</text><rect x="0" y="132" width="1080" height="126" fill="#ffffff"/><circle cx="72" cy="195" r="27" fill="#3f51b5"/><g transform="translate(72,195)"><rect x="-11" y="-15" width="22" height="30" rx="3" fill="#fff"/><rect x="-7" y="-9" width="14" height="2.6" rx="1.3" fill="#3f51b5"/><rect x="-7" y="-4" width="14" height="2.6" rx="1.3" fill="#3f51b5"/><rect x="-7" y="1" width="14" height="2.6" rx="1.3" fill="#3f51b5"/><rect x="-7" y="6" width="14" height="2.6" rx="1.3" fill="#3f51b5"/></g><text x="118" y="173" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Energy Performance</text><text x="118" y="195" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Certificate (EPC)</text><text x="118" y="217" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Legally required before marketing; valid 10</text><text x="118" y="234" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">years</text><path d="M 448,195 h 26 m -8,-7 l 8,7 l -8,7" stroke="#3f51b5" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="190" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller commissions an assessor — unless</text><text x="492" y="209" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">a valid EPC exists</text><rect x="838" y="168" width="212" height="54" rx="6" fill="#dfe3f5"/><text x="944" y="188" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">LEGAL REQUIREMENT TO</text><text x="944" y="205" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">MARKET</text><rect x="0" y="257" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="258" width="1080" height="105" fill="#e8eaf6"/><circle cx="72" cy="310" r="27" fill="#3f51b5"/><g transform="translate(72,310)"><rect x="-11" y="-15" width="22" height="30" rx="3" fill="#fff"/><path d="M -6,0 L -2,5 L 7,-6" fill="none" stroke="#3f51b5" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="308" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">TA6 Property Information Form</text><text x="118" y="330" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">6th edition compulsory from 30 March 2026</text><path d="M 448,310 h 26 m -8,-7 l 8,7 l -8,7" stroke="#3f51b5" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="296" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller completes fully &amp; honestly —</text><text x="492" y="315" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">disputes, flooding, knotweed,</text><text x="492" y="334" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">alterations</text><rect x="838" y="284" width="212" height="54" rx="6" fill="#dfe3f5"/><text x="944" y="304" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIRED — MISSTATEMENT</text><text x="944" y="320" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">= LIABILITY</text><rect x="0" y="362" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="363" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="411" r="27" fill="#3f51b5"/><g transform="translate(72,411)"><path d="M 0,-15 L 4,-5 L 15,-5 L 6,2 L 9,13 L 0,7 L -9,13 L -6,2 L -15,-5 L -4,-5 Z" fill="#fff"/></g><text x="118" y="408" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Upfront Material Information</text><text x="118" y="430" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Trading Standards — before viewings</text><path d="M 448,411 h 26 m -8,-7 l 8,7 l -8,7" stroke="#3f51b5" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="406" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Tenure, price, council tax band &amp; known</text><text x="492" y="425" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">issues disclosed in the listing</text><rect x="838" y="392" width="212" height="37" rx="6" fill="#dfe3f5"/><text x="944" y="412" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIRED IN LISTINGS</text><rect x="0" y="458" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="459" width="1080" height="109" fill="#e8eaf6"/><circle cx="72" cy="514" r="27" fill="#3f51b5"/><g transform="translate(72,514)"><path d="M -14,-6 L 0,-15 L 14,-6 Z" fill="#fff"/><rect x="-13" y="-4" width="4.5" height="14" fill="#fff"/><rect x="-6" y="-4" width="4.5" height="14" fill="#fff"/><rect x="1" y="-4" width="4.5" height="14" fill="#fff"/><rect x="8" y="-4" width="4.5" height="14" fill="#fff"/><rect x="-14" y="11" width="28" height="4" fill="#fff"/></g><text x="118" y="500" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Title Deeds / Land Registry</text><text x="118" y="522" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Copies</text><text x="118" y="544" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Proof of ownership</text><path d="M 448,514 h 26 m -8,-7 l 8,7 l -8,7" stroke="#3f51b5" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="508" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Conveyancing solicitor obtains official</text><text x="492" y="528" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">copies</text><rect x="838" y="486" width="212" height="54" rx="6" fill="#dfe3f5"/><text x="944" y="506" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIRED FOR</text><text x="944" y="524" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">CONVEYANCING</text><rect x="0" y="567" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="568" width="1080" height="109" fill="#ffffff"/><circle cx="72" cy="622" r="27" fill="#3f51b5"/><g transform="translate(72,622)"><path d="M 0,-15 L 15,-1 L 11,-1 L 11,13 L -11,13 L -11,-1 L -15,-1 Z" fill="#fff"/><rect x="-4" y="3" width="8" height="10" fill="#3f51b5"/></g><text x="118" y="609" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Building Regs &amp; Warranty</text><text x="118" y="631" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Certificates</text><text x="118" y="653" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">FENSA, Gas Safe, electrical works</text><path d="M 448,622 h 26 m -8,-7 l 8,7 l -8,7" stroke="#3f51b5" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="627" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller gathers certificates &amp; guarantees</text><rect x="838" y="596" width="212" height="54" rx="6" fill="#dfe3f5"/><text x="944" y="616" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">BUYER&#x27;S SOLICITOR WILL</text><text x="944" y="632" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">ASK</text><rect x="0" y="676" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="677" width="1080" height="109" fill="#e8eaf6"/><circle cx="72" cy="732" r="27" fill="#3f51b5"/><g transform="translate(72,732)"><rect x="-15" y="-11" width="30" height="22" rx="3" fill="#fff"/><circle cx="-7" cy="-2" r="4" fill="#3f51b5"/><rect x="-11" y="4" width="8" height="2.4" fill="#3f51b5"/><rect x="2" y="-6" width="11" height="2.4" fill="#3f51b5"/><rect x="2" y="-1" width="11" height="2.4" fill="#3f51b5"/><rect x="2" y="4" width="11" height="2.4" fill="#3f51b5"/></g><text x="118" y="718" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">ID &amp; Anti-Money-Laundering</text><text x="118" y="740" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Checks</text><text x="118" y="762" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Proof of identity &amp; address</text><path d="M 448,732 h 26 m -8,-7 l 8,7 l -8,7" stroke="#3f51b5" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="736" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller provides to solicitor</text><rect x="838" y="713" width="212" height="37" rx="6" fill="#dfe3f5"/><text x="944" y="733" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">AML COMPLIANCE</text><rect x="0" y="785" width="1080" height="1" fill="#d8dbe4"/><text x="540.0" y="818" font-family="DejaVu Sans" font-size="15.5" font-weight="bold" fill="#3f51b5" text-anchor="middle">Accredited agencies on MarketSquare manage what they may, and facilitate the rest with the right professionals.</text><rect x="90" y="834" width="900" height="64" rx="10" fill="#14213d"/><text x="540.0" y="861" font-family="DejaVu Sans" font-size="14.5" font-weight="bold" fill="#ffffff" text-anchor="middle">A private sale still needs a conveyancing solicitor — and upfront information is now the</text><text x="540.0" y="882" font-family="DejaVu Sans" font-size="14.5" font-weight="bold" fill="#ffffff" text-anchor="middle">law.</text><text x="40" y="924" font-family="DejaVu Sans" font-size="11.5" fill="#6b7280">England &amp; Wales shown — Scotland requires a Home Report and uses a different process.</text><text x="1040" y="924" font-family="DejaVu Sans" font-size="11.5" fill="#9aa1ad" text-anchor="end">General guidance for the United Kingdom — not legal advice.</text></svg>