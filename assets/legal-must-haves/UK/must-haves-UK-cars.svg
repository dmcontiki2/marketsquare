<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="770" viewBox="0 0 1080 770"><rect width="1080" height="770" fill="#ffffff"/><rect x="0" y="0" width="1080" height="86" fill="#14213d"/><text x="40" y="34" font-family="DejaVu Sans" font-size="15" font-weight="bold" fill="#9fb3d9" letter-spacing="2">ABSOLUTE MUST-HAVES · PRIVATE SALES · UNITED KINGDOM</text><text x="40" y="66" font-family="DejaVu Sans" font-size="27" font-weight="bold" fill="#ffffff">SELLING YOUR CAR PRIVATELY</text><rect x="964" y="24" width="76" height="38" rx="8" fill="#ffffff" opacity="0.14"/><text x="1002" y="50" font-family="DejaVu Sans" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">UK</text><rect x="0" y="86" width="1080" height="46" fill="#2e7d54"/><text x="40" y="117" font-family="DejaVu Sans" font-size="19" font-weight="bold" fill="#ffffff" letter-spacing="1.5">CARS</text><rect x="0" y="132" width="1080" height="109" fill="#ffffff"/><circle cx="72" cy="186" r="27" fill="#2e7d54"/><g transform="translate(72,186)"><rect x="-15" y="-11" width="30" height="22" rx="3" fill="#fff"/><circle cx="-7" cy="-2" r="4" fill="#2e7d54"/><rect x="-11" y="4" width="8" height="2.4" fill="#2e7d54"/><rect x="2" y="-6" width="11" height="2.4" fill="#2e7d54"/><rect x="2" y="-1" width="11" height="2.4" fill="#2e7d54"/><rect x="2" y="4" width="11" height="2.4" fill="#2e7d54"/></g><text x="118" y="173" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">V5C Registration Certificate</text><text x="118" y="195" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">(Logbook)</text><text x="118" y="217" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Proves the registered keeper</text><path d="M 448,186 h 26 m -8,-7 l 8,7 l -8,7" stroke="#2e7d54" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="182" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller uses the V5C to transfer the</text><text x="492" y="200" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">vehicle — buyer gets the new-keeper slip</text><rect x="838" y="168" width="212" height="37" rx="6" fill="#d5ecdd"/><text x="944" y="188" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">MANDATORY — DVLA</text><rect x="0" y="240" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="241" width="1080" height="96" fill="#e3f2e9"/><circle cx="72" cy="289" r="27" fill="#2e7d54"/><g transform="translate(72,289)"><rect x="-11" y="-15" width="22" height="30" rx="3" fill="#fff"/><path d="M -6,0 L -2,5 L 7,-6" fill="none" stroke="#2e7d54" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="286" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Notify DVLA of Sale</text><text x="118" y="308" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Instant online — ends the seller&#x27;s liability</text><path d="M 448,289 h 26 m -8,-7 l 8,7 l -8,7" stroke="#2e7d54" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="284" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller reports the transfer; remaining</text><text x="492" y="303" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">road tax is refunded automatically</text><rect x="838" y="270" width="212" height="37" rx="6" fill="#d5ecdd"/><text x="944" y="290" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">SELLER RESPONSIBILITY</text><rect x="0" y="336" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="337" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="385" r="27" fill="#2e7d54"/><g transform="translate(72,385)"><path d="M -14,4 L -11,-4 Q -10,-7 -6,-7 L 6,-7 Q 9,-7 11,-4 L 14,4 Z" fill="#fff"/><rect x="-15" y="3" width="30" height="7" rx="3" fill="#fff"/><circle cx="-8" cy="11" r="3.4" fill="#2e7d54" stroke="#fff" stroke-width="2"/><circle cx="8" cy="11" r="3.4" fill="#2e7d54" stroke="#fff" stroke-width="2"/></g><text x="118" y="382" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">MOT Certificate</text><text x="118" y="404" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Required if the car is over 3 years old</text><path d="M 448,385 h 26 m -8,-7 l 8,7 l -8,7" stroke="#2e7d54" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="380" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Buyer can verify MOT history free at</text><text x="492" y="399" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">gov.uk</text><rect x="838" y="358" width="212" height="54" rx="6" fill="#d5ecdd"/><text x="944" y="378" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">LEGAL TO DRIVE = VALID</text><text x="944" y="395" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">MOT</text><rect x="0" y="432" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="433" width="1080" height="104" fill="#e3f2e9"/><circle cx="72" cy="485" r="27" fill="#2e7d54"/><g transform="translate(72,485)"><rect x="-15" y="-9" width="30" height="18" rx="3" fill="#fff"/><circle cx="0" cy="0" r="5.5" fill="#2e7d54"/><rect x="-12" y="-6" width="3" height="3" fill="#2e7d54"/><rect x="9" y="3" width="3" height="3" fill="#2e7d54"/></g><text x="118" y="474" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Settle Outstanding Finance</text><text x="118" y="496" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">A car can&#x27;t legally be sold with finance</text><text x="118" y="513" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">owing</text><path d="M 448,485 h 26 m -8,-7 l 8,7 l -8,7" stroke="#2e7d54" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="480" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller settles first — buyer should run</text><text x="492" y="499" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">an HPI check</text><rect x="838" y="466" width="212" height="37" rx="6" fill="#d5ecdd"/><text x="944" y="486" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">MANDATORY BEFORE SALE</text><rect x="0" y="536" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="537" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="585" r="27" fill="#2e7d54"/><g transform="translate(72,585)"><rect x="-11" y="-15" width="22" height="30" rx="3" fill="#fff"/><rect x="-7" y="-9" width="14" height="2.6" rx="1.3" fill="#2e7d54"/><rect x="-7" y="-4" width="14" height="2.6" rx="1.3" fill="#2e7d54"/><rect x="-7" y="1" width="14" height="2.6" rx="1.3" fill="#2e7d54"/><rect x="-7" y="6" width="14" height="2.6" rx="1.3" fill="#2e7d54"/></g><text x="118" y="582" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Receipt &amp; Service History</text><text x="118" y="604" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Private sale — “sold as seen”</text><path d="M 448,585 h 26 m -8,-7 l 8,7 l -8,7" stroke="#2e7d54" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="580" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Both parties sign a dated receipt;</text><text x="492" y="599" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">seller hands over history</text><rect x="838" y="566" width="212" height="37" rx="6" fill="#d5ecdd"/><text x="944" y="586" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">PROTECTS BOTH PARTIES</text><rect x="0" y="632" width="1080" height="1" fill="#d8dbe4"/><text x="540.0" y="665" font-family="DejaVu Sans" font-size="15.5" font-weight="bold" fill="#2e7d54" text-anchor="middle">Accredited agencies on MarketSquare manage what they may, and facilitate the rest with the right professionals.</text><rect x="90" y="681" width="900" height="43" rx="10" fill="#14213d"/><text x="540.0" y="708" font-family="DejaVu Sans" font-size="14.5" font-weight="bold" fill="#ffffff" text-anchor="middle">Tell DVLA immediately — until then, speeding fines and tolls come to you.</text><text x="40" y="750" font-family="DejaVu Sans" font-size="11.5" fill="#6b7280">Buyer must tax the vehicle before driving away — road tax no longer transfers.</text><text x="1040" y="750" font-family="DejaVu Sans" font-size="11.5" fill="#9aa1ad" text-anchor="end">General guidance for the United Kingdom — not legal advice.</text></svg>