<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="787" viewBox="0 0 1080 787"><rect width="1080" height="787" fill="#ffffff"/><rect x="0" y="0" width="1080" height="86" fill="#14213d"/><text x="40" y="34" font-family="DejaVu Sans" font-size="15" font-weight="bold" fill="#9fb3d9" letter-spacing="2">ABSOLUTE MUST-HAVES · PRIVATE SALES · UNITED KINGDOM</text><text x="40" y="66" font-family="DejaVu Sans" font-size="27" font-weight="bold" fill="#ffffff">HOSTING GUESTS PRIVATELY</text><rect x="964" y="24" width="76" height="38" rx="8" fill="#ffffff" opacity="0.14"/><text x="1002" y="50" font-family="DejaVu Sans" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">UK</text><rect x="0" y="86" width="1080" height="46" fill="#0277bd"/><text x="40" y="117" font-family="DejaVu Sans" font-size="19" font-weight="bold" fill="#ffffff" letter-spacing="1.5">ADVENTURES — ACCOMMODATION</text><rect x="0" y="132" width="1080" height="126" fill="#ffffff"/><circle cx="72" cy="195" r="27" fill="#0277bd"/><g transform="translate(72,195)"><path d="M 0,-15 L 15,-1 L 11,-1 L 11,13 L -11,13 L -11,-1 L -15,-1 Z" fill="#fff"/><rect x="-4" y="3" width="8" height="10" fill="#0277bd"/></g><text x="118" y="173" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Planning Permission / Change</text><text x="118" y="195" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">of Use</text><text x="118" y="217" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Guesthouse or B&amp;B may need consent; London:</text><text x="118" y="234" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">90-night rule</text><path d="M 448,195 h 26 m -8,-7 l 8,7 l -8,7" stroke="#0277bd" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="200" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Host checks with the local council</text><rect x="838" y="176" width="212" height="37" rx="6" fill="#d2e8f6"/><text x="944" y="196" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIRED BY COUNCIL</text><rect x="0" y="257" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="258" width="1080" height="104" fill="#e3f1fa"/><circle cx="72" cy="310" r="27" fill="#0277bd"/><g transform="translate(72,310)"><path d="M 0,-15 C 6,-8 11,-3 11,4 A 11 11 0 0 1 -11,4 C -11,-1 -8,-5 -5,-8 C -5,-4 -3,-2 0,-1 C -2,-6 -2,-10 0,-15 Z" fill="#fff"/></g><text x="118" y="299" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Fire Risk Assessment</text><text x="118" y="321" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Fire Safety Order 2005 applies to paying</text><text x="118" y="338" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">guests</text><path d="M 448,310 h 26 m -8,-7 l 8,7 l -8,7" stroke="#0277bd" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="305" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Host completes &amp; documents — alarms,</text><text x="492" y="324" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">extinguishers, escape routes</text><rect x="838" y="292" width="212" height="37" rx="6" fill="#d2e8f6"/><text x="944" y="312" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">LEGAL REQUIREMENT</text><rect x="0" y="361" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="362" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="410" r="27" fill="#0277bd"/><g transform="translate(72,410)"><path d="M 2,-16 L -9,2 L -1,2 L -3,16 L 9,-3 L 1,-3 Z" fill="#fff"/></g><text x="118" y="408" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Annual Gas Safety Certificate</text><text x="118" y="430" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">If guests use gas appliances</text><path d="M 448,410 h 26 m -8,-7 l 8,7 l -8,7" stroke="#0277bd" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="414" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Gas Safe engineer inspects yearly</text><rect x="838" y="392" width="212" height="37" rx="6" fill="#d2e8f6"/><text x="944" y="412" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">LEGAL REQUIREMENT</text><rect x="0" y="457" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="458" width="1080" height="96" fill="#e3f1fa"/><circle cx="72" cy="506" r="27" fill="#0277bd"/><g transform="translate(72,506)"><path d="M 0,-15 C 5,-12 10,-11 13,-11 C 13,2 9,11 0,15 C -9,11 -13,2 -13,-11 C -10,-11 -5,-12 0,-15 Z" fill="#fff"/><path d="M -5,-1 L -1,4 L 7,-6" fill="none" stroke="#0277bd" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="504" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Public Liability Insurance</text><text x="118" y="526" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Home policies exclude paying guests</text><path d="M 448,506 h 26 m -8,-7 l 8,7 l -8,7" stroke="#0277bd" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="510" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Host arranges guest-house / STR cover</text><rect x="838" y="488" width="212" height="37" rx="6" fill="#d2e8f6"/><text x="944" y="508" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">PROTECTS HOST &amp; GUESTS</text><rect x="0" y="553" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="554" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="602" r="27" fill="#0277bd"/><g transform="translate(72,602)"><rect x="-10" y="-3" width="20" height="17" rx="3" fill="#fff"/><path d="M -6,-3 v-4 a 6 6 0 0 1 12 0 v 4" fill="none" stroke="#fff" stroke-width="3.4"/></g><text x="118" y="600" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">UK GDPR Guest Records</text><text x="118" y="622" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">ID details stored securely</text><path d="M 448,602 h 26 m -8,-7 l 8,7 l -8,7" stroke="#0277bd" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="606" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Host keeps a register &amp; protects data</text><rect x="838" y="584" width="212" height="37" rx="6" fill="#d2e8f6"/><text x="944" y="604" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIRED BY UK GDPR</text><rect x="0" y="649" width="1080" height="1" fill="#d8dbe4"/><text x="540.0" y="682" font-family="DejaVu Sans" font-size="15.5" font-weight="bold" fill="#0277bd" text-anchor="middle">Accredited agencies on MarketSquare manage what they may, and facilitate the rest with the right professionals.</text><rect x="90" y="698" width="900" height="43" rx="10" fill="#14213d"/><text x="540.0" y="725" font-family="DejaVu Sans" font-size="14.5" font-weight="bold" fill="#ffffff" text-anchor="middle">Paying guests trigger fire law — the risk assessment is where inspections start.</text><text x="40" y="767" font-family="DejaVu Sans" font-size="11.5" fill="#6b7280">Some councils require registration or licensing of short lets — check locally.</text><text x="1040" y="767" font-family="DejaVu Sans" font-size="11.5" fill="#9aa1ad" text-anchor="end">General guidance for the United Kingdom — not legal advice.</text></svg>