<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="800" viewBox="0 0 1080 800"><rect width="1080" height="800" fill="#ffffff"/><rect x="0" y="0" width="1080" height="86" fill="#14213d"/><text x="40" y="34" font-family="DejaVu Sans" font-size="15" font-weight="bold" fill="#9fb3d9" letter-spacing="2">ABSOLUTE MUST-HAVES · PRIVATE SALES · UNITED KINGDOM</text><text x="40" y="66" font-family="DejaVu Sans" font-size="27" font-weight="bold" fill="#ffffff">SELLING COLLECTABLES PRIVATELY</text><rect x="964" y="24" width="76" height="38" rx="8" fill="#ffffff" opacity="0.14"/><text x="1002" y="50" font-family="DejaVu Sans" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">UK</text><rect x="0" y="86" width="1080" height="46" fill="#6a3ab2"/><text x="40" y="117" font-family="DejaVu Sans" font-size="19" font-weight="bold" fill="#ffffff" letter-spacing="1.5">COLLECTORS</text><rect x="0" y="132" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="180" r="27" fill="#6a3ab2"/><g transform="translate(72,180)"><path d="M -9,-11 L 9,-11 L 15,-3 L 0,14 L -15,-3 Z" fill="#fff"/><path d="M -9,-11 L 0,14 L 9,-11 M -15,-3 L 15,-3" stroke="#6a3ab2" stroke-width="2" fill="none"/></g><text x="118" y="178" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Provenance &amp; Authentication</text><text x="118" y="200" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Certificates, receipts, grading reports</text><path d="M 448,180 h 26 m -8,-7 l 8,7 l -8,7" stroke="#6a3ab2" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="184" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller provides documentation to buyer</text><rect x="838" y="153" width="212" height="54" rx="6" fill="#e4d8f4"/><text x="944" y="173" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">PROTECTS VALUE &amp; BUYER</text><text x="944" y="190" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">TRUST</text><rect x="0" y="227" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="228" width="1080" height="104" fill="#efe8f9"/><circle cx="72" cy="280" r="27" fill="#6a3ab2"/><g transform="translate(72,280)"><path d="M 0,-16 L 9,-4 L 5,-4 L 12,6 L -12,6 L -5,-4 L -9,-4 Z" fill="#fff"/><rect x="-2.4" y="6" width="4.8" height="8" fill="#fff"/></g><text x="118" y="269" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">UK Ivory Act &amp; CITES</text><text x="118" y="291" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Near-total ivory ban; permits for listed</text><text x="118" y="308" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">species</text><path d="M 448,280 h 26 m -8,-7 l 8,7 l -8,7" stroke="#6a3ab2" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="275" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller checks legality / registers an</text><text x="492" y="294" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">exemption before listing</text><rect x="838" y="253" width="212" height="54" rx="6" fill="#e4d8f4"/><text x="944" y="273" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">CRIMINAL OFFENCE IF</text><text x="944" y="290" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">BREACHED</text><rect x="0" y="331" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="332" width="1080" height="126" fill="#ffffff"/><circle cx="72" cy="395" r="27" fill="#6a3ab2"/><g transform="translate(72,395)"><rect x="-11" y="-15" width="22" height="30" rx="3" fill="#fff"/><rect x="-7" y="-9" width="14" height="2.6" rx="1.3" fill="#6a3ab2"/><rect x="-7" y="-4" width="14" height="2.6" rx="1.3" fill="#6a3ab2"/><rect x="-7" y="1" width="14" height="2.6" rx="1.3" fill="#6a3ab2"/><rect x="-7" y="6" width="14" height="2.6" rx="1.3" fill="#6a3ab2"/></g><text x="118" y="373" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Export Licences (Cultural</text><text x="118" y="395" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Goods)</text><text x="118" y="417" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Arts Council licence for older / valuable</text><text x="118" y="434" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">items leaving the UK</text><path d="M 448,395 h 26 m -8,-7 l 8,7 l -8,7" stroke="#6a3ab2" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="400" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller applies before export</text><rect x="838" y="376" width="212" height="37" rx="6" fill="#e4d8f4"/><text x="944" y="396" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIRED FOR EXPORT</text><rect x="0" y="457" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="458" width="1080" height="109" fill="#efe8f9"/><circle cx="72" cy="512" r="27" fill="#6a3ab2"/><g transform="translate(72,512)"><rect x="-11" y="-15" width="22" height="30" rx="3" fill="#fff"/><path d="M -6,0 L -2,5 L 7,-6" fill="none" stroke="#6a3ab2" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="499" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Receipt / Sale Agreement</text><text x="118" y="521" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">(Sold As Seen)</text><text x="118" y="543" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Condition &amp; authenticity documented</text><path d="M 448,512 h 26 m -8,-7 l 8,7 l -8,7" stroke="#6a3ab2" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="517" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Both parties sign</text><rect x="838" y="494" width="212" height="37" rx="6" fill="#e4d8f4"/><text x="944" y="514" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">PROTECTS SELLER</text><rect x="0" y="566" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="567" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="615" r="27" fill="#6a3ab2"/><g transform="translate(72,615)"><rect x="-15" y="-9" width="30" height="18" rx="3" fill="#fff"/><circle cx="0" cy="0" r="5.5" fill="#6a3ab2"/><rect x="-12" y="-6" width="3" height="3" fill="#6a3ab2"/><rect x="9" y="3" width="3" height="3" fill="#6a3ab2"/></g><text x="118" y="612" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Traceable Payment</text><text x="118" y="634" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Avoid large cash deals</text><path d="M 448,615 h 26 m -8,-7 l 8,7 l -8,7" stroke="#6a3ab2" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="620" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Bank transfer / platform payment</text><rect x="838" y="596" width="212" height="37" rx="6" fill="#e4d8f4"/><text x="944" y="616" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">STRONGLY RECOMMENDED</text><rect x="0" y="662" width="1080" height="1" fill="#d8dbe4"/><text x="540.0" y="695" font-family="DejaVu Sans" font-size="15.5" font-weight="bold" fill="#6a3ab2" text-anchor="middle">Accredited agencies on MarketSquare manage what they may, and facilitate the rest with the right professionals.</text><rect x="90" y="711" width="900" height="43" rx="10" fill="#14213d"/><text x="540.0" y="738" font-family="DejaVu Sans" font-size="14.5" font-weight="bold" fill="#ffffff" text-anchor="middle">Rare items attract rare rules — ivory and cultural exports are criminal-law territory.</text><text x="40" y="780" font-family="DejaVu Sans" font-size="11.5" fill="#6b7280">Art-market dealers over €10,000 must register with HMRC for AML — private one-offs generally exempt.</text><text x="1040" y="780" font-family="DejaVu Sans" font-size="11.5" fill="#9aa1ad" text-anchor="end">General guidance for the United Kingdom — not legal advice.</text></svg>