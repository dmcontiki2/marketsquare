<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="787" viewBox="0 0 1080 787"><rect width="1080" height="787" fill="#ffffff"/><rect x="0" y="0" width="1080" height="86" fill="#14213d"/><text x="40" y="34" font-family="DejaVu Sans" font-size="15" font-weight="bold" fill="#9fb3d9" letter-spacing="2">ABSOLUTE MUST-HAVES · PRIVATE SALES · AUSTRALIA</text><text x="40" y="66" font-family="DejaVu Sans" font-size="27" font-weight="bold" fill="#ffffff">SELLING YOUR CAR PRIVATELY</text><rect x="964" y="24" width="76" height="38" rx="8" fill="#ffffff" opacity="0.14"/><text x="1002" y="50" font-family="DejaVu Sans" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">AU</text><rect x="0" y="86" width="1080" height="46" fill="#2e7d54"/><text x="40" y="117" font-family="DejaVu Sans" font-size="19" font-weight="bold" fill="#ffffff" letter-spacing="1.5">CARS</text><rect x="0" y="132" width="1080" height="126" fill="#ffffff"/><circle cx="72" cy="195" r="27" fill="#2e7d54"/><g transform="translate(72,195)"><path d="M -14,4 L -11,-4 Q -10,-7 -6,-7 L 6,-7 Q 9,-7 11,-4 L 14,4 Z" fill="#fff"/><rect x="-15" y="3" width="30" height="7" rx="3" fill="#fff"/><circle cx="-8" cy="11" r="3.4" fill="#2e7d54" stroke="#fff" stroke-width="2"/><circle cx="8" cy="11" r="3.4" fill="#2e7d54" stroke="#fff" stroke-width="2"/></g><text x="118" y="173" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Roadworthy / Safety</text><text x="118" y="195" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Certificate</text><text x="118" y="217" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">VIC: RWC. QLD: safety certificate. NSW: tied</text><text x="118" y="234" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">to rego (pink slip)</text><path d="M 448,195 h 26 m -8,-7 l 8,7 l -8,7" stroke="#2e7d54" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="190" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller obtains from a licensed tester</text><text x="492" y="209" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">before sale — state-dependent</text><rect x="838" y="176" width="212" height="37" rx="6" fill="#d5ecdd"/><text x="944" y="196" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIRED IN MOST STATES</text><rect x="0" y="257" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="258" width="1080" height="96" fill="#e3f2e9"/><circle cx="72" cy="306" r="27" fill="#2e7d54"/><g transform="translate(72,306)"><rect x="-11" y="-15" width="22" height="30" rx="3" fill="#fff"/><path d="M -6,0 L -2,5 L 7,-6" fill="none" stroke="#2e7d54" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="304" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Transfer of Registration</text><text x="118" y="326" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Lodged with the state transport authority</text><path d="M 448,306 h 26 m -8,-7 l 8,7 l -8,7" stroke="#2e7d54" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="301" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Buyer &amp; seller complete the transfer —</text><text x="492" y="320" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">usually within 14 days</text><rect x="838" y="288" width="212" height="37" rx="6" fill="#d5ecdd"/><text x="944" y="308" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">STATE REQUIREMENT</text><rect x="0" y="353" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="354" width="1080" height="104" fill="#ffffff"/><circle cx="72" cy="406" r="27" fill="#2e7d54"/><g transform="translate(72,406)"><path d="M 0,-15 C 5,-12 10,-11 13,-11 C 13,2 9,11 0,15 C -9,11 -13,2 -13,-11 C -10,-11 -5,-12 0,-15 Z" fill="#fff"/><path d="M -5,-1 L -1,4 L 7,-6" fill="none" stroke="#2e7d54" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="395" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Notice of Disposal</text><text x="118" y="417" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Ends the seller&#x27;s liability for tolls &amp;</text><text x="118" y="434" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">fines</text><path d="M 448,406 h 26 m -8,-7 l 8,7 l -8,7" stroke="#2e7d54" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="410" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller lodges immediately after the sale</text><rect x="838" y="388" width="212" height="37" rx="6" fill="#d5ecdd"/><text x="944" y="408" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">SELLER RESPONSIBILITY</text><rect x="0" y="457" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="458" width="1080" height="96" fill="#e3f2e9"/><circle cx="72" cy="506" r="27" fill="#2e7d54"/><g transform="translate(72,506)"><rect x="-15" y="-9" width="30" height="18" rx="3" fill="#fff"/><circle cx="0" cy="0" r="5.5" fill="#2e7d54"/><rect x="-12" y="-6" width="3" height="3" fill="#2e7d54"/><rect x="9" y="3" width="3" height="3" fill="#2e7d54"/></g><text x="118" y="504" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">PPSR Check &amp; Finance Payout</text><text x="118" y="526" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">No selling with money owing</text><path d="M 448,506 h 26 m -8,-7 l 8,7 l -8,7" stroke="#2e7d54" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="501" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller clears finance — buyer checks the</text><text x="492" y="520" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">PPSR ($2 online)</text><rect x="838" y="488" width="212" height="37" rx="6" fill="#d5ecdd"/><text x="944" y="508" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">MANDATORY BEFORE SALE</text><rect x="0" y="553" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="554" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="602" r="27" fill="#2e7d54"/><g transform="translate(72,602)"><rect x="-11" y="-15" width="22" height="30" rx="3" fill="#fff"/><rect x="-7" y="-9" width="14" height="2.6" rx="1.3" fill="#2e7d54"/><rect x="-7" y="-4" width="14" height="2.6" rx="1.3" fill="#2e7d54"/><rect x="-7" y="1" width="14" height="2.6" rx="1.3" fill="#2e7d54"/><rect x="-7" y="6" width="14" height="2.6" rx="1.3" fill="#2e7d54"/></g><text x="118" y="600" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Receipt / Contract of Sale</text><text x="118" y="622" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Price, date, odometer, both parties</text><path d="M 448,602 h 26 m -8,-7 l 8,7 l -8,7" stroke="#2e7d54" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="606" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Both parties sign</text><rect x="838" y="584" width="212" height="37" rx="6" fill="#d5ecdd"/><text x="944" y="604" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">PROTECTS BOTH PARTIES</text><rect x="0" y="649" width="1080" height="1" fill="#d8dbe4"/><text x="540.0" y="682" font-family="DejaVu Sans" font-size="15.5" font-weight="bold" fill="#2e7d54" text-anchor="middle">Accredited agencies on MarketSquare manage what they may, and facilitate the rest with the right professionals.</text><rect x="90" y="698" width="900" height="43" rx="10" fill="#14213d"/><text x="540.0" y="725" font-family="DejaVu Sans" font-size="14.5" font-weight="bold" fill="#ffffff" text-anchor="middle">Lodge the notice of disposal the same day — until then, tolls and fines are yours.</text><text x="40" y="767" font-family="DejaVu Sans" font-size="11.5" fill="#6b7280">Each state&#x27;s transport authority (Service NSW, VicRoads, TMR…) has its own forms.</text><text x="1040" y="767" font-family="DejaVu Sans" font-size="11.5" fill="#9aa1ad" text-anchor="end">General guidance for Australia — not legal advice.</text></svg>