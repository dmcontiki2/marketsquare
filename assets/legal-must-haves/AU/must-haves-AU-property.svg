<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="835" viewBox="0 0 1080 835"><rect width="1080" height="835" fill="#ffffff"/><rect x="0" y="0" width="1080" height="86" fill="#14213d"/><text x="40" y="34" font-family="DejaVu Sans" font-size="15" font-weight="bold" fill="#9fb3d9" letter-spacing="2">ABSOLUTE MUST-HAVES · PRIVATE SALES · AUSTRALIA</text><text x="40" y="66" font-family="DejaVu Sans" font-size="27" font-weight="bold" fill="#ffffff">SELLING YOUR HOUSE PRIVATELY</text><rect x="964" y="24" width="76" height="38" rx="8" fill="#ffffff" opacity="0.14"/><text x="1002" y="50" font-family="DejaVu Sans" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">AU</text><rect x="0" y="86" width="1080" height="46" fill="#3f51b5"/><text x="40" y="117" font-family="DejaVu Sans" font-size="19" font-weight="bold" fill="#ffffff" letter-spacing="1.5">PROPERTY</text><rect x="0" y="132" width="1080" height="126" fill="#ffffff"/><circle cx="72" cy="195" r="27" fill="#3f51b5"/><g transform="translate(72,195)"><rect x="-11" y="-15" width="22" height="30" rx="3" fill="#fff"/><path d="M -6,0 L -2,5 L 7,-6" fill="none" stroke="#3f51b5" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="173" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Contract of Sale + Vendor</text><text x="118" y="195" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Disclosure</text><text x="118" y="217" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">VIC: Section 32; NSW: contract required</text><text x="118" y="234" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">before marketing</text><path d="M 448,195 h 26 m -8,-7 l 8,7 l -8,7" stroke="#3f51b5" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="190" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Solicitor / conveyancer prepares BEFORE</text><text x="492" y="209" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">the property is listed</text><rect x="838" y="168" width="212" height="54" rx="6" fill="#dfe3f5"/><text x="944" y="188" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">LEGALLY REQUIRED TO</text><text x="944" y="205" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">MARKET</text><rect x="0" y="257" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="258" width="1080" height="105" fill="#e8eaf6"/><circle cx="72" cy="310" r="27" fill="#3f51b5"/><g transform="translate(72,310)"><rect x="-15" y="-9" width="30" height="18" rx="3" fill="#fff"/><circle cx="0" cy="0" r="5.5" fill="#3f51b5"/><rect x="-12" y="-6" width="3" height="3" fill="#3f51b5"/><rect x="9" y="3" width="3" height="3" fill="#3f51b5"/></g><text x="118" y="300" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">ATO Clearance Certificate</text><text x="118" y="322" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">All sellers, every price level (since Jan</text><text x="118" y="338" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">2025)</text><path d="M 448,310 h 26 m -8,-7 l 8,7 l -8,7" stroke="#3f51b5" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="296" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller applies early (up to 28 days) —</text><text x="492" y="315" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">without it the buyer withholds 15% at</text><text x="492" y="334" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">settlement</text><rect x="838" y="284" width="212" height="54" rx="6" fill="#dfe3f5"/><text x="944" y="304" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIRED — 15% WITHHELD</text><text x="944" y="320" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">WITHOUT IT</text><rect x="0" y="362" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="363" width="1080" height="109" fill="#ffffff"/><circle cx="72" cy="418" r="27" fill="#3f51b5"/><g transform="translate(72,418)"><path d="M -14,-6 L 0,-15 L 14,-6 Z" fill="#fff"/><rect x="-13" y="-4" width="4.5" height="14" fill="#fff"/><rect x="-6" y="-4" width="4.5" height="14" fill="#fff"/><rect x="1" y="-4" width="4.5" height="14" fill="#fff"/><rect x="8" y="-4" width="4.5" height="14" fill="#fff"/><rect x="-14" y="11" width="28" height="4" fill="#fff"/></g><text x="118" y="404" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Title Search &amp; Mortgage</text><text x="118" y="426" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Discharge</text><text x="118" y="448" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Conveyancer obtains title; lender notified</text><path d="M 448,418 h 26 m -8,-7 l 8,7 l -8,7" stroke="#3f51b5" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="422" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller instructs discharge of mortgage</text><rect x="838" y="399" width="212" height="37" rx="6" fill="#dfe3f5"/><text x="944" y="419" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIRED FOR SETTLEMENT</text><rect x="0" y="471" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="472" width="1080" height="96" fill="#e8eaf6"/><circle cx="72" cy="520" r="27" fill="#3f51b5"/><g transform="translate(72,520)"><path d="M 0,-15 L 15,-1 L 11,-1 L 11,13 L -11,13 L -11,-1 L -15,-1 Z" fill="#fff"/><rect x="-4" y="3" width="8" height="10" fill="#3f51b5"/></g><text x="118" y="518" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Compliance Certificates</text><text x="118" y="540" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Pool safety (QLD / NSW), smoke alarms</text><path d="M 448,520 h 26 m -8,-7 l 8,7 l -8,7" stroke="#3f51b5" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="515" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller obtains state-required</text><text x="492" y="534" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">certificates</text><rect x="838" y="502" width="212" height="37" rx="6" fill="#dfe3f5"/><text x="944" y="522" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">STATE REQUIREMENT</text><rect x="0" y="567" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="568" width="1080" height="109" fill="#ffffff"/><circle cx="72" cy="622" r="27" fill="#3f51b5"/><g transform="translate(72,622)"><rect x="-15" y="-11" width="30" height="22" rx="3" fill="#fff"/><circle cx="-7" cy="-2" r="4" fill="#3f51b5"/><rect x="-11" y="4" width="8" height="2.4" fill="#3f51b5"/><rect x="2" y="-6" width="11" height="2.4" fill="#3f51b5"/><rect x="2" y="-1" width="11" height="2.4" fill="#3f51b5"/><rect x="2" y="4" width="11" height="2.4" fill="#3f51b5"/></g><text x="118" y="609" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Verification of Identity</text><text x="118" y="631" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">(VOI)</text><text x="118" y="653" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">100-point identity check</text><path d="M 448,622 h 26 m -8,-7 l 8,7 l -8,7" stroke="#3f51b5" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="618" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller verifies with the conveyancer /</text><text x="492" y="636" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Australia Post</text><rect x="838" y="604" width="212" height="37" rx="6" fill="#dfe3f5"/><text x="944" y="624" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIRED FOR TRANSFER</text><rect x="0" y="676" width="1080" height="1" fill="#d8dbe4"/><text x="540.0" y="709" font-family="DejaVu Sans" font-size="15.5" font-weight="bold" fill="#3f51b5" text-anchor="middle">Accredited agencies on MarketSquare manage what they may, and facilitate the rest with the right professionals.</text><rect x="90" y="725" width="900" height="64" rx="10" fill="#14213d"/><text x="540.0" y="752" font-family="DejaVu Sans" font-size="14.5" font-weight="bold" fill="#ffffff" text-anchor="middle">In most states the contract must exist before you market — in Australia, paperwork comes</text><text x="540.0" y="773" font-family="DejaVu Sans" font-size="14.5" font-weight="bold" fill="#ffffff" text-anchor="middle">first.</text><text x="40" y="815" font-family="DejaVu Sans" font-size="11.5" fill="#6b7280">Rules vary by state — vendor statements, pool and smoke-alarm certificates are state-specific.</text><text x="1040" y="815" font-family="DejaVu Sans" font-size="11.5" fill="#9aa1ad" text-anchor="end">General guidance for Australia — not legal advice.</text></svg>