<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="782" viewBox="0 0 1080 782"><rect width="1080" height="782" fill="#ffffff"/><rect x="0" y="0" width="1080" height="86" fill="#14213d"/><text x="40" y="34" font-family="DejaVu Sans" font-size="15" font-weight="bold" fill="#9fb3d9" letter-spacing="2">ABSOLUTE MUST-HAVES · PRIVATE SALES · AUSTRALIA</text><text x="40" y="66" font-family="DejaVu Sans" font-size="27" font-weight="bold" fill="#ffffff">OFFERING TRADE SERVICES PRIVATELY</text><rect x="964" y="24" width="76" height="38" rx="8" fill="#ffffff" opacity="0.14"/><text x="1002" y="50" font-family="DejaVu Sans" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">AU</text><rect x="0" y="86" width="1080" height="46" fill="#00838f"/><text x="40" y="117" font-family="DejaVu Sans" font-size="19" font-weight="bold" fill="#ffffff" letter-spacing="1.5">SERVICES</text><rect x="0" y="132" width="1080" height="121" fill="#ffffff"/><circle cx="72" cy="192" r="27" fill="#00838f"/><g transform="translate(72,192)"><path d="M 2,-16 L -9,2 L -1,2 L -3,16 L 9,-3 L 1,-3 Z" fill="#fff"/></g><text x="118" y="173" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Trade Licence</text><text x="118" y="195" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Electrical &amp; plumbing licensed in every</text><text x="118" y="212" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">state; building thresholds apply (e.g. QBCC</text><text x="118" y="229" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">over $3,300)</text><path d="M 448,192 h 26 m -8,-7 l 8,7 l -8,7" stroke="#00838f" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="188" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Provider licenses with the state</text><text x="492" y="206" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">regulator</text><rect x="838" y="174" width="212" height="37" rx="6" fill="#cfe9ec"/><text x="944" y="194" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">LEGALLY REQUIRED</text><rect x="0" y="252" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="253" width="1080" height="96" fill="#e0f2f4"/><circle cx="72" cy="301" r="27" fill="#00838f"/><g transform="translate(72,301)"><rect x="-11" y="-15" width="22" height="30" rx="3" fill="#fff"/><path d="M -6,0 L -2,5 L 7,-6" fill="none" stroke="#00838f" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="298" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Written Quote &amp; Contract</text><text x="118" y="320" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Australian Consumer Law guarantees apply</text><path d="M 448,301 h 26 m -8,-7 l 8,7 l -8,7" stroke="#00838f" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="306" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Itemised quote agreed before work starts</text><rect x="838" y="282" width="212" height="37" rx="6" fill="#cfe9ec"/><text x="944" y="302" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">ACL REQUIREMENT</text><rect x="0" y="348" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="349" width="1080" height="104" fill="#ffffff"/><circle cx="72" cy="401" r="27" fill="#00838f"/><g transform="translate(72,401)"><rect x="-11" y="-15" width="22" height="30" rx="3" fill="#fff"/><rect x="-7" y="-9" width="14" height="2.6" rx="1.3" fill="#00838f"/><rect x="-7" y="-4" width="14" height="2.6" rx="1.3" fill="#00838f"/><rect x="-7" y="1" width="14" height="2.6" rx="1.3" fill="#00838f"/><rect x="-7" y="6" width="14" height="2.6" rx="1.3" fill="#00838f"/></g><text x="118" y="390" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Compliance Certificates</text><text x="118" y="412" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Electrical / plumbing certificates after</text><text x="118" y="429" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">regulated work</text><path d="M 448,401 h 26 m -8,-7 l 8,7 l -8,7" stroke="#00838f" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="406" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Provider issues to the homeowner</text><rect x="838" y="374" width="212" height="54" rx="6" fill="#cfe9ec"/><text x="944" y="394" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIRED AFTER REGULATED</text><text x="944" y="411" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">WORK</text><rect x="0" y="452" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="453" width="1080" height="96" fill="#e0f2f4"/><circle cx="72" cy="501" r="27" fill="#00838f"/><g transform="translate(72,501)"><path d="M 0,-15 C 5,-12 10,-11 13,-11 C 13,2 9,11 0,15 C -9,11 -13,2 -13,-11 C -10,-11 -5,-12 0,-15 Z" fill="#fff"/><path d="M -5,-1 L -1,4 L 7,-6" fill="none" stroke="#00838f" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="498" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Public Liability Insurance</text><text x="118" y="520" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Often required for licensing</text><path d="M 448,501 h 26 m -8,-7 l 8,7 l -8,7" stroke="#00838f" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="506" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Provider arranges own cover</text><rect x="838" y="474" width="212" height="54" rx="6" fill="#cfe9ec"/><text x="944" y="494" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">PROTECTS CLIENT &amp;</text><text x="944" y="511" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">PROVIDER</text><rect x="0" y="548" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="549" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="597" r="27" fill="#00838f"/><g transform="translate(72,597)"><rect x="-15" y="-11" width="30" height="22" rx="3" fill="#fff"/><circle cx="-7" cy="-2" r="4" fill="#00838f"/><rect x="-11" y="4" width="8" height="2.4" fill="#00838f"/><rect x="2" y="-6" width="11" height="2.4" fill="#00838f"/><rect x="2" y="-1" width="11" height="2.4" fill="#00838f"/><rect x="2" y="4" width="11" height="2.4" fill="#00838f"/></g><text x="118" y="594" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Workers&#x27; Comp (if employees)</text><text x="118" y="616" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">State schemes</text><path d="M 448,597 h 26 m -8,-7 l 8,7 l -8,7" stroke="#00838f" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="602" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Provider registers</text><rect x="838" y="570" width="212" height="54" rx="6" fill="#cfe9ec"/><text x="944" y="590" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">LEGALLY REQUIRED FOR</text><text x="944" y="607" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">EMPLOYERS</text><rect x="0" y="644" width="1080" height="1" fill="#d8dbe4"/><text x="540.0" y="677" font-family="DejaVu Sans" font-size="15.5" font-weight="bold" fill="#00838f" text-anchor="middle">Accredited agencies on MarketSquare manage what they may, and facilitate the rest with the right professionals.</text><rect x="90" y="693" width="900" height="43" rx="10" fill="#14213d"/><text x="540.0" y="720" font-family="DejaVu Sans" font-size="14.5" font-weight="bold" fill="#ffffff" text-anchor="middle">Unlicensed electrical work is illegal Australia-wide — including DIY.</text><text x="40" y="762" font-family="DejaVu Sans" font-size="11.5" fill="#6b7280">Home-building contracts above state thresholds carry extra mandatory terms.</text><text x="1040" y="762" font-family="DejaVu Sans" font-size="11.5" fill="#9aa1ad" text-anchor="end">General guidance for Australia — not legal advice.</text></svg>