<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="779" viewBox="0 0 1080 779"><rect width="1080" height="779" fill="#ffffff"/><rect x="0" y="0" width="1080" height="86" fill="#14213d"/><text x="40" y="34" font-family="DejaVu Sans" font-size="15" font-weight="bold" fill="#9fb3d9" letter-spacing="2">ABSOLUTE MUST-HAVES · PRIVATE SALES · AUSTRALIA</text><text x="40" y="66" font-family="DejaVu Sans" font-size="27" font-weight="bold" fill="#ffffff">TUTORING PRIVATELY</text><rect x="964" y="24" width="76" height="38" rx="8" fill="#ffffff" opacity="0.14"/><text x="1002" y="50" font-family="DejaVu Sans" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">AU</text><rect x="0" y="86" width="1080" height="46" fill="#c07a10"/><text x="40" y="117" font-family="DejaVu Sans" font-size="19" font-weight="bold" fill="#ffffff" letter-spacing="1.5">TUTORS</text><rect x="0" y="132" width="1080" height="126" fill="#ffffff"/><circle cx="72" cy="195" r="27" fill="#c07a10"/><g transform="translate(72,195)"><path d="M 0,-15 C 5,-12 10,-11 13,-11 C 13,2 9,11 0,15 C -9,11 -13,2 -13,-11 C -10,-11 -5,-12 0,-15 Z" fill="#fff"/><path d="M -5,-1 L -1,4 L 7,-6" fill="none" stroke="#c07a10" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="173" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Working With Children Check</text><text x="118" y="195" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">(WWCC)</text><text x="118" y="217" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Legally required in every state when</text><text x="118" y="234" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">tutoring minors</text><path d="M 448,195 h 26 m -8,-7 l 8,7 l -8,7" stroke="#c07a10" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="190" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Tutor applies to the state screening</text><text x="492" y="209" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">body — number shown to parents</text><rect x="838" y="168" width="212" height="54" rx="6" fill="#f7e8cc"/><text x="944" y="188" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">LEGALLY REQUIRED — HEAVY</text><text x="944" y="205" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">PENALTIES</text><rect x="0" y="257" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="258" width="1080" height="96" fill="#fdf3e3"/><circle cx="72" cy="306" r="27" fill="#c07a10"/><g transform="translate(72,306)"><rect x="-11" y="-15" width="22" height="30" rx="3" fill="#fff"/><path d="M -6,0 L -2,5 L 7,-6" fill="none" stroke="#c07a10" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="304" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Written Tutoring Agreement</text><text x="118" y="326" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Rates, cancellation, refunds — ACL applies</text><path d="M 448,306 h 26 m -8,-7 l 8,7 l -8,7" stroke="#c07a10" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="310" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Both parties sign</text><rect x="838" y="288" width="212" height="37" rx="6" fill="#f7e8cc"/><text x="944" y="308" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">PROTECTS BOTH PARTIES</text><rect x="0" y="353" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="354" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="402" r="27" fill="#c07a10"/><g transform="translate(72,402)"><rect x="-15" y="-9" width="30" height="18" rx="3" fill="#fff"/><circle cx="0" cy="0" r="5.5" fill="#c07a10"/><rect x="-12" y="-6" width="3" height="3" fill="#c07a10"/><rect x="9" y="3" width="3" height="3" fill="#c07a10"/></g><text x="118" y="400" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">ABN &amp; Income Declaration</text><text x="118" y="422" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">ATO — sole trader</text><path d="M 448,402 h 26 m -8,-7 l 8,7 l -8,7" stroke="#c07a10" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="406" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Tutor registers an ABN &amp; declares income</text><rect x="838" y="384" width="212" height="37" rx="6" fill="#f7e8cc"/><text x="944" y="404" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">ATO REQUIREMENT</text><rect x="0" y="449" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="450" width="1080" height="96" fill="#fdf3e3"/><circle cx="72" cy="498" r="27" fill="#c07a10"/><g transform="translate(72,498)"><rect x="-10" y="-3" width="20" height="17" rx="3" fill="#fff"/><path d="M -6,-3 v-4 a 6 6 0 0 1 12 0 v 4" fill="none" stroke="#fff" stroke-width="3.4"/></g><text x="118" y="496" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Consent for Student Records</text><text x="118" y="518" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Minors&#x27; data handled with guardian consent</text><path d="M 448,498 h 26 m -8,-7 l 8,7 l -8,7" stroke="#c07a10" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="502" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Parent / guardian consents in writing</text><rect x="838" y="480" width="212" height="37" rx="6" fill="#f7e8cc"/><text x="944" y="500" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">PRIVACY BEST PRACTICE</text><rect x="0" y="545" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="546" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="594" r="27" fill="#c07a10"/><g transform="translate(72,594)"><path d="M 0,-15 L 4,-5 L 15,-5 L 6,2 L 9,13 L 0,7 L -9,13 L -6,2 L -15,-5 L -4,-5 Z" fill="#fff"/></g><text x="118" y="592" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Public Liability Insurance</text><text x="118" y="614" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">For in-person tuition</text><path d="M 448,594 h 26 m -8,-7 l 8,7 l -8,7" stroke="#c07a10" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="598" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Tutor arranges own cover</text><rect x="838" y="576" width="212" height="37" rx="6" fill="#f7e8cc"/><text x="944" y="596" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">RECOMMENDED</text><rect x="0" y="641" width="1080" height="1" fill="#d8dbe4"/><text x="540.0" y="674" font-family="DejaVu Sans" font-size="15.5" font-weight="bold" fill="#c07a10" text-anchor="middle">Accredited agencies on MarketSquare manage what they may, and facilitate the rest with the right professionals.</text><rect x="90" y="690" width="900" height="43" rx="10" fill="#14213d"/><text x="540.0" y="717" font-family="DejaVu Sans" font-size="14.5" font-weight="bold" fill="#ffffff" text-anchor="middle">No WWCC, no tutoring minors — it&#x27;s that simple in Australia.</text><text x="40" y="759" font-family="DejaVu Sans" font-size="11.5" fill="#6b7280">WWCC names differ by state (Blue Card in QLD; WWC Check in NSW / VIC…).</text><text x="1040" y="759" font-family="DejaVu Sans" font-size="11.5" fill="#9aa1ad" text-anchor="end">General guidance for Australia — not legal advice.</text></svg>