<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="783" viewBox="0 0 1080 783"><rect width="1080" height="783" fill="#ffffff"/><rect x="0" y="0" width="1080" height="86" fill="#14213d"/><text x="40" y="34" font-family="DejaVu Sans" font-size="15" font-weight="bold" fill="#9fb3d9" letter-spacing="2">ABSOLUTE MUST-HAVES · PRIVATE SALES · AUSTRALIA</text><text x="40" y="66" font-family="DejaVu Sans" font-size="27" font-weight="bold" fill="#ffffff">OFFERING EXPERIENCES PRIVATELY</text><rect x="964" y="24" width="76" height="38" rx="8" fill="#ffffff" opacity="0.14"/><text x="1002" y="50" font-family="DejaVu Sans" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">AU</text><rect x="0" y="86" width="1080" height="46" fill="#d84315"/><text x="40" y="117" font-family="DejaVu Sans" font-size="19" font-weight="bold" fill="#ffffff" letter-spacing="1.5">ADVENTURES — EXPERIENCES</text><rect x="0" y="132" width="1080" height="104" fill="#ffffff"/><circle cx="72" cy="184" r="27" fill="#d84315"/><g transform="translate(72,184)"><rect x="-11" y="-15" width="22" height="30" rx="3" fill="#fff"/><path d="M -6,0 L -2,5 L 7,-6" fill="none" stroke="#d84315" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="173" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Recreational-Activity Waiver</text><text x="118" y="195" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">ACL s139A — liability for recreational</text><text x="118" y="212" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">services can be limited, if worded correctly</text><path d="M 448,184 h 26 m -8,-7 l 8,7 l -8,7" stroke="#d84315" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="179" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Participants sign a compliant waiver</text><text x="492" y="198" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">before the activity</text><rect x="838" y="157" width="212" height="54" rx="6" fill="#f6dccf"/><text x="944" y="177" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">MUST BE DRAFTED</text><text x="944" y="194" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">CORRECTLY</text><rect x="0" y="235" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="236" width="1080" height="96" fill="#fbe9e2"/><circle cx="72" cy="284" r="27" fill="#d84315"/><g transform="translate(72,284)"><path d="M 0,-15 C 5,-12 10,-11 13,-11 C 13,2 9,11 0,15 C -9,11 -13,2 -13,-11 C -10,-11 -5,-12 0,-15 Z" fill="#fff"/><path d="M -5,-1 L -1,4 L 7,-6" fill="none" stroke="#d84315" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="282" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Public Liability Insurance</text><text x="118" y="304" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Adequate for the activity</text><path d="M 448,284 h 26 m -8,-7 l 8,7 l -8,7" stroke="#d84315" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="288" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Operator arranges own cover</text><rect x="838" y="266" width="212" height="37" rx="6" fill="#f6dccf"/><text x="944" y="286" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">ESSENTIAL PROTECTION</text><rect x="0" y="331" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="332" width="1080" height="109" fill="#ffffff"/><circle cx="72" cy="386" r="27" fill="#d84315"/><g transform="translate(72,386)"><path d="M 0,-16 L 9,-4 L 5,-4 L 12,6 L -12,6 L -5,-4 L -9,-4 Z" fill="#fff"/><rect x="-2.4" y="6" width="4.8" height="8" fill="#fff"/></g><text x="118" y="373" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Parks / Commercial Operator</text><text x="118" y="395" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Licence</text><text x="118" y="417" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">National-park commercial activity permits</text><path d="M 448,386 h 26 m -8,-7 l 8,7 l -8,7" stroke="#d84315" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="391" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Operator obtains per park &amp; state</text><rect x="838" y="360" width="212" height="54" rx="6" fill="#f6dccf"/><text x="944" y="380" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIRED PER ACTIVITY &amp;</text><text x="944" y="396" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">AREA</text><rect x="0" y="440" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="441" width="1080" height="96" fill="#fbe9e2"/><circle cx="72" cy="489" r="27" fill="#d84315"/><g transform="translate(72,489)"><rect x="-13" y="-13" width="26" height="26" rx="4" fill="#fff"/><path d="M 0,-8 v 16 M -8,0 h 16" stroke="#d84315" stroke-width="5" stroke-linecap="round"/></g><text x="118" y="486" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">First Aid Certification</text><text x="118" y="508" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Appropriate to activity &amp; remoteness</text><path d="M 448,489 h 26 m -8,-7 l 8,7 l -8,7" stroke="#d84315" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="494" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Guides keep certification current</text><rect x="838" y="470" width="212" height="37" rx="6" fill="#f6dccf"/><text x="944" y="490" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">INDUSTRY REQUIREMENT</text><rect x="0" y="536" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="537" width="1080" height="109" fill="#ffffff"/><circle cx="72" cy="592" r="27" fill="#d84315"/><g transform="translate(72,592)"><path d="M 0,-15 L 4,-5 L 15,-5 L 6,2 L 9,13 L 0,7 L -9,13 L -6,2 L -15,-5 L -4,-5 Z" fill="#fff"/></g><text x="118" y="578" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Australian Adventure Activity</text><text x="118" y="600" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Standard</text><text x="118" y="622" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Good-practice framework (AAAS)</text><path d="M 448,592 h 26 m -8,-7 l 8,7 l -8,7" stroke="#d84315" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="596" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Operator aligns operations</text><rect x="838" y="573" width="212" height="37" rx="6" fill="#f6dccf"/><text x="944" y="593" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">INDUSTRY STANDARD</text><rect x="0" y="645" width="1080" height="1" fill="#d8dbe4"/><text x="540.0" y="678" font-family="DejaVu Sans" font-size="15.5" font-weight="bold" fill="#d84315" text-anchor="middle">Accredited agencies on MarketSquare manage what they may, and facilitate the rest with the right professionals.</text><rect x="90" y="694" width="900" height="43" rx="10" fill="#14213d"/><text x="540.0" y="721" font-family="DejaVu Sans" font-size="14.5" font-weight="bold" fill="#ffffff" text-anchor="middle">The ACL protects consumers even in adventure sports — a bad waiver is no waiver.</text><text x="40" y="763" font-family="DejaVu Sans" font-size="11.5" fill="#6b7280">Minors need parent / guardian-signed waivers.</text><text x="1040" y="763" font-family="DejaVu Sans" font-size="11.5" fill="#9aa1ad" text-anchor="end">General guidance for Australia — not legal advice.</text></svg>