<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="792" viewBox="0 0 1080 792"><rect width="1080" height="792" fill="#ffffff"/><rect x="0" y="0" width="1080" height="86" fill="#14213d"/><text x="40" y="34" font-family="DejaVu Sans" font-size="15" font-weight="bold" fill="#9fb3d9" letter-spacing="2">ABSOLUTE MUST-HAVES · PRIVATE SALES · AUSTRALIA</text><text x="40" y="66" font-family="DejaVu Sans" font-size="27" font-weight="bold" fill="#ffffff">HOSTING GUESTS PRIVATELY</text><rect x="964" y="24" width="76" height="38" rx="8" fill="#ffffff" opacity="0.14"/><text x="1002" y="50" font-family="DejaVu Sans" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">AU</text><rect x="0" y="86" width="1080" height="46" fill="#0277bd"/><text x="40" y="117" font-family="DejaVu Sans" font-size="19" font-weight="bold" fill="#ffffff" letter-spacing="1.5">ADVENTURES — ACCOMMODATION</text><rect x="0" y="132" width="1080" height="126" fill="#ffffff"/><circle cx="72" cy="195" r="27" fill="#0277bd"/><g transform="translate(72,195)"><path d="M 0,-15 L 15,-1 L 11,-1 L 11,13 L -11,13 L -11,-1 L -15,-1 Z" fill="#fff"/><rect x="-4" y="3" width="8" height="10" fill="#0277bd"/></g><text x="118" y="173" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Council Approval / STRA</text><text x="118" y="195" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Registration</text><text x="118" y="217" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">NSW: STRA register &amp; night caps; other</text><text x="118" y="234" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">states vary</text><path d="M 448,195 h 26 m -8,-7 l 8,7 l -8,7" stroke="#0277bd" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="190" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Host registers with the council / state</text><text x="492" y="209" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">scheme</text><rect x="838" y="168" width="212" height="54" rx="6" fill="#d2e8f6"/><text x="944" y="188" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIRED BY STATE /</text><text x="944" y="205" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">COUNCIL</text><rect x="0" y="257" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="258" width="1080" height="96" fill="#e3f1fa"/><circle cx="72" cy="306" r="27" fill="#0277bd"/><g transform="translate(72,306)"><path d="M 0,-15 C 6,-8 11,-3 11,4 A 11 11 0 0 1 -11,4 C -11,-1 -8,-5 -5,-8 C -5,-4 -3,-2 0,-1 C -2,-6 -2,-10 0,-15 Z" fill="#fff"/></g><text x="118" y="304" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Fire Safety Compliance</text><text x="118" y="326" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Interconnected smoke alarms, evacuation plan</text><path d="M 448,306 h 26 m -8,-7 l 8,7 l -8,7" stroke="#0277bd" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="310" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Host installs &amp; maintains per state code</text><rect x="838" y="288" width="212" height="37" rx="6" fill="#d2e8f6"/><text x="944" y="308" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">LEGAL REQUIREMENT</text><rect x="0" y="353" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="354" width="1080" height="109" fill="#ffffff"/><circle cx="72" cy="408" r="27" fill="#0277bd"/><g transform="translate(72,408)"><path d="M 0,-15 C 5,-12 10,-11 13,-11 C 13,2 9,11 0,15 C -9,11 -13,2 -13,-11 C -10,-11 -5,-12 0,-15 Z" fill="#fff"/><path d="M -5,-1 L -1,4 L 7,-6" fill="none" stroke="#0277bd" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="395" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Public Liability / STR</text><text x="118" y="417" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Insurance</text><text x="118" y="439" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Home policies exclude paying guests</text><path d="M 448,408 h 26 m -8,-7 l 8,7 l -8,7" stroke="#0277bd" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="413" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Host arranges specific cover</text><rect x="838" y="390" width="212" height="37" rx="6" fill="#d2e8f6"/><text x="944" y="410" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">PROTECTS HOST &amp; GUESTS</text><rect x="0" y="462" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="463" width="1080" height="96" fill="#e3f1fa"/><circle cx="72" cy="511" r="27" fill="#0277bd"/><g transform="translate(72,511)"><rect x="-11" y="-15" width="22" height="30" rx="3" fill="#fff"/><path d="M -6,0 L -2,5 L 7,-6" fill="none" stroke="#0277bd" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="508" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">House Rules &amp; Guest Agreement</text><text x="118" y="530" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Strata by-laws may restrict letting</text><path d="M 448,511 h 26 m -8,-7 l 8,7 l -8,7" stroke="#0277bd" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="506" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Guest accepts before the stay — host</text><text x="492" y="525" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">checks strata first</text><rect x="838" y="492" width="212" height="37" rx="6" fill="#d2e8f6"/><text x="944" y="512" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">PROTECTS HOST</text><rect x="0" y="558" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="559" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="607" r="27" fill="#0277bd"/><g transform="translate(72,607)"><rect x="-15" y="-9" width="30" height="18" rx="3" fill="#fff"/><circle cx="0" cy="0" r="5.5" fill="#0277bd"/><rect x="-12" y="-6" width="3" height="3" fill="#0277bd"/><rect x="9" y="3" width="3" height="3" fill="#0277bd"/></g><text x="118" y="604" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Declare Rental Income (ATO)</text><text x="118" y="626" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">GST considerations may apply</text><path d="M 448,607 h 26 m -8,-7 l 8,7 l -8,7" stroke="#0277bd" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="612" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Host declares income</text><rect x="838" y="588" width="212" height="37" rx="6" fill="#d2e8f6"/><text x="944" y="608" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">ATO REQUIREMENT</text><rect x="0" y="654" width="1080" height="1" fill="#d8dbe4"/><text x="540.0" y="687" font-family="DejaVu Sans" font-size="15.5" font-weight="bold" fill="#0277bd" text-anchor="middle">Accredited agencies on MarketSquare manage what they may, and facilitate the rest with the right professionals.</text><rect x="90" y="703" width="900" height="43" rx="10" fill="#14213d"/><text x="540.0" y="730" font-family="DejaVu Sans" font-size="14.5" font-weight="bold" fill="#ffffff" text-anchor="middle">Strata and councils can both say no — check before you list.</text><text x="40" y="772" font-family="DejaVu Sans" font-size="11.5" fill="#6b7280">NSW STRA caps nights in Greater Sydney; QLD and VIC rules differ.</text><text x="1040" y="772" font-family="DejaVu Sans" font-size="11.5" fill="#9aa1ad" text-anchor="end">General guidance for Australia — not legal advice.</text></svg>