<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="792" viewBox="0 0 1080 792"><rect width="1080" height="792" fill="#ffffff"/><rect x="0" y="0" width="1080" height="86" fill="#14213d"/><text x="40" y="34" font-family="DejaVu Sans" font-size="15" font-weight="bold" fill="#9fb3d9" letter-spacing="2">ABSOLUTE MUST-HAVES · PRIVATE SALES · UNITED STATES</text><text x="40" y="66" font-family="DejaVu Sans" font-size="27" font-weight="bold" fill="#ffffff">SELLING COLLECTABLES PRIVATELY</text><rect x="964" y="24" width="76" height="38" rx="8" fill="#ffffff" opacity="0.14"/><text x="1002" y="50" font-family="DejaVu Sans" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">US</text><rect x="0" y="86" width="1080" height="46" fill="#6a3ab2"/><text x="40" y="117" font-family="DejaVu Sans" font-size="19" font-weight="bold" fill="#ffffff" letter-spacing="1.5">COLLECTORS</text><rect x="0" y="132" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="180" r="27" fill="#6a3ab2"/><g transform="translate(72,180)"><path d="M -9,-11 L 9,-11 L 15,-3 L 0,14 L -15,-3 Z" fill="#fff"/><path d="M -9,-11 L 0,14 L 9,-11 M -15,-3 L 15,-3" stroke="#6a3ab2" stroke-width="2" fill="none"/></g><text x="118" y="178" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Provenance &amp; Authentication</text><text x="118" y="200" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Certificates, receipts, grading reports</text><path d="M 448,180 h 26 m -8,-7 l 8,7 l -8,7" stroke="#6a3ab2" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="184" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller provides documentation to buyer</text><rect x="838" y="153" width="212" height="54" rx="6" fill="#e4d8f4"/><text x="944" y="173" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">PROTECTS VALUE &amp; BUYER</text><text x="944" y="190" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">TRUST</text><rect x="0" y="227" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="228" width="1080" height="126" fill="#efe8f9"/><circle cx="72" cy="291" r="27" fill="#6a3ab2"/><g transform="translate(72,291)"><path d="M 0,-16 L 9,-4 L 5,-4 L 12,6 L -12,6 L -5,-4 L -9,-4 Z" fill="#fff"/><rect x="-2.4" y="6" width="4.8" height="8" fill="#fff"/></g><text x="118" y="269" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Wildlife &amp; Cultural Property</text><text x="118" y="291" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Laws</text><text x="118" y="313" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">ESA / ivory, eagle feathers, Native American</text><text x="118" y="330" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">items</text><path d="M 448,291 h 26 m -8,-7 l 8,7 l -8,7" stroke="#6a3ab2" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="286" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller confirms the item is legal to</text><text x="492" y="305" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">sell — permits where applicable</text><rect x="838" y="264" width="212" height="54" rx="6" fill="#e4d8f4"/><text x="944" y="284" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">FEDERAL LAW — SEVERE</text><text x="944" y="301" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">PENALTIES</text><rect x="0" y="353" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="354" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="402" r="27" fill="#6a3ab2"/><g transform="translate(72,402)"><rect x="-11" y="-15" width="22" height="30" rx="3" fill="#fff"/><path d="M -6,0 L -2,5 L 7,-6" fill="none" stroke="#6a3ab2" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="400" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Bill of Sale (As-Is)</text><text x="118" y="422" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Condition &amp; authenticity documented</text><path d="M 448,402 h 26 m -8,-7 l 8,7 l -8,7" stroke="#6a3ab2" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="406" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Both parties sign</text><rect x="838" y="384" width="212" height="37" rx="6" fill="#e4d8f4"/><text x="944" y="404" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">PROTECTS SELLER</text><rect x="0" y="449" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="450" width="1080" height="109" fill="#efe8f9"/><circle cx="72" cy="504" r="27" fill="#6a3ab2"/><g transform="translate(72,504)"><rect x="-15" y="-9" width="30" height="18" rx="3" fill="#fff"/><circle cx="0" cy="0" r="5.5" fill="#6a3ab2"/><rect x="-12" y="-6" width="3" height="3" fill="#6a3ab2"/><rect x="9" y="3" width="3" height="3" fill="#6a3ab2"/></g><text x="118" y="491" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">IRS Form 8300 — Cash Over</text><text x="118" y="513" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">$10,000</text><text x="118" y="535" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Trade or business receipts</text><path d="M 448,504 h 26 m -8,-7 l 8,7 l -8,7" stroke="#6a3ab2" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="500" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Report within 15 days — better:</text><text x="492" y="518" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">traceable payment</text><rect x="838" y="486" width="212" height="37" rx="6" fill="#e4d8f4"/><text x="944" y="506" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">IRS REQUIREMENT</text><rect x="0" y="558" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="559" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="607" r="27" fill="#6a3ab2"/><g transform="translate(72,607)"><path d="M -14,-6 L 0,-15 L 14,-6 Z" fill="#fff"/><rect x="-13" y="-4" width="4.5" height="14" fill="#fff"/><rect x="-6" y="-4" width="4.5" height="14" fill="#fff"/><rect x="1" y="-4" width="4.5" height="14" fill="#fff"/><rect x="8" y="-4" width="4.5" height="14" fill="#fff"/><rect x="-14" y="11" width="28" height="4" fill="#fff"/></g><text x="118" y="604" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Sales Tax Obligations</text><text x="118" y="626" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">If selling regularly</text><path d="M 448,607 h 26 m -8,-7 l 8,7 l -8,7" stroke="#6a3ab2" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="602" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller checks state nexus / marketplace</text><text x="492" y="621" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">rules</text><rect x="838" y="588" width="212" height="37" rx="6" fill="#e4d8f4"/><text x="944" y="608" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">VARIES BY STATE</text><rect x="0" y="654" width="1080" height="1" fill="#d8dbe4"/><text x="540.0" y="687" font-family="DejaVu Sans" font-size="15.5" font-weight="bold" fill="#6a3ab2" text-anchor="middle">Accredited agencies on MarketSquare manage what they may, and facilitate the rest with the right professionals.</text><rect x="90" y="703" width="900" height="43" rx="10" fill="#14213d"/><text x="540.0" y="730" font-family="DejaVu Sans" font-size="14.5" font-weight="bold" fill="#ffffff" text-anchor="middle">Rare items attract rare rules — check federal wildlife &amp; heritage law before listing.</text><text x="40" y="772" font-family="DejaVu Sans" font-size="11.5" fill="#6b7280">One-off private sales are usually tax-simple; regular dealing isn&#x27;t.</text><text x="1040" y="772" font-family="DejaVu Sans" font-size="11.5" fill="#9aa1ad" text-anchor="end">General guidance for the United States — not legal advice.</text></svg>