<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="778" viewBox="0 0 1080 778"><rect width="1080" height="778" fill="#ffffff"/><rect x="0" y="0" width="1080" height="86" fill="#14213d"/><text x="40" y="34" font-family="DejaVu Sans" font-size="15" font-weight="bold" fill="#9fb3d9" letter-spacing="2">ABSOLUTE MUST-HAVES · PRIVATE SALES · UNITED STATES</text><text x="40" y="66" font-family="DejaVu Sans" font-size="27" font-weight="bold" fill="#ffffff">HOSTING GUESTS PRIVATELY</text><rect x="964" y="24" width="76" height="38" rx="8" fill="#ffffff" opacity="0.14"/><text x="1002" y="50" font-family="DejaVu Sans" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">US</text><rect x="0" y="86" width="1080" height="46" fill="#0277bd"/><text x="40" y="117" font-family="DejaVu Sans" font-size="19" font-weight="bold" fill="#ffffff" letter-spacing="1.5">ADVENTURES — ACCOMMODATION</text><rect x="0" y="132" width="1080" height="104" fill="#ffffff"/><circle cx="72" cy="184" r="27" fill="#0277bd"/><g transform="translate(72,184)"><path d="M 0,-15 L 15,-1 L 11,-1 L 11,13 L -11,13 L -11,-1 L -15,-1 Z" fill="#fff"/><rect x="-4" y="3" width="8" height="10" fill="#0277bd"/></g><text x="118" y="173" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Short-Term Rental Permit</text><text x="118" y="195" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">City / county registration — many require a</text><text x="118" y="212" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">permit number</text><path d="M 448,184 h 26 m -8,-7 l 8,7 l -8,7" stroke="#0277bd" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="179" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Host registers with the local authority</text><text x="492" y="198" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">&amp; displays the permit on listings</text><rect x="838" y="166" width="212" height="37" rx="6" fill="#d2e8f6"/><text x="944" y="186" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIRED BY LOCAL LAW</text><rect x="0" y="235" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="236" width="1080" height="96" fill="#e3f1fa"/><circle cx="72" cy="284" r="27" fill="#0277bd"/><g transform="translate(72,284)"><rect x="-15" y="-9" width="30" height="18" rx="3" fill="#fff"/><circle cx="0" cy="0" r="5.5" fill="#0277bd"/><rect x="-12" y="-6" width="3" height="3" fill="#0277bd"/><rect x="9" y="3" width="3" height="3" fill="#0277bd"/></g><text x="118" y="282" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Occupancy / Lodging Taxes</text><text x="118" y="304" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Transient occupancy tax</text><path d="M 448,284 h 26 m -8,-7 l 8,7 l -8,7" stroke="#0277bd" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="279" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Host registers &amp; remits — platforms</text><text x="492" y="298" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">sometimes collect</text><rect x="838" y="266" width="212" height="37" rx="6" fill="#d2e8f6"/><text x="944" y="286" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">TAX REQUIREMENT</text><rect x="0" y="331" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="332" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="380" r="27" fill="#0277bd"/><g transform="translate(72,380)"><path d="M 0,-15 C 6,-8 11,-3 11,4 A 11 11 0 0 1 -11,4 C -11,-1 -8,-5 -5,-8 C -5,-4 -3,-2 0,-1 C -2,-6 -2,-10 0,-15 Z" fill="#fff"/></g><text x="118" y="378" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Safety Equipment</text><text x="118" y="400" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Smoke &amp; CO detectors, extinguishers, exits</text><path d="M 448,380 h 26 m -8,-7 l 8,7 l -8,7" stroke="#0277bd" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="384" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Host installs &amp; maintains per code</text><rect x="838" y="362" width="212" height="37" rx="6" fill="#d2e8f6"/><text x="944" y="382" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIRED BY CODE</text><rect x="0" y="427" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="428" width="1080" height="104" fill="#e3f1fa"/><circle cx="72" cy="480" r="27" fill="#0277bd"/><g transform="translate(72,480)"><path d="M 0,-15 C 5,-12 10,-11 13,-11 C 13,2 9,11 0,15 C -9,11 -13,2 -13,-11 C -10,-11 -5,-12 0,-15 Z" fill="#fff"/><path d="M -5,-1 L -1,4 L 7,-6" fill="none" stroke="#0277bd" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="469" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">STR / Liability Insurance</text><text x="118" y="491" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Homeowner policies usually exclude paying</text><text x="118" y="508" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">guests</text><path d="M 448,480 h 26 m -8,-7 l 8,7 l -8,7" stroke="#0277bd" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="484" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Host arranges short-term-rental cover</text><rect x="838" y="462" width="212" height="37" rx="6" fill="#d2e8f6"/><text x="944" y="482" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">PROTECTS HOST &amp; GUESTS</text><rect x="0" y="531" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="532" width="1080" height="109" fill="#ffffff"/><circle cx="72" cy="586" r="27" fill="#0277bd"/><g transform="translate(72,586)"><rect x="-11" y="-15" width="22" height="30" rx="3" fill="#fff"/><path d="M -6,0 L -2,5 L 7,-6" fill="none" stroke="#0277bd" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="573" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">House Rules &amp; Rental</text><text x="118" y="595" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Agreement</text><text x="118" y="617" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Occupancy limits, quiet hours</text><path d="M 448,586 h 26 m -8,-7 l 8,7 l -8,7" stroke="#0277bd" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="591" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Guest accepts before the stay</text><rect x="838" y="568" width="212" height="37" rx="6" fill="#d2e8f6"/><text x="944" y="588" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">PROTECTS HOST</text><rect x="0" y="640" width="1080" height="1" fill="#d8dbe4"/><text x="540.0" y="673" font-family="DejaVu Sans" font-size="15.5" font-weight="bold" fill="#0277bd" text-anchor="middle">Accredited agencies on MarketSquare manage what they may, and facilitate the rest with the right professionals.</text><rect x="90" y="689" width="900" height="43" rx="10" fill="#14213d"/><text x="540.0" y="716" font-family="DejaVu Sans" font-size="14.5" font-weight="bold" fill="#ffffff" text-anchor="middle">STR rules are hyper-local — cities ban, cap or license short-term rentals.</text><text x="40" y="758" font-family="DejaVu Sans" font-size="11.5" fill="#6b7280">Check HOA / lease terms too — many prohibit short-term letting.</text><text x="1040" y="758" font-family="DejaVu Sans" font-size="11.5" fill="#9aa1ad" text-anchor="end">General guidance for the United States — not legal advice.</text></svg>