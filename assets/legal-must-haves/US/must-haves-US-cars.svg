<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="765" viewBox="0 0 1080 765"><rect width="1080" height="765" fill="#ffffff"/><rect x="0" y="0" width="1080" height="86" fill="#14213d"/><text x="40" y="34" font-family="DejaVu Sans" font-size="15" font-weight="bold" fill="#9fb3d9" letter-spacing="2">ABSOLUTE MUST-HAVES · PRIVATE SALES · UNITED STATES</text><text x="40" y="66" font-family="DejaVu Sans" font-size="27" font-weight="bold" fill="#ffffff">SELLING YOUR CAR PRIVATELY</text><rect x="964" y="24" width="76" height="38" rx="8" fill="#ffffff" opacity="0.14"/><text x="1002" y="50" font-family="DejaVu Sans" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">US</text><rect x="0" y="86" width="1080" height="46" fill="#2e7d54"/><text x="40" y="117" font-family="DejaVu Sans" font-size="19" font-weight="bold" fill="#ffffff" letter-spacing="1.5">CARS</text><rect x="0" y="132" width="1080" height="104" fill="#ffffff"/><circle cx="72" cy="184" r="27" fill="#2e7d54"/><g transform="translate(72,184)"><rect x="-15" y="-11" width="30" height="22" rx="3" fill="#fff"/><circle cx="-7" cy="-2" r="4" fill="#2e7d54"/><rect x="-11" y="4" width="8" height="2.4" fill="#2e7d54"/><rect x="2" y="-6" width="11" height="2.4" fill="#2e7d54"/><rect x="2" y="-1" width="11" height="2.4" fill="#2e7d54"/><rect x="2" y="4" width="11" height="2.4" fill="#2e7d54"/></g><text x="118" y="173" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Certificate of Title</text><text x="118" y="195" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Sign over to buyer; lien must be released</text><text x="118" y="212" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">first</text><path d="M 448,184 h 26 m -8,-7 l 8,7 l -8,7" stroke="#2e7d54" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="179" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller signs &amp; dates exactly as printed</text><text x="492" y="198" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">— errors delay the transfer</text><rect x="838" y="166" width="212" height="37" rx="6" fill="#d5ecdd"/><text x="944" y="186" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">MANDATORY FOR SALE</text><rect x="0" y="235" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="236" width="1080" height="96" fill="#e3f2e9"/><circle cx="72" cy="284" r="27" fill="#2e7d54"/><g transform="translate(72,284)"><rect x="-11" y="-15" width="22" height="30" rx="3" fill="#fff"/><path d="M -6,0 L -2,5 L 7,-6" fill="none" stroke="#2e7d54" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="282" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Bill of Sale</text><text x="118" y="304" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Required in many states, wise everywhere</text><path d="M 448,284 h 26 m -8,-7 l 8,7 l -8,7" stroke="#2e7d54" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="279" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Both parties sign — VIN, price,</text><text x="492" y="298" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">odometer, as-is terms</text><rect x="838" y="266" width="212" height="37" rx="6" fill="#d5ecdd"/><text x="944" y="286" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">PROTECTS BOTH PARTIES</text><rect x="0" y="331" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="332" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="380" r="27" fill="#2e7d54"/><g transform="translate(72,380)"><path d="M -14,4 L -11,-4 Q -10,-7 -6,-7 L 6,-7 Q 9,-7 11,-4 L 14,4 Z" fill="#fff"/><rect x="-15" y="3" width="30" height="7" rx="3" fill="#fff"/><circle cx="-8" cy="11" r="3.4" fill="#2e7d54" stroke="#fff" stroke-width="2"/><circle cx="8" cy="11" r="3.4" fill="#2e7d54" stroke="#fff" stroke-width="2"/></g><text x="118" y="378" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Odometer Disclosure</text><text x="118" y="400" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Federal law — vehicles up to 20 model years</text><path d="M 448,380 h 26 m -8,-7 l 8,7 l -8,7" stroke="#2e7d54" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="375" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller declares exact mileage on the</text><text x="492" y="394" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">title or federal form</text><rect x="838" y="362" width="212" height="37" rx="6" fill="#d5ecdd"/><text x="944" y="382" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">FEDERAL REQUIREMENT</text><rect x="0" y="427" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="428" width="1080" height="104" fill="#e3f2e9"/><circle cx="72" cy="480" r="27" fill="#2e7d54"/><g transform="translate(72,480)"><path d="M 0,-15 C 5,-12 10,-11 13,-11 C 13,2 9,11 0,15 C -9,11 -13,2 -13,-11 C -10,-11 -5,-12 0,-15 Z" fill="#fff"/><path d="M -5,-1 L -1,4 L 7,-6" fill="none" stroke="#2e7d54" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="469" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Release of Liability</text><text x="118" y="491" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Time-critical — notice of transfer to the</text><text x="118" y="508" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">DMV</text><path d="M 448,480 h 26 m -8,-7 l 8,7 l -8,7" stroke="#2e7d54" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="475" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller files by the state deadline —</text><text x="492" y="494" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">ends liability for tickets &amp; accidents</text><rect x="838" y="462" width="212" height="37" rx="6" fill="#d5ecdd"/><text x="944" y="482" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">SELLER RESPONSIBILITY</text><rect x="0" y="531" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="532" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="580" r="27" fill="#2e7d54"/><g transform="translate(72,580)"><path d="M 2,-16 L -9,2 L -1,2 L -3,16 L 9,-3 L 1,-3 Z" fill="#fff"/></g><text x="118" y="578" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Smog / Safety Inspection</text><text x="118" y="600" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">State-dependent (e.g. California smog check)</text><path d="M 448,580 h 26 m -8,-7 l 8,7 l -8,7" stroke="#2e7d54" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="584" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller or buyer obtains per state rules</text><rect x="838" y="562" width="212" height="37" rx="6" fill="#d5ecdd"/><text x="944" y="582" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">VARIES BY STATE</text><rect x="0" y="627" width="1080" height="1" fill="#d8dbe4"/><text x="540.0" y="660" font-family="DejaVu Sans" font-size="15.5" font-weight="bold" fill="#2e7d54" text-anchor="middle">Accredited agencies on MarketSquare manage what they may, and facilitate the rest with the right professionals.</text><rect x="90" y="676" width="900" height="43" rx="10" fill="#14213d"/><text x="540.0" y="703" font-family="DejaVu Sans" font-size="14.5" font-weight="bold" fill="#ffffff" text-anchor="middle">Miss the release-of-liability deadline and the new owner&#x27;s tickets are yours.</text><text x="40" y="745" font-family="DejaVu Sans" font-size="11.5" fill="#6b7280">Plates usually stay with the seller — check your state DMV.</text><text x="1040" y="745" font-family="DejaVu Sans" font-size="11.5" fill="#9aa1ad" text-anchor="end">General guidance for the United States — not legal advice.</text></svg>