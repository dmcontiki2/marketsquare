<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="771" viewBox="0 0 1080 771"><rect width="1080" height="771" fill="#ffffff"/><rect x="0" y="0" width="1080" height="86" fill="#14213d"/><text x="40" y="34" font-family="DejaVu Sans" font-size="15" font-weight="bold" fill="#9fb3d9" letter-spacing="2">ABSOLUTE MUST-HAVES · PRIVATE SALES · UNITED STATES</text><text x="40" y="66" font-family="DejaVu Sans" font-size="27" font-weight="bold" fill="#ffffff">SELLING YOUR HOUSE PRIVATELY</text><rect x="964" y="24" width="76" height="38" rx="8" fill="#ffffff" opacity="0.14"/><text x="1002" y="50" font-family="DejaVu Sans" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">US</text><rect x="0" y="86" width="1080" height="46" fill="#3f51b5"/><text x="40" y="117" font-family="DejaVu Sans" font-size="19" font-weight="bold" fill="#ffffff" letter-spacing="1.5">PROPERTY</text><rect x="0" y="132" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="180" r="27" fill="#3f51b5"/><g transform="translate(72,180)"><rect x="-11" y="-15" width="22" height="30" rx="3" fill="#fff"/><rect x="-7" y="-9" width="14" height="2.6" rx="1.3" fill="#3f51b5"/><rect x="-7" y="-4" width="14" height="2.6" rx="1.3" fill="#3f51b5"/><rect x="-7" y="1" width="14" height="2.6" rx="1.3" fill="#3f51b5"/><rect x="-7" y="6" width="14" height="2.6" rx="1.3" fill="#3f51b5"/></g><text x="118" y="178" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Clear Title &amp; Title Search</text><text x="118" y="200" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Title company confirms ownership &amp; liens</text><path d="M 448,180 h 26 m -8,-7 l 8,7 l -8,7" stroke="#3f51b5" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="175" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Title company / closing attorney runs</text><text x="492" y="194" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">the search — buyer takes title insurance</text><rect x="838" y="162" width="212" height="37" rx="6" fill="#dfe3f5"/><text x="944" y="182" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIRED FOR CLOSING</text><rect x="0" y="227" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="228" width="1080" height="96" fill="#e8eaf6"/><circle cx="72" cy="276" r="27" fill="#3f51b5"/><g transform="translate(72,276)"><rect x="-11" y="-15" width="22" height="30" rx="3" fill="#fff"/><path d="M -6,0 L -2,5 L 7,-6" fill="none" stroke="#3f51b5" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="274" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Seller Disclosure Form</text><text x="118" y="296" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Property condition — required in most states</text><path d="M 448,276 h 26 m -8,-7 l 8,7 l -8,7" stroke="#3f51b5" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="271" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller completes honestly — known</text><text x="492" y="290" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">defects must be declared</text><rect x="838" y="258" width="212" height="37" rx="6" fill="#dfe3f5"/><text x="944" y="278" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">STATE LAW REQUIREMENT</text><rect x="0" y="323" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="324" width="1080" height="105" fill="#ffffff"/><circle cx="72" cy="376" r="27" fill="#3f51b5"/><g transform="translate(72,376)"><path d="M 0,-15 L 15,-1 L 11,-1 L 11,13 L -11,13 L -11,-1 L -15,-1 Z" fill="#fff"/><rect x="-4" y="3" width="8" height="10" fill="#3f51b5"/></g><text x="118" y="374" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Lead-Paint Disclosure</text><text x="118" y="396" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Federal law — homes built before 1978</text><path d="M 448,376 h 26 m -8,-7 l 8,7 l -8,7" stroke="#3f51b5" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="362" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller provides EPA pamphlet &amp;</text><text x="492" y="381" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">disclosure; buyer gets a 10-day</text><text x="492" y="400" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">inspection window</text><rect x="838" y="358" width="212" height="37" rx="6" fill="#dfe3f5"/><text x="944" y="378" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">FEDERAL REQUIREMENT</text><rect x="0" y="428" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="429" width="1080" height="109" fill="#e8eaf6"/><circle cx="72" cy="484" r="27" fill="#3f51b5"/><g transform="translate(72,484)"><path d="M -14,-6 L 0,-15 L 14,-6 Z" fill="#fff"/><rect x="-13" y="-4" width="4.5" height="14" fill="#fff"/><rect x="-6" y="-4" width="4.5" height="14" fill="#fff"/><rect x="1" y="-4" width="4.5" height="14" fill="#fff"/><rect x="8" y="-4" width="4.5" height="14" fill="#fff"/><rect x="-14" y="11" width="28" height="4" fill="#fff"/></g><text x="118" y="470" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Mortgage Payoff &amp; Lien</text><text x="118" y="492" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Release</text><text x="118" y="514" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Cleared through escrow at closing</text><path d="M 448,484 h 26 m -8,-7 l 8,7 l -8,7" stroke="#3f51b5" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="478" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller requests payoff statement —</text><text x="492" y="498" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">escrow pays the lender from proceeds</text><rect x="838" y="465" width="212" height="37" rx="6" fill="#dfe3f5"/><text x="944" y="485" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">CLEARED AT CLOSING</text><rect x="0" y="537" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="538" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="586" r="27" fill="#3f51b5"/><g transform="translate(72,586)"><rect x="-15" y="-11" width="30" height="22" rx="3" fill="#fff"/><circle cx="-7" cy="-2" r="4" fill="#3f51b5"/><rect x="-11" y="4" width="8" height="2.4" fill="#3f51b5"/><rect x="2" y="-6" width="11" height="2.4" fill="#3f51b5"/><rect x="2" y="-1" width="11" height="2.4" fill="#3f51b5"/><rect x="2" y="4" width="11" height="2.4" fill="#3f51b5"/></g><text x="118" y="584" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Closing Agent or Attorney</text><text x="118" y="606" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Escrow states vs attorney-closing states</text><path d="M 448,586 h 26 m -8,-7 l 8,7 l -8,7" stroke="#3f51b5" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="581" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Seller engages per state practice —</text><text x="492" y="600" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">deed, transfer taxes, recording</text><rect x="838" y="559" width="212" height="54" rx="6" fill="#dfe3f5"/><text x="944" y="579" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIRED — FORM VARIES</text><text x="944" y="596" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">BY STATE</text><rect x="0" y="633" width="1080" height="1" fill="#d8dbe4"/><text x="540.0" y="666" font-family="DejaVu Sans" font-size="15.5" font-weight="bold" fill="#3f51b5" text-anchor="middle">Accredited agencies on MarketSquare manage what they may, and facilitate the rest with the right professionals.</text><rect x="90" y="682" width="900" height="43" rx="10" fill="#14213d"/><text x="540.0" y="709" font-family="DejaVu Sans" font-size="14.5" font-weight="bold" fill="#ffffff" text-anchor="middle">A FSBO sale still closes through a title company or attorney — state rules differ.</text><text x="40" y="751" font-family="DejaVu Sans" font-size="11.5" fill="#6b7280">Requirements vary by state — disclosure forms, attorney involvement and transfer taxes are state-specific.</text><text x="1040" y="751" font-family="DejaVu Sans" font-size="11.5" fill="#9aa1ad" text-anchor="end">General guidance for the United States — not legal advice.</text></svg>