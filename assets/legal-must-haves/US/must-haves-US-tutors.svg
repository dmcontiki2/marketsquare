<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="770" viewBox="0 0 1080 770"><rect width="1080" height="770" fill="#ffffff"/><rect x="0" y="0" width="1080" height="86" fill="#14213d"/><text x="40" y="34" font-family="DejaVu Sans" font-size="15" font-weight="bold" fill="#9fb3d9" letter-spacing="2">ABSOLUTE MUST-HAVES · PRIVATE SALES · UNITED STATES</text><text x="40" y="66" font-family="DejaVu Sans" font-size="27" font-weight="bold" fill="#ffffff">TUTORING PRIVATELY</text><rect x="964" y="24" width="76" height="38" rx="8" fill="#ffffff" opacity="0.14"/><text x="1002" y="50" font-family="DejaVu Sans" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">US</text><rect x="0" y="86" width="1080" height="46" fill="#c07a10"/><text x="40" y="117" font-family="DejaVu Sans" font-size="19" font-weight="bold" fill="#ffffff" letter-spacing="1.5">TUTORS</text><rect x="0" y="132" width="1080" height="104" fill="#ffffff"/><circle cx="72" cy="184" r="27" fill="#c07a10"/><g transform="translate(72,184)"><path d="M 0,-15 C 5,-12 10,-11 13,-11 C 13,2 9,11 0,15 C -9,11 -13,2 -13,-11 C -10,-11 -5,-12 0,-15 Z" fill="#fff"/><path d="M -5,-1 L -1,4 L 7,-6" fill="none" stroke="#c07a10" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="173" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Background Check</text><text x="118" y="195" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Expected for minors; mandatory for school</text><text x="118" y="212" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">programs</text><path d="M 448,184 h 26 m -8,-7 l 8,7 l -8,7" stroke="#c07a10" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="179" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Tutor obtains state / FBI check as</text><text x="492" y="198" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">required</text><rect x="838" y="157" width="212" height="54" rx="6" fill="#f7e8cc"/><text x="944" y="177" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIRED FOR SCHOOL-</text><text x="944" y="194" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">LINKED WORK</text><rect x="0" y="235" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="236" width="1080" height="96" fill="#fdf3e3"/><circle cx="72" cy="284" r="27" fill="#c07a10"/><g transform="translate(72,284)"><rect x="-11" y="-15" width="22" height="30" rx="3" fill="#fff"/><path d="M -6,0 L -2,5 L 7,-6" fill="none" stroke="#c07a10" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="282" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Written Tutoring Agreement</text><text x="118" y="304" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Rates, cancellation, refunds</text><path d="M 448,284 h 26 m -8,-7 l 8,7 l -8,7" stroke="#c07a10" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="288" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Both parties sign</text><rect x="838" y="266" width="212" height="37" rx="6" fill="#f7e8cc"/><text x="944" y="286" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">PROTECTS BOTH PARTIES</text><rect x="0" y="331" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="332" width="1080" height="109" fill="#ffffff"/><circle cx="72" cy="386" r="27" fill="#c07a10"/><g transform="translate(72,386)"><rect x="-10" y="-3" width="20" height="17" rx="3" fill="#fff"/><path d="M -6,-3 v-4 a 6 6 0 0 1 12 0 v 4" fill="none" stroke="#fff" stroke-width="3.4"/></g><text x="118" y="373" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Parental Consent &amp; Student</text><text x="118" y="395" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Data Care</text><text x="118" y="417" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Minors&#x27; records handled with consent</text><path d="M 448,386 h 26 m -8,-7 l 8,7 l -8,7" stroke="#c07a10" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="391" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Parent / guardian consents in writing</text><rect x="838" y="360" width="212" height="54" rx="6" fill="#f7e8cc"/><text x="944" y="380" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">BEST PRACTICE — STATE</text><text x="944" y="396" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">PRIVACY LAWS</text><rect x="0" y="440" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="441" width="1080" height="96" fill="#fdf3e3"/><circle cx="72" cy="489" r="27" fill="#c07a10"/><g transform="translate(72,489)"><rect x="-15" y="-9" width="30" height="18" rx="3" fill="#fff"/><circle cx="0" cy="0" r="5.5" fill="#c07a10"/><rect x="-12" y="-6" width="3" height="3" fill="#c07a10"/><rect x="9" y="3" width="3" height="3" fill="#c07a10"/></g><text x="118" y="486" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Self-Employment Tax (IRS)</text><text x="118" y="508" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Schedule C; 1099-K may apply</text><path d="M 448,489 h 26 m -8,-7 l 8,7 l -8,7" stroke="#c07a10" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="484" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Tutor reports income — quarterly</text><text x="492" y="503" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">estimates if needed</text><rect x="838" y="470" width="212" height="37" rx="6" fill="#f7e8cc"/><text x="944" y="490" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">IRS REQUIREMENT</text><rect x="0" y="536" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="537" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="585" r="27" fill="#c07a10"/><g transform="translate(72,585)"><path d="M 0,-15 L 4,-5 L 15,-5 L 6,2 L 9,13 L 0,7 L -9,13 L -6,2 L -15,-5 L -4,-5 Z" fill="#fff"/></g><text x="118" y="582" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Liability Insurance</text><text x="118" y="604" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Professional &amp; general liability</text><path d="M 448,585 h 26 m -8,-7 l 8,7 l -8,7" stroke="#c07a10" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="590" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Tutor arranges own cover</text><rect x="838" y="566" width="212" height="37" rx="6" fill="#f7e8cc"/><text x="944" y="586" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">RECOMMENDED</text><rect x="0" y="632" width="1080" height="1" fill="#d8dbe4"/><text x="540.0" y="665" font-family="DejaVu Sans" font-size="15.5" font-weight="bold" fill="#c07a10" text-anchor="middle">Accredited agencies on MarketSquare manage what they may, and facilitate the rest with the right professionals.</text><rect x="90" y="681" width="900" height="43" rx="10" fill="#14213d"/><text x="540.0" y="708" font-family="DejaVu Sans" font-size="14.5" font-weight="bold" fill="#ffffff" text-anchor="middle">Working with minors: checks and consent first — trust is the product.</text><text x="40" y="750" font-family="DejaVu Sans" font-size="11.5" fill="#6b7280">Rules are state-specific; school-district work has stricter requirements.</text><text x="1040" y="750" font-family="DejaVu Sans" font-size="11.5" fill="#9aa1ad" text-anchor="end">General guidance for 