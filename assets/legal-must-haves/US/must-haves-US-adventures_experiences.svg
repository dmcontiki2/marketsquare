<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="770" viewBox="0 0 1080 770"><rect width="1080" height="770" fill="#ffffff"/><rect x="0" y="0" width="1080" height="86" fill="#14213d"/><text x="40" y="34" font-family="DejaVu Sans" font-size="15" font-weight="bold" fill="#9fb3d9" letter-spacing="2">ABSOLUTE MUST-HAVES · PRIVATE SALES · UNITED STATES</text><text x="40" y="66" font-family="DejaVu Sans" font-size="27" font-weight="bold" fill="#ffffff">OFFERING EXPERIENCES PRIVATELY</text><rect x="964" y="24" width="76" height="38" rx="8" fill="#ffffff" opacity="0.14"/><text x="1002" y="50" font-family="DejaVu Sans" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">US</text><rect x="0" y="86" width="1080" height="46" fill="#d84315"/><text x="40" y="117" font-family="DejaVu Sans" font-size="19" font-weight="bold" fill="#ffffff" letter-spacing="1.5">ADVENTURES — EXPERIENCES</text><rect x="0" y="132" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="180" r="27" fill="#d84315"/><g transform="translate(72,180)"><rect x="-11" y="-15" width="22" height="30" rx="3" fill="#fff"/><path d="M -6,0 L -2,5 L 7,-6" fill="none" stroke="#d84315" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="178" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Liability Waiver</text><text x="118" y="200" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Enforceability varies by state</text><path d="M 448,180 h 26 m -8,-7 l 8,7 l -8,7" stroke="#d84315" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="175" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Participants sign before the activity —</text><text x="492" y="194" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">properly drafted, not a template</text><rect x="838" y="153" width="212" height="54" rx="6" fill="#f6dccf"/><text x="944" y="173" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">ESSENTIAL — STATE LAW</text><text x="944" y="190" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">VARIES</text><rect x="0" y="227" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="228" width="1080" height="109" fill="#fbe9e2"/><circle cx="72" cy="282" r="27" fill="#d84315"/><g transform="translate(72,282)"><path d="M 0,-15 C 5,-12 10,-11 13,-11 C 13,2 9,11 0,15 C -9,11 -13,2 -13,-11 C -10,-11 -5,-12 0,-15 Z" fill="#fff"/><path d="M -5,-1 L -1,4 L 7,-6" fill="none" stroke="#d84315" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="269" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Commercial Liability</text><text x="118" y="291" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Insurance</text><text x="118" y="313" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Adequate cover for the activity</text><path d="M 448,282 h 26 m -8,-7 l 8,7 l -8,7" stroke="#d84315" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="287" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Operator arranges own cover</text><rect x="838" y="264" width="212" height="37" rx="6" fill="#f6dccf"/><text x="944" y="284" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">ESSENTIAL PROTECTION</text><rect x="0" y="336" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="337" width="1080" height="104" fill="#ffffff"/><circle cx="72" cy="389" r="27" fill="#d84315"/><g transform="translate(72,389)"><path d="M 0,-16 L 9,-4 L 5,-4 L 12,6 L -12,6 L -5,-4 L -9,-4 Z" fill="#fff"/><rect x="-2.4" y="6" width="4.8" height="8" fill="#fff"/></g><text x="118" y="378" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Public Lands Permits</text><text x="118" y="400" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Commercial Use Authorization (NPS / USFS /</text><text x="118" y="417" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">BLM)</text><path d="M 448,389 h 26 m -8,-7 l 8,7 l -8,7" stroke="#d84315" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="384" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Operator obtains before guiding on</text><text x="492" y="403" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">public land</text><rect x="838" y="362" width="212" height="54" rx="6" fill="#f6dccf"/><text x="944" y="382" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">FEDERAL / STATE</text><text x="944" y="399" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIREMENT</text><rect x="0" y="440" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="441" width="1080" height="96" fill="#fbe9e2"/><circle cx="72" cy="489" r="27" fill="#d84315"/><g transform="translate(72,489)"><rect x="-15" y="-11" width="30" height="22" rx="3" fill="#fff"/><circle cx="-7" cy="-2" r="4" fill="#d84315"/><rect x="-11" y="4" width="8" height="2.4" fill="#d84315"/><rect x="2" y="-6" width="11" height="2.4" fill="#d84315"/><rect x="2" y="-1" width="11" height="2.4" fill="#d84315"/><rect x="2" y="4" width="11" height="2.4" fill="#d84315"/></g><text x="118" y="486" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Guide / Outfitter License</text><text x="118" y="508" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">State-specific (fishing, hunting, rafting)</text><path d="M 448,489 h 26 m -8,-7 l 8,7 l -8,7" stroke="#d84315" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="494" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Guide licenses with the state agency</text><rect x="838" y="462" width="212" height="54" rx="6" fill="#f6dccf"/><text x="944" y="482" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">REQUIRED PER STATE &amp;</text><text x="944" y="499" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">ACTIVITY</text><rect x="0" y="536" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="537" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="585" r="27" fill="#d84315"/><g transform="translate(72,585)"><rect x="-13" y="-13" width="26" height="26" rx="4" fill="#fff"/><path d="M 0,-8 v 16 M -8,0 h 16" stroke="#d84315" stroke-width="5" stroke-linecap="round"/></g><text x="118" y="582" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">First Aid / CPR Certification</text><text x="118" y="604" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Level appropriate to the activity</text><path d="M 448,585 h 26 m -8,-7 l 8,7 l -8,7" stroke="#d84315" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="590" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Operator keeps certification current</text><rect x="838" y="566" width="212" height="37" rx="6" fill="#f6dccf"/><text x="944" y="586" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">INDUSTRY STANDARD</text><rect x="0" y="632" width="1080" height="1" fill="#d8dbe4"/><text x="540.0" y="665" font-family="DejaVu Sans" font-size="15.5" font-weight="bold" fill="#d84315" text-anchor="middle">Accredited agencies on MarketSquare manage what they may, and facilitate the rest with the right professionals.</text><rect x="90" y="681" width="900" height="43" rx="10" fill="#14213d"/><text x="540.0" y="708" font-family="DejaVu Sans" font-size="14.5" font-weight="bold" fill="#ffffff" text-anchor="middle">Waivers don&#x27;t replace insurance — courts scrutinize both.</text><text x="40" y="750" font-family="DejaVu Sans" font-size="11.5" fill="#6b7280">Minors need parent / guardian-signed waivers.</text><text x="1040" y="750" font-family="DejaVu Sans" font-size="11.5" fill="#9aa1ad" text-anchor="end">General guidance for the United States — not legal advice.</text></svg>