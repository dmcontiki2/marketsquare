<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="821" viewBox="0 0 1080 821"><rect width="1080" height="821" fill="#ffffff"/><rect x="0" y="0" width="1080" height="86" fill="#14213d"/><text x="40" y="34" font-family="DejaVu Sans" font-size="15" font-weight="bold" fill="#9fb3d9" letter-spacing="2">ABSOLUTE MUST-HAVES · PRIVATE SALES · UNITED STATES</text><text x="40" y="66" font-family="DejaVu Sans" font-size="27" font-weight="bold" fill="#ffffff">OFFERING TRADE SERVICES PRIVATELY</text><rect x="964" y="24" width="76" height="38" rx="8" fill="#ffffff" opacity="0.14"/><text x="1002" y="50" font-family="DejaVu Sans" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">US</text><rect x="0" y="86" width="1080" height="46" fill="#00838f"/><text x="40" y="117" font-family="DejaVu Sans" font-size="19" font-weight="bold" fill="#ffffff" letter-spacing="1.5">SERVICES</text><rect x="0" y="132" width="1080" height="126" fill="#ffffff"/><circle cx="72" cy="195" r="27" fill="#00838f"/><g transform="translate(72,195)"><path d="M 2,-16 L -9,2 L -1,2 L -3,16 L 9,-3 L 1,-3 Z" fill="#fff"/></g><text x="118" y="173" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">State Contractor / Trade</text><text x="118" y="195" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">License</text><text x="118" y="217" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Electrical, plumbing, HVAC, general</text><text x="118" y="234" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">contracting</text><path d="M 448,195 h 26 m -8,-7 l 8,7 l -8,7" stroke="#00838f" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="190" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Provider licenses with the state board</text><text x="492" y="209" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">before quoting regulated work</text><rect x="838" y="168" width="212" height="54" rx="6" fill="#cfe9ec"/><text x="944" y="188" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">LEGALLY REQUIRED —</text><text x="944" y="205" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">VARIES BY STATE</text><rect x="0" y="257" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="258" width="1080" height="104" fill="#e0f2f4"/><circle cx="72" cy="310" r="27" fill="#00838f"/><g transform="translate(72,310)"><rect x="-11" y="-15" width="22" height="30" rx="3" fill="#fff"/><path d="M -6,0 L -2,5 L 7,-6" fill="none" stroke="#00838f" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="299" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Written Contract</text><text x="118" y="321" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Home-improvement contracts regulated in many</text><text x="118" y="338" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">states</text><path d="M 448,310 h 26 m -8,-7 l 8,7 l -8,7" stroke="#00838f" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="305" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Itemised scope &amp; price, signed before</text><text x="492" y="324" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">work starts</text><rect x="838" y="283" width="212" height="54" rx="6" fill="#cfe9ec"/><text x="944" y="303" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">STATE LAW / BEST</text><text x="944" y="320" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">PRACTICE</text><rect x="0" y="361" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="362" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="410" r="27" fill="#00838f"/><g transform="translate(72,410)"><path d="M 0,-15 C 5,-12 10,-11 13,-11 C 13,2 9,11 0,15 C -9,11 -13,2 -13,-11 C -10,-11 -5,-12 0,-15 Z" fill="#fff"/><path d="M -5,-1 L -1,4 L 7,-6" fill="none" stroke="#00838f" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></g><text x="118" y="408" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Liability Insurance &amp; Bonding</text><text x="118" y="430" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Many states require proof for licensure</text><path d="M 448,410 h 26 m -8,-7 l 8,7 l -8,7" stroke="#00838f" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="405" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Provider arranges cover — bond where</text><text x="492" y="424" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">required</text><rect x="838" y="383" width="212" height="54" rx="6" fill="#cfe9ec"/><text x="944" y="403" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">PROTECTS CLIENT &amp;</text><text x="944" y="420" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">PROVIDER</text><rect x="0" y="457" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="458" width="1080" height="109" fill="#e0f2f4"/><circle cx="72" cy="512" r="27" fill="#00838f"/><g transform="translate(72,512)"><path d="M 0,-15 L 15,-1 L 11,-1 L 11,13 L -11,13 L -11,-1 L -15,-1 Z" fill="#fff"/><rect x="-4" y="3" width="8" height="10" fill="#00838f"/></g><text x="118" y="499" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">EPA RRP Lead-Safe</text><text x="118" y="521" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Certification</text><text x="118" y="543" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">Renovating homes built before 1978</text><path d="M 448,512 h 26 m -8,-7 l 8,7 l -8,7" stroke="#00838f" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="508" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Firm certifies &amp; follows lead-safe</text><text x="492" y="526" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">practices</text><rect x="838" y="494" width="212" height="37" rx="6" fill="#cfe9ec"/><text x="944" y="514" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">FEDERAL REQUIREMENT</text><rect x="0" y="566" width="1080" height="1" fill="#d8dbe4"/><rect x="0" y="567" width="1080" height="96" fill="#ffffff"/><circle cx="72" cy="615" r="27" fill="#00838f"/><g transform="translate(72,615)"><rect x="-15" y="-11" width="30" height="22" rx="3" fill="#fff"/><circle cx="-7" cy="-2" r="4" fill="#00838f"/><rect x="-11" y="4" width="8" height="2.4" fill="#00838f"/><rect x="2" y="-6" width="11" height="2.4" fill="#00838f"/><rect x="2" y="-1" width="11" height="2.4" fill="#00838f"/><rect x="2" y="4" width="11" height="2.4" fill="#00838f"/></g><text x="118" y="612" font-family="DejaVu Sans" font-size="17" font-weight="bold" fill="#1a1a2e">Workers&#x27; Comp (if employees)</text><text x="118" y="634" font-family="DejaVu Sans" font-size="12.5" fill="#6b7280">State-mandated</text><path d="M 448,615 h 26 m -8,-7 l 8,7 l -8,7" stroke="#00838f" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="492" y="610" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">Provider registers with the state fund /</text><text x="492" y="629" font-family="DejaVu Sans" font-size="14" font-weight="bold" fill="#2d3348">insurer</text><rect x="838" y="588" width="212" height="54" rx="6" fill="#cfe9ec"/><text x="944" y="608" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">LEGALLY REQUIRED FOR</text><text x="944" y="625" font-family="DejaVu Sans" font-size="12" font-weight="bold" fill="#2d3348" text-anchor="middle">EMPLOYERS</text><rect x="0" y="662" width="1080" height="1" fill="#d8dbe4"/><text x="540.0" y="695" font-family="DejaVu Sans" font-size="15.5" font-weight="bold" fill="#00838f" text-anchor="middle">Accredited agencies on MarketSquare manage what they may, and facilitate the rest with the right professionals.</text><rect x="90" y="711" width="900" height="64" rx="10" fill="#14213d"/><text x="540.0" y="738" font-family="DejaVu Sans" font-size="14.5" font-weight="bold" fill="#ffffff" text-anchor="middle">Unlicensed contracting is a crime in several states — and can void your right to</text><text x="540.0" y="759" font-family="DejaVu Sans" font-size="14.5" font-weight="bold" fill="#ffffff" text-anchor="middle">payment.</text><text x="40" y="801" font-family="DejaVu Sans" font-size="11.5" fill="#6b7280">Licensing thresholds differ by state (e.g. California: jobs over $500 need a license).</text><text x="1040" y="801" font-family="DejaVu Sans" font-size="11.5" fill="#9aa1ad" text-anchor="end">General guidance for the United States — not legal advice.</text></svg>