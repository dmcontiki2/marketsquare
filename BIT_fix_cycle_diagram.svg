<rect x="40" y="500" width="430" height="230" rx="10" fill="#fff" stroke="#dfe4ea"/>
<text x="56" y="524" font-size="11" font-weight="700" fill="#6b7480">THE FULL CYCLE</text>
<text x="56" y="548" font-size="10.5" fill="#5b6472">1 · BIT detects + confirms a FAIL (read-only)</text>
<text x="56" y="568" font-size="10.5" fill="#5b6472">2 · REPORT fires first — human always sees it</text>
<text x="56" y="588" font-size="10.5" fill="#5b6472">3 · MITIGATOR flips a reversible safe-state (seconds)</text>
<text x="56" y="608" font-size="10.5" fill="#5b6472">4 · TRIAGE lanes it: green auto · amber/red → David</text>
<text x="56" y="628" font-size="10.5" fill="#5b6472">5 · FIX ships green under verify-or-revert</text>
<text x="56" y="648" font-size="10.5" fill="#5b6472">6 · PREVENT adds a guard + deploy-gate test</text>
<text x="56" y="668" font-size="10.5" fill="#5b6472">7 · FIX deploys to Core App → BIT re-tests → PASS</text>
<text x="56" y="694" font-size="10.5" fill="#5b6472" font-style="italic">Mitigation is reversible and is never the fix.</text>
<text x="56" y="712" font-size="10.5" fill="#5b6472" font-style="italic">Auto-fix gated by severity + allow-list, not judgement.</text>
