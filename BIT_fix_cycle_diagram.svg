<text x="685" y="296" text-anchor="middle" font-size="10.5" fill="#5b6472">reversible flag-flip → safe state</text>
<text x="685" y="312" text-anchor="middle" font-size="10.5" fill="#5b6472">NO code change · allow-list only</text>
<text x="685" y="326" text-anchor="middle" font-size="10.5" fill="#5b6472">hide feature / fail-closed / freeze burn</text>
