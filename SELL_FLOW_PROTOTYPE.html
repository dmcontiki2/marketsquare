<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TrustSquare · Sell Flow Prototype — All Categories (15 Jul 2026)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap');
:root{
  --navy:#0b1220;--navy-2:#101a2c;--card:#141f33;--card-2:#1a2740;
  --border:rgba(255,255,255,.09);--text:#f2f5f9;--text-2:rgba(255,255,255,.62);
  --text-3:rgba(255,255,255,.40);--gold:#f2b035;--green:#34d399;--red:#f87171;
  --amber:#fbbf24;--blue:#3b82f6;--purple:#8b5cf6;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#20242c;color:var(--text);padding-bottom:50px;}
h1,h2,h3{font-family:'Syne',sans-serif;}
.proto-bar{position:sticky;top:0;z-index:100;background:#000;color:#fff;padding:10px 16px;display:flex;gap:12px;align-items:center;font-size:12px;}
.proto-bar b{font-family:'Syne',sans-serif;}
.proto-bar button{margin-left:auto;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:50px;padding:5px 14px;font-size:12px;cursor:pointer;}
.phone{width:430px;max-width:100%;margin:18px auto 0;background:var(--navy);border-radius:28px;box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 0 10px #05080f;overflow:hidden;min-height:780px;}
.app{height:800px;overflow-y:auto;padding:0 0 30px;}
.app::-webkit-scrollbar{width:0;}
.hdr{padding:20px 18px 6px;}
.hdr .step{font-size:10px;font-weight:700;letter-spacing:1.4px;color:var(--gold);text-transform:uppercase;}
.hdr h2{font-size:24px;margin-top:4px;letter-spacing:.3px;}
.coach{display:flex;gap:10px;margin:12px 18px;background:rgba(242,176,53,.07);border:1px solid rgba(242,176,53,.25);border-radius:14px;padding:11px 13px;font-size:12.5px;line-height:1.55;color:var(--text-2);}
.coach .av{font-size:20px;}
.coach b{color:var(--text);}
.coach.ai{background:rgba(139,92,246,.08);border-color:rgba(139,92,246,.35);}
.meter{margin:10px 18px 4px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 13px;}
.meter .mrow{display:flex;justify-content:space-between;align-items:baseline;font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.6px;font-weight:700;}
.meter .mval{font-family:'Syne',sans-serif;font-size:19px;color:var(--text);}
.meter .bar{height:6px;background:rgba(255,255,255,.08);border-radius:3px;margin-top:7px;overflow:hidden;}
.meter .fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#f87171,#fbbf24 45%,#34d399 75%);transition:width .4s;}
.meter .mhint{font-size:11px;color:var(--text-3);margin-top:6px;}
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 18px;}
.tile{position:relative;height:110px;border-radius:14px;overflow:hidden;cursor:pointer;border:1.5px solid var(--border);display:flex;align-items:flex-end;transition:.15s;}
.tile:hover{transform:translateY(-2px);border-color:var(--gold);}
.tile .bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:44px;opacity:.9;}
.tile img.ph{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.tile .lab{position:relative;width:100%;padding:8px 10px;background:linear-gradient(transparent,rgba(0,0,0,.72));}
.tile .lab .nm{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;}
.tile .lab .ct{font-size:10.5px;color:rgba(255,255,255,.75);}
.tile.wide{grid-column:1/-1;height:84px;}
.subgrid{display:grid;grid-template-columns:1fr;gap:10px;padding:6px 18px;}
.subcard{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:14px;cursor:pointer;display:flex;gap:12px;align-items:center;transition:.15s;}
.subcard:hover{border-color:var(--gold);}
.subcard .ic{font-size:28px;}
.subcard .nm{font-family:'Syne',sans-serif;font-weight:700;font-size:14.5px;}
.subcard .ds{font-size:11.5px;color:var(--text-3);margin-top:2px;line-height:1.4;}
.typegrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:6px 18px;}
.typegrid .subcard{flex-direction:column;text-align:center;gap:6px;padding:16px 10px;}
.slot{display:flex;align-items:center;gap:12px;background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:11px 13px;margin:0 18px 10px;cursor:pointer;transition:.15s;}
.slot:hover{border-color:rgba(242,176,53,.5);}
.slot.done{border-color:rgba(52,211,153,.45);}
.slot .thumb{width:74px;height:52px;border-radius:9px;background:var(--card-2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden;}
.slot .thumb img{width:100%;height:100%;object-fit:cover;}
.slot .info{flex:1;}
.slot .nm{font-weight:700;font-size:13.5px;}
.slot .hint{font-size:11px;color:var(--text-3);margin-top:2px;}
.slot .st{font-size:11px;font-weight:700;flex-shrink:0;}
.slot .st.ok{color:var(--green);}
.slot .st.req{color:var(--gold);}
.slot .st.chk{color:var(--purple);}
.aipanel{margin:0 18px 12px;background:var(--card);border:1.5px solid rgba(139,92,246,.4);border-radius:16px;overflow:hidden;}
.aipanel img{width:100%;display:block;}
.aipanel .cap{padding:10px 13px;font-size:12px;line-height:1.5;color:var(--text-2);}
.aipanel .cap.ok{color:var(--green);font-weight:600;}
.spin{width:16px;height:16px;border:2.5px solid rgba(139,92,246,.3);border-top-color:#8b5cf6;border-radius:50%;display:inline-block;vertical-align:-3px;margin-right:7px;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.spec-card{margin:12px 18px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:15px;}
.spec-card .sc-title{font-size:11px;font-weight:800;letter-spacing:1.1px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;font-family:'Syne',sans-serif;}
.frow{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06);padding:8px 0;gap:10px;}
.frow:last-child{border-bottom:none;}
.frow label{font-size:12.5px;color:var(--text-2);flex-shrink:0;max-width:42%;}
.frow input,.frow select{background:var(--navy-2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:7px 10px;width:56%;font-family:'Inter',sans-serif;}
.frow input:focus,.frow select:focus{outline:none;border-color:var(--gold);}
.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chip{padding:7px 13px;border-radius:50px;border:1.5px solid var(--border);background:var(--card-2);font-size:12px;cursor:pointer;color:var(--text-2);}
.chip.on{border-color:var(--gold);color:var(--gold);background:rgba(242,176,53,.1);font-weight:700;}
.skipline{text-align:center;margin:6px 18px 0;}
.skipline a{color:var(--text-3);font-size:12px;text-decoration:underline;cursor:pointer;}
.skipwarn{margin:8px 18px 0;background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.3);border-radius:10px;padding:9px 12px;font-size:11.5px;color:var(--amber);line-height:1.5;display:none;}
.foot{display:flex;gap:10px;padding:16px 18px 8px;}
.btn{flex:1;border:none;border-radius:50px;padding:14px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.btn.pri{background:var(--gold);color:#1a1205;}
.btn.pri:disabled{background:rgba(255,255,255,.12);color:var(--text-3);cursor:not-allowed;}
.btn.gho{background:transparent;border:1.5px solid var(--border);color:var(--text-2);flex:0 0 auto;padding:14px 18px;}
.dial{width:150px;height:150px;border-radius:50%;margin:18px auto 8px;display:flex;align-items:center;justify-content:center;background:conic-gradient(var(--dialcol,#34d399) calc(var(--pct,0)*1%), rgba(255,255,255,.08) 0);}
.dial .inner{width:122px;height:122px;border-radius:50%;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;}
.dial .num{font-family:'Syne',sans-serif;font-size:40px;font-weight:800;}
.dial .of{font-size:11px;color:var(--text-3);}
.verdict{text-align:center;font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:2px;}
.verdict.sub{font-family:'Inter',sans-serif;font-size:12px;color:var(--text-2);font-weight:400;margin:0 30px 8px;line-height:1.5;}
.advice{margin:10px 18px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 15px;}
.advice .at{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;font-family:'Syne',sans-serif;}
.advice .ai{display:flex;justify-content:space-between;font-size:12.5px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);color:var(--text-2);}
.advice .ai:last-child{border-bottom:none;}
.advice .ai b{color:var(--green);}
.pill{display:inline-block;background:rgba(255,255,255,.08);border-radius:50px;padding:4px 12px;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text-2);margin:14px 18px 0;}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:26px;background:#000;color:#fff;padding:10px 18px;border-radius:50px;font-size:12.5px;z-index:200;display:none;}
</style>
</head>

/* ══ State ══ */
var state;
function reset(){
  state = {screen:'home', cat:null, sub:null, lmType:null,
           photos:{}, mainPhase:0, A:{}, B:{}, C:{}, features:[], price:'', area:''};
  render();
}
function toast(t){var e=document.getElementById('toast');e.textContent=t;e.style.display='block';
  clearTimeout(e._t);e._t=setTimeout(function(){e.style.display='none';},2400);}

/* resolve the active flow config */
function flow(){
  var c = CATS[state.cat];
  if(!c) return null;
  if(c.sub && state.sub) c = c.sub[state.sub];
  if(state.cat==='LocalMarket'){
    var t = state.lmType || 'general';
    var base = CATS.LocalMarket;
    return {label:base.label+' · '+t.charAt(0).toUpperCase()+t.slice(1),
      aiCap:base.aiCap, priceLabel:base.priceLabel, mainMsg:base.mainMsg,
      slots:base.lmSlots[t],
      sections:[{key:'A',title:base.sections[0].title,pts:20,coach:base.sections[0].coach,rows:base.lmRowsA[t]},
                base.sections[1], base.sections[2]],
      feats:base.lmFeats[t]};
  }
  return c;
}
function startCat(cat){
  state.cat = cat; state.sub=null; state.lmType=null;
  state.photos={}; state.mainPhase=0; state.A={}; state.B={}; state.C={}; state.features=[]; state.price=''; state.area='';
  var c = CATS[cat];
  if(c.subPick){ go('subpick'); return; }
  if(cat==='LocalMarket'){ go('lmpick'); return; }
  flow().slots.forEach(function(s){state.photos[s[0]]=0;});
  go('photos');
}
function pickSub(s){
  state.sub=s;
  flow().slots.forEach(function(sl){state.photos[sl[0]]=0;});
  go('photos');
}
function pickLmType(t){
  state.lmType=t;
  flow().slots.forEach(function(sl){state.photos[sl[0]]=0;});
  toast(CATS.LocalMarket.typeToasts[t]);
  go('photos');
}

/* ══ Quality score — generic over the active config ══ */
function wordCount(s){return String(s||'').trim().split(/\s+/).filter(Boolean).length;}
function score(){
  var f = flow(); if(!f) return {total:0,advice:[]};
  var s=0, adv=[];
  var slots=f.slots, others=slots.length-1;
  if(state.photos.main===2) s+=10; else adv.push(['Add your main photo',10]);
  var base = others>0 ? Math.floor(30/others) : 0, extra = 30 - base*others, oi = 0;
  slots.forEach(function(sl){
    if(sl[0]==='main') return;
    var per = base + (oi < extra ? 1 : 0); oi++;
    if(state.photos[sl[0]]===2) s+=per; else adv.push(['Add the '+sl[1].toLowerCase()+' photo',per]);
  });
  f.sections.forEach(function(sec){
    var rows=sec.rows, n=0;
    rows.forEach(function(r){
      var v = state[sec.key][r[0]];
      if(r[2]==='textarea'){ if(wordCount(v)>=15) n++; }
      else if(String(v||'').trim()) n++;
    });
    var pts = rows.length ? Math.round(sec.pts*n/rows.length) : 0;
    s+=pts;
    if(n<rows.length){
      var ta = rows.filter(function(r){return r[2]==='textarea' && wordCount(state[sec.key][r[0]])<15;});
      if(ta.length && n===rows.length-ta.length) adv.push(['Write "'+ta[0][1]+'" (15+ words)',sec.pts-pts]);
      else adv.push(['Complete '+sec.title+' ('+(rows.length-n)+' left)',sec.pts-pts]);
    }
  });
  if(String(state.price).trim()) s+=6; else adv.push(['Set your price',6]);
  if(String(state.area).trim()) s+=4; else adv.push(['Add your suburb / area',4]);
  adv.sort(function(a,b){return b[1]-a[1];});
  return {total:Math.min(100,s), advice:adv};
}
function meterHtml(){
  var sc=score();
  return '<div class="meter"><div class="mrow"><span>Listing quality</span><span class="mval">'+sc.total+
  '<span style="font-size:11px;color:var(--text-3);"> /100</span></span></div>'+
  '<div class="bar"><div class="fill" style="width:'+sc.total+'%"></div></div>'+
  '<div class="mhint">'+(sc.total>=50?'Above the 50-point listing standard ✓':'Needs '+(50-sc.total)+' more points to list — drafts are saved')+'</div></div>';
}

/* ══ Render ══ */
function render(){
  var a=document.getElementById('app'), s=state.screen;
  if(s==='home') a.innerHTML=homeS();
  else if(s==='subpick') a.innerHTML=subpickS();
  else if(s==='lmpick') a.innerHTML=lmpickS();
  else if(s==='photos') a.innerHTML=photosS();
  else if(s==='secA') a.innerHTML=specS('A');
  else if(s==='secB') a.innerHTML=specS('B');
  else if(s==='secC') a.innerHTML=specS('C');
  else if(s==='features') a.innerHTML=featS();
  else if(s==='scorecard') a.innerHTML=scoreS();
  a.scrollTop=0;
}
function go(s){state.screen=s;render();}

function homeS(){
  var tiles=[['Property','🏡','39 listings'],['Tutors','🎓','0 listings'],['Services','⚙️','0 listings'],
             ['Cars','🚗','2 listings'],['Collectors','🏺','28 listings'],['Adventures','🧭','0 listings']];
  var grads={Property:'linear-gradient(140deg,#1e3a5f,#2a5298)',Tutors:'linear-gradient(140deg,#14532d,#15803d)',
    Services:'linear-gradient(140deg,#7c2d12,#b45309)',Cars:'linear-gradient(140deg,#0c1a2e,#1e3a5f)',
    Collectors:'linear-gradient(140deg,#44403c,#78716c)',Adventures:'linear-gradient(140deg,#7c3d0a,#b45309)'};
  var emo={Property:'🏡',Tutors:'🎓',Services:'⚙️',Cars:'🚗',Collectors:'🏺',Adventures:'🧭'};
  var h='<div class="hdr"><div class="step">Sell on TrustSquare</div><h2>Sell</h2></div>'+
  '<div class="coach"><div class="av">🤖</div><div><b>What are you listing?</b> Pick a category — I\'ll guide you photo by photo and write the advert with you. Nothing is visible until you publish.</div></div>'+
  '<div class="tiles">';
  tiles.forEach(function(t){
    h+='<div class="tile" onclick="startCat(\''+t[0]+'\')"><div class="bg" style="background:'+grads[t[0]]+'">'+emo[t[0]]+
       '</div><img class="ph" src="'+PHOTOS[t[0]]+'" onerror="this.style.display=\'none\'">'+
       '<div class="lab"><div class="nm">'+t[0]+'</div><div class="ct">'+t[2]+'</div></div></div>';
  });
  h+='<div class="tile wide" onclick="startCat(\'LocalMarket\')"><div class="bg" style="background:linear-gradient(140deg,#14532d,#166534)">🛍️</div>'+
     '<img class="ph" src="'+PHOTOS.LocalMarket+'" onerror="this.style.display=\'none\'">'+
     '<div class="lab"><div class="nm">Local Market</div><div class="ct">0 listings · photo placeholder until David\'s</div></div></div>';
  h+='</div><div style="text-align:center;margin-top:6px;"><span class="pill">Royalty-free (Unsplash licence) · self-host on R2 before production</span></div>';
  return h;
}

function subpickS(){
  var c=CATS[state.cat], p=c.subPick;
  var h='<div class="hdr"><div class="step">Before we start · '+c.label+'</div><h2>'+p.title+'</h2></div>'+
  '<div class="coach"><div class="av">🤖</div><div><b>Two different worlds, two different templates.</b> Pick the one that fits — the photos and questions change to match.</div></div><div class="subgrid">';
  p.subs.forEach(function(s){
    h+='<div class="subcard" onclick="pickSub(\''+s[0]+'\')"><div class="ic">'+s[1]+'</div><div><div class="nm">'+s[2]+'</div><div class="ds">'+s[3]+'</div></div></div>';
  });
  h+='</div><div class="foot"><button class="btn gho" onclick="go(\'home\')">←</button></div>';
  return h;
}

function lmpickS(){
  var c=CATS.LocalMarket;
  var h='<div class="hdr"><div class="step">Before we start · Local Market</div><h2>'+c.typePickTitle+'</h2></div>'+
  '<div class="coach"><div class="av">🤖</div><div><b>From honey to guitars to grandma\'s dresser</b> — pick the closest fit and I\'ll shape the questions around it.</div></div><div class="typegrid">';
  c.types.forEach(function(t){
    h+='<div class="subcard" onclick="pickLmType(\''+t[0]+'\')"><div class="ic">'+t[1]+'</div><div><div class="nm">'+t[2]+'</div><div class="ds">'+t[3]+'</div></div></div>';
  });
  h+='</div><div class="foot"><button class="btn gho" onclick="go(\'home\')">←</button></div>';
  return h;
}

function slotHtml(sl){
  var key=sl[0], st=state.photos[key];
  var f=flow();
  var thumb = st===2 ? ((key==='main'&&f.useCarImgs) ? '<img src="'+IMG_AFTER+'">' : sl[3]) : sl[3];
  var badge = st===2 ? '<span class="st ok">✓ checked</span>' : (st===1 ? '<span class="st chk"><span class="spin"></span>AI check…</span>' :
    (key==='main' ? '<span class="st req">required</span>' : '<span class="st" style="color:var(--text-3);">tap to add</span>'));
  return '<div class="slot'+(st===2?' done':'')+'" onclick="takePhoto(\''+key+'\')"><div class="thumb">'+thumb+
  '</div><div class="info"><div class="nm">'+sl[1]+'</div><div class="hint">'+sl[2]+'</div></div>'+badge+'</div>';
}
function photosS(){
  var f=flow();
  var h='<div class="hdr"><div class="step">Step 1 of 5 · '+f.label+'</div><h2>Photos</h2></div>'+meterHtml()+
  '<div class="coach"><div class="av">🤖</div><div><b>Start with your main photo.</b> I check every photo and blur '+f.aiCap+' before anyone sees it.</div></div>';
  if(f.useCarImgs && state.mainPhase===1){
    h+='<div class="aipanel"><img src="'+IMG_BEFORE+'"><div class="cap"><span class="spin"></span>AI is checking for '+f.aiCap+'…</div></div>';
  } else if(f.useCarImgs && state.mainPhase===2){
    h+='<div class="aipanel" style="border-color:rgba(52,211,153,.5);"><img src="'+IMG_AFTER+'"><div class="cap ok">'+f.mainMsg+'</div></div>';
  } else if(!f.useCarImgs && state.mainPhase===2){
    h+='<div class="aipanel" style="border-color:rgba(52,211,153,.5);"><div class="cap ok">'+f.mainMsg+'</div></div>';
  } else if(!f.useCarImgs && state.mainPhase===1){
    h+='<div class="aipanel"><div class="cap"><span class="spin"></span>AI is checking for '+f.aiCap+'…</div></div>';
  }
  h+=slotHtml(f.slots[0]);
  if(state.photos.main===2){
    f.slots.slice(1).forEach(function(sl){h+=slotHtml(sl);});
    h+='<div class="skipline"><a onclick="skipStep(\'photos\',\'secA\')">Skip the rest of the photos →</a></div>'+
       '<div class="skipwarn" id="warn-photos">Skipping photos lowers your Quality Score — full photo sets get roughly 3× more buyer contact. You can add them later.</div>';
  }
  h+='<div class="foot"><button class="btn gho" onclick="go(\'home\')">←</button><button class="btn pri" '+
     (state.photos.main===2?'':'disabled')+' onclick="go(\'secA\')">'+flow().sections[0].title+' →</button></div>';
  return h;
}
function takePhoto(key){
  if(state.photos[key]===2) return;
  state.photos[key]=1;
  if(key==='main') state.mainPhase=1;
  render();
  setTimeout(function(){
    state.photos[key]=2;
    if(key==='main'){
      state.mainPhase=2;
      if(state.cat==='LocalMarket'){
        var t=state.lmType||'general';
        if(!state.A.title){ state.A.title=CATS.LocalMarket.aiTitles[t]; toast('✨ AI drafted a title from your photo'); }
      }
    }
    render();
    if(key!=='main') toast('✓ Checked — nothing to blur in this one');
  }, key==='main'?1600:900);
}
function skipStep(warnKey,next){
  var w=document.getElementById('warn-'+warnKey);
  if(w && w.style.display!=='block'){ w.style.display='block'; setTimeout(function(){go(next);},1600); }
  else go(next);
}

function specS(secKey){
  var f=flow();
  var idx = secKey==='A'?0:secKey==='B'?1:2;
  var sec=f.sections[idx];
  var stepNo = 2+idx;
  var prev = idx===0?'photos':(idx===1?'secA':'secB');
  var next = idx===0?'secB':(idx===1?'secC':'features');
  var nextLabel = idx===0?f.sections[1].title:(idx===1?f.sections[2].title:'Features');
  var h='<div class="hdr"><div class="step">Step '+stepNo+' of 5 · '+f.label+'</div><h2>'+sec.title+'</h2></div>'+meterHtml()+
  '<div class="coach"><div class="av">🤖</div><div>'+sec.coach+'</div></div><div class="spec-card"><div class="sc-title">'+sec.title+'</div>';
  var rows = sec.rows.slice();
  if(secKey==='A') rows = rows.concat([['__price',f.priceLabel,'number','e.g. 500','root'],['__area','Suburb / area','text','e.g. Centurion','root']]);
  rows.forEach(function(r){
    var id=r[0], lbl=r[1], typ=r[2], ph=r[3], root=(r[4]==='root');
    var val = root ? state[id==='__price'?'price':'area'] : (state[secKey][id]||'');
    var oninp='updField(\''+(root?'__root__':secKey)+'\',\''+(root?(id==='__price'?'price':'area'):id)+'\',this.value)';
    if(typ==='select'){
      var opts='<option value="">—</option>';
      ph.split('|').forEach(function(o){opts+='<option'+(val===o?' selected':'')+'>'+o+'</option>';});
      h+='<div class="frow"><label>'+lbl+'</label><select onchange="'+oninp+'">'+opts+'</select></div>';
    } else if(typ==='textarea'){
      h+='<div class="frow" style="flex-direction:column;align-items:stretch;"><label style="margin-bottom:6px;max-width:100%;">'+lbl+'</label><textarea rows="3" style="width:100%;background:var(--navy-2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:8px 10px;font-family:Inter,sans-serif;resize:vertical;" placeholder="'+ph+'" oninput="'+oninp+'">'+val+'</textarea></div>';
    } else {
      h+='<div class="frow"><label>'+lbl+'</label><input type="text" inputmode="'+(typ==='number'?'numeric':'text')+'" placeholder="'+ph+'" value="'+String(val).replace(/"/g,'&quot;')+'" oninput="'+oninp+'"></div>';
    }
  });
  h+='</div><div class="skipline"><a onclick="skipStep(\''+secKey+'\',\''+next+'\')">Skip for now — update later →</a></div>'+
  '<div class="skipwarn" id="warn-'+secKey+'">Less data lowers your Quality Score and how buyers rank you — you can complete this any time from your dashboard.</div>'+
  '<div class="foot"><button class="btn gho" onclick="go(\''+prev+'\')">←</button><button class="btn pri" onclick="go(\''+next+'\')">'+nextLabel+' →</button></div>';
  return h;
}
function updField(scope,id,v){
  if(scope==='__root__') state[id]=v; else state[scope][id]=v;
  var m=document.querySelector('.meter'); if(m){var d=document.createElement('div');d.innerHTML=meterHtml();m.replaceWith(d.firstChild);}
}

function featS(){
  var f=flow();
  var h='<div class="hdr"><div class="step">Step 5 of 5 · '+f.label+'</div><h2>Features</h2></div>'+meterHtml()+
  '<div class="coach"><div class="av">🤖</div><div><b>Tap everything that applies.</b> Features don\'t affect the score — they just make your advert richer.</div></div>'+
  '<div class="spec-card"><div class="sc-title">Features & extras</div><div class="chips">';
  f.feats.forEach(function(ft){
    var on=state.features.indexOf(ft)>=0;
    h+='<div class="chip'+(on?' on':'')+'" onclick="togFeat(\''+ft.replace(/'/g,"\\'")+'\')">'+ft+'</div>';
  });
  h+='</div></div>'+
  '<div class="foot"><button class="btn gho" onclick="go(\'secC\')">←</button><button class="btn pri" onclick="go(\'scorecard\')">See my score →</button></div>';
  return h;
}
function togFeat(ft){
  var i=state.features.indexOf(ft);
  if(i>=0) state.features.splice(i,1); else state.features.push(ft);
  render();
}

function scoreS(){
  var f=flow(), sc=score();
  var col = sc.total>=75?'#34d399':sc.total>=50?'#fbbf24':'#f87171';
  var verdict = sc.total>=85?'Excellent listing':sc.total>=70?'Strong listing':sc.total>=50?'Good to go':'Below the listing standard';
  var sub = sc.total>=50
    ? 'Your advert meets the TrustSquare standard. The advice below lifts you higher in search — quality never hides anyone, it only rewards effort.'
    : 'You need '+(50-sc.total)+' more points to publish. Your draft is saved — the quickest wins are below.';
  var h='<div class="hdr"><div class="step">'+f.label+' · Quality check</div><h2>Your listing score</h2></div>'+
  '<div class="dial" style="--pct:'+sc.total+';--dialcol:'+col+';"><div class="inner"><div class="num" style="color:'+col+'">'+sc.total+'</div><div class="of">out of 100</div></div></div>'+
  '<div class="verdict" style="color:'+col+'">'+verdict+'</div><div class="verdict sub">'+sub+'</div>';
  if(sc.advice.length){
    h+='<div class="advice"><div class="at">What lifts your score</div>';
    sc.advice.slice(0,5).forEach(function(a){h+='<div class="ai"><span>'+a[0]+'</span><b>+'+a[1]+'</b></div>';});
    h+='</div>';
  }
  if(sc.total>=50){
    h+='<div class="foot"><button class="btn gho" onclick="go(\'photos\')">Improve first</button><button class="btn pri" onclick="toast(\'🚀 Listed! (prototype — the real flow publishes here)\')">List it now 🚀</button></div>';
  } else {
    h+='<div class="foot"><button class="btn gho" onclick="toast(\'Draft saved — finish any time\')">Save draft</button><button class="btn pri" onclick="go(\'photos\')">Add what\'s missing →</button></div>';
  }
  h+='<div style="text-align:center;"><span class="pill">Score is never shown on the advert · never touches your Trust Score</span></div>';
  return h;
}

reset();
</script>
</body>
</html>
