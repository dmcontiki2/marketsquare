<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'DejaVu Sans',Arial,sans-serif}
body{background:#0c1730;width:430px;padding:18px 14px;color:#d7e1f6}
.badge{display:inline-block;background:#0e3527;color:#6ee7b7;font-size:11px;font-weight:bold;padding:6px 11px;border-radius:6px;margin-bottom:16px}
h1{font-size:18px;color:#fff;margin-bottom:4px}
.sub{font-size:12px;color:#9fb2d6;margin-bottom:18px}
.card{background:#11224a;border:1px solid #2c4170;border-radius:14px;padding:16px;margin-bottom:18px}
.card .t{font-size:13px;color:#a9c0f0;font-weight:bold;margin-bottom:8px}
.card .line{font-size:13px;color:#cfdaf2;margin:8px 0;overflow:hidden}
.card .line b{color:#fff;float:right}
label{display:block;font-size:11px;color:#8fa1c4;margin-bottom:6px}
.btn{height:54px;border-radius:12px;text-align:center;line-height:54px;font-size:15px;font-weight:bold;margin-bottom:12px}
.save{background:#1b2a47;border:1px solid #3d5c9e;color:#bcd3f5}
.fwd{background:#1b2a47;border:1px solid #3d5c9e;color:#bcd3f5}
.run{background:#eeb33b;color:#19140a}
.ico{margin-right:9px;font-size:17px}
</style></head><body>
<span class="badge" id="b_ready">&#10003; Market Report ready</span>
<h1>Veteran Bodyguard</h1>
<div class="sub">Your full report &mdash; pricing, comps &amp; sale-probability</div>
<div class="card">
  <div class="t">SUMMARY</div>
  <div class="line"><span>Recommended price</span><b>R350</b></div>
  <div class="line"><span>Market range</span><b>R300 &ndash; R420</b></div>
  <div class="line"><span>Sale probability</span><b>82%</b></div>
</div>
<label>Keep your report</label>
<div class="btn save" id="b_save">Save / Print report</div>
<div class="btn fwd" id="b_fwd">Forward report</div>
<div class="btn run">List this item</div>
</body></html>
