<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'DejaVu Sans',Arial,sans-serif}
body{background:#0c1730;width:430px;height:760px;color:#d7e1f6;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px}
.ring{width:120px;height:120px;border-radius:50%;background:#10B981;display:flex;align-items:center;justify-content:center;margin-bottom:26px;box-shadow:0 0 60px #10b98166}
.ring .tick{font-size:64px;color:#fff;font-weight:bold;line-height:1}
h1{font-size:30px;color:#fff;margin-bottom:10px;letter-spacing:.5px}
.live{display:inline-block;background:#10B981;color:#fff;font-size:14px;font-weight:bold;letter-spacing:2px;padding:8px 18px;border-radius:8px;margin-bottom:20px}
.sub{font-size:15px;color:#b9c8e6;line-height:1.6;max-width:330px}
.coll{font-size:17px;color:#ffd24a;font-weight:bold;margin-top:18px}
</style></head><body>
<div class="ring"><div class="tick">&#10003;</div></div>
<div class="live">&#9679; NOW LIVE</div>
<h1>Your collection is published</h1>
<div class="sub">Visible to verified buyers across TrustSquare. We&rsquo;ll introduce you to a trusted buyer.</div>
<div class="coll">Vintage Magic Collection &middot; R42,500</div>
</body></html>
