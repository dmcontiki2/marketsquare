<style>
 :root{--navy:#0c1a2e;--amber:#C8873A;}
 *{box-sizing:border-box} html,body{margin:0;height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:#0c1a2e}
 #wrap{position:relative;height:100%;display:flex;flex-direction:column}
 header{background:var(--navy);color:#fff;padding:12px 16px 10px;flex:0 0 auto}
 header h1{margin:0;font-size:17px} header p{margin:3px 0 0;font-size:12px;color:#c8d2e0}
 header .pill{display:inline-block;background:var(--amber);color:#1b1206;font-weight:800;font-size:10px;padding:2px 8px;border-radius:11px;letter-spacing:.04em;margin-bottom:6px}
 #map{flex:1 1 auto;min-height:360px;background:#dcd6bd}
 .leaflet-popup-content{margin:0;width:230px!important}
 .pk{width:230px} .pk img{width:100%;height:120px;object-fit:cover;display:block;border-radius:8px 8px 0 0}
 .pk .b{padding:9px 11px 11px} .pk h3{margin:0 0 4px;font-size:14px;color:#0c1a2e} .pk p{margin:0;font-size:12px;line-height:1.45;color:#3a4657}
 .pin{display:flex;align-items:center;justify-content:center;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 2px 6px rgba(0,0,0,.4);border:2px solid #fff}
 .pin span{transform:rotate(45deg);font-size:15px;line-height:1}
 .legend{background:rgba(12,26,46,.92);color:#fff;padding:9px 11px;border-radius:10px;font-size:12px;line-height:1.7}
 .legend b{color:var(--amber);display:block;margin-bottom:3px;font-size:11px;letter-spacing:.04em;text-transform:uppercase}
 .legend i{font-style:normal;margin-right:6px}
 .cap{font-size:11px;color:#8ea0b6;padding:6px 16px 9px;background:var(--navy);flex:0 0 auto}
 .leaflet-container{background:#dcd6bd}
/* gesture-handling */
@-webkit-keyframes leaflet-gestures-fadein{0%{opacity:0}100%{opacity:1}}@keyframes leaflet-gestures-fadein{0%{opacity:0}100%{opacity:1}}.leaflet-container:after{-webkit-animation:leaflet-gestures-fadein .8s backwards;animation:leaflet-gestures-fadein .8s backwards;color:#fff;font-family:Roboto,Arial,sans-serif;font-size:22px;-webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-align:center;-ms-flex-align:center;align-items:center;padding:15px;position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:461;pointer-events:none}.leaflet-gesture-handling-scroll-warning:after,.leaflet-gesture-handling-touch-warning:after{-webkit-animation:leaflet-gestures-fadein .8s forwards;animation:leaflet-gestures-fadein .8s forwards}.leaflet-gesture-handling-touch-warning:after{content:attr(data-gesture-handling-touch-content)}.leaflet-gesture-handling-scroll-warning:after{content:attr(data-gesture-handling-scroll-content)}
</style></head>
<body><div id="wrap">
 <header><div class="pill">★ GAUTENG · BIG FIVE</div><h1>Your safari, mapped</h1>
 <p>Tap a pin for photos — the lodge, the waterhole circuit, sundowner spot and where the Big Five show up.</p></header>
 <div id="map"></div>
 <div class="cap">Illustrative map of a typical Big Five reserve · Gauteng, ~40 min north of Pretoria. Layout and sightings are indicative only, not a surveyed location.</div>
</div>

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:17,attribution:'© OpenStreetMap'}).addTo(map);
L.polygon(D.reserve,{color:'#1f6f52',weight:2,fillColor:'#3f7d4f',fillOpacity:.16,dashArray:'4,5'}).addTo(map).bindTooltip('Big Five reserve (illustrative)',{sticky:true});
function pin(c,i){return L.divIcon({className:'',html:'<div class="pin" style="width:30px;height:30px;background:'+c+'"><span>'+i+'</span></div>',iconSize:[30,30],iconAnchor:[15,29],popupAnchor:[0,-28]});}
function popup(m){let h='<div class="pk">';if(m.photo&&D.thumbs[m.photo])h+='<img src="'+D.thumbs[m.photo]+'"/>';h+='<div class="b"><h3>'+m.title+'</h3><p>'+m.blurb+'</p></div></div>';return h;}
const COL={place:'#0c1a2e',lodge:'#1f6f52',sighting:'#C8873A'};
const placeLayer=L.layerGroup(),sightLayer=L.layerGroup();
D.places.forEach(m=>L.marker([m.lat,m.lng],{icon:pin(COL[m.kind],m.icon)}).bindPopup(popup(m)).addTo(placeLayer));
D.sightings.forEach(m=>L.marker([m.lat,m.lng],{icon:pin(COL.sighting,m.icon)}).bindPopup(popup(m)).addTo(sightLayer));
const routeLine=L.polyline(D.route,{color:'#C8873A',weight:3,opacity:.9,dashArray:'7,7'});
placeLayer.addTo(map);sightLayer.addTo(map);routeLine.addTo(map);
map.fitBounds([...D.places,...D.sightings].map(m=>[m.lat,m.lng]),{padding:[45,45]});
L.control.layers(null,{'🏠 Lodge & places':placeLayer,'🦁 Big Five sightings':sightLayer,'🚙 Game-drive route':routeLine},{collapsed:false}).addTo(map);
const lg=L.control({position:'bottomright'});
lg.onAdd=function(){const d=L.DomUtil.create('div','legend');d.innerHTML='<b>Legend</b><div><i>🏠</i>The Lodge</div><div><i>💧</i>Waterhole</div><div><i>🌅</i>Sundowner</div><div><i>🦁</i>Big Five sighting</div><div><i style="color:#C8873A">— —</i>Game-drive route</div>';return d;};lg.addTo(map);
setTimeout(()=>map.invalidateSize(),250);
