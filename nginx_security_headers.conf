# TrustSquare security headers (audit C4, 16 Jul 2026)
# Safe launch set: clickjacking + MIME-sniff + referrer + HSTS.
# A full Content-Security-Policy (script-src/style-src/img-src) is deliberately
# NOT included here: the app uses ~163 inline onclick handlers plus Paystack,
# Google Fonts and Cloudflare-R2 images, so a strict CSP must be built and
# tested against those origins first (follow-up, not a launch blocker).
# 'frame-ancestors' below gives the same clickjacking protection as
# X-Frame-Options without affecting resource loading.
add_header X-Frame-Options            "SAMEORIGIN"                        always;
add_header X-Content-Type-Options     "nosniff"                          always;
add_header Referrer-Policy            "strict-origin-when-cross-origin"  always;
add_header Content-Security-Policy    "frame-ancestors 'self'"           always;
add_header Strict-Transport-Security  "max-age=31536000"                 always;
